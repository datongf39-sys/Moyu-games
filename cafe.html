<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style id="theme-vars">
[data-theme="white"]{--bg:#f8f8f6;--surface:#ffffff;--card:#ffffff;--border:#e4e4e0;--border-l:#d0d0cc;--text:#1a1a18;--muted:#6b6b66;--faint:#b0b0aa;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="dark"]{--bg:#0e0f0e;--surface:#141514;--card:#191a19;--border:#2a2b2a;--border-l:#363736;--text:#e8e8e4;--muted:#8a8a84;--faint:#4a4a46;--green:#4ade80;--green-l:rgba(74,222,128,.1);--amber:#fbbf24;--blue:#60a5fa;--blue-l:rgba(96,165,250,.1);--red:#f87171;--red-l:rgba(248,113,113,.1);--scanline:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
[data-theme="mint"]{--bg:#f0f7f4;--surface:#ffffff;--card:#ffffff;--border:#c8e6da;--border-l:#a8d5c2;--text:#1a2e26;--muted:#5a7a6e;--faint:#a0bfb4;--green:#0d9063;--green-l:rgba(13,144,99,.08);--amber:#d97706;--blue:#0369a1;--blue-l:rgba(3,105,161,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="sakura"]{--bg:#fdf4f7;--surface:#ffffff;--card:#ffffff;--border:#f0d0dc;--border-l:#e0b0c0;--text:#2a1a20;--muted:#7a5060;--faint:#c4a0b0;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#7c3aed;--blue-l:rgba(124,58,237,.08);--red:#e11d48;--red-l:rgba(225,29,72,.08);--scanline:none}
[data-theme="sky"]{--bg:#f0f6ff;--surface:#ffffff;--card:#ffffff;--border:#c8dcf8;--border-l:#a8c4f0;--text:#1a2040;--muted:#5060a0;--faint:#a0b0d8;--green:#0d9488;--green-l:rgba(13,148,136,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="warm"]{--bg:#fdf8f0;--surface:#ffffff;--card:#ffffff;--border:#ede0c8;--border-l:#d8c8a8;--text:#2a2018;--muted:#7a6040;--faint:#c0a878;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
body{transition:background .2s,color .2s}
body::after{background:var(--scanline,none)!important}
@media(max-width:640px){.main{padding:10px!important}.g4{grid-template-columns:repeat(2,1fr)!important}.g3{grid-template-columns:repeat(2,1fr)!important}.col-r{grid-template-columns:1fr!important}.tabs{padding:0 8px!important}.topbar{padding:0 10px!important}}
</style>
<script>(function(){var t=localStorage.getItem("moyu-theme")||"white";document.documentElement.setAttribute("data-theme",t);})();</script>
<title>咖啡门店 · 摸鱼工作台</title>
<link rel="stylesheet" href="modules/cafe/cafe.css">
</head>
<body>
<div class="topbar">
  <button class="back" onclick="saveBack()">← 返回</button>
  <div class="topbar-title">☕ 咖啡门店经营</div>
  <div style="display:flex;gap:5px;align-items:center;margin-left:8px">
  <button onclick="st('white')" title="纸白" style="width:14px;height:14px;border-radius:50%;background:#f8f8f6;border:1px solid #ccc;cursor:pointer;padding:0"></button>
  <button onclick="st('dark')" title="暗黑" style="width:14px;height:14px;border-radius:50%;background:#191a19;border:1px solid #555;cursor:pointer;padding:0"></button>
  <button onclick="st('mint')" title="薄荷" style="width:14px;height:14px;border-radius:50%;background:#a8d5c2;border:1px solid #8abfaa;cursor:pointer;padding:0"></button>
  <button onclick="st('sakura')" title="樱花" style="width:14px;height:14px;border-radius:50%;background:#f0b8cc;border:1px solid #d898b0;cursor:pointer;padding:0"></button>
  <button onclick="st('sky')" title="天空" style="width:14px;height:14px;border-radius:50%;background:#a8c4f0;border:1px solid #88a4d8;cursor:pointer;padding:0"></button>
  <button onclick="st('warm')" title="暖橙" style="width:14px;height:14px;border-radius:50%;background:#e8c878;border:1px solid #c8a858;cursor:pointer;padding:0"></button>
</div>
  <div class="flex gap8" style="font-size:10px;color:var(--faint);align-items:center;gap:8px">
    <button id="open-btn" onclick="toggleOpen()" style="font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--green-l);color:var(--green);cursor:pointer;font-family:var(--mono)">营业中</button>
    <button id="call-btn" onclick="callCustomer()" style="font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--blue-l);color:var(--blue);cursor:pointer;font-family:var(--mono)">🔔 叫号</button>
    <span id="starlbl">⭐</span><span id="clk">--:--:--</span>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw(0)">📊 营业概览</button>
  <button class="tab" onclick="sw(1)">☕ 制作咖啡</button>
  <button class="tab" onclick="sw(2)">🧪 配方研发</button>
  <button class="tab" onclick="sw(3)">👑 VIP 客户</button>
  <button class="tab" onclick="sw(4)">📦 库存管理</button>
  <button class="tab" onclick="sw(5)">⭐ 评价&活动</button>
  <button style="margin-left:auto;padding:8px 14px;font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:var(--mono)" onclick="resetGame()">🔄 从头开始</button>
</div>
<div class="main">

<!-- TAB 0: OVERVIEW -->
<div class="panel on" id="p0">
  <div class="g4 mb10">
    <div class="card"><div class="sl">现金</div><div class="sv am" id="cash">¥500</div><div class="sd up">营业收入</div></div>
    <div class="card"><div class="sl">完成订单</div><div class="sv cr" id="done">0</div><div class="sd">总单数</div></div>
    <div class="card"><div class="sl">满意度</div><div class="sv gr" id="sat">80%</div><div class="sd" id="stard">⭐ 新手店</div></div>
    <div class="card"><div class="sl">今日营收</div><div class="sv am" id="today">¥0</div><div class="sd" id="todayd">今天</div></div>
  </div>
  <div class="col-r">
    <div>
      <div class="card mb10"><div class="ct">当前客户队列</div><div id="queue"></div></div>
      <div class="card mb10"><div class="ct">门店状态</div><div id="shopstatus"></div></div>
      <div class="card"><div class="ct">营业日志</div><div class="log" id="clog"></div></div>
    </div>
    <div>
      <div class="card mb10">
        <div class="ct">今日营收图</div>
        <canvas id="rev-chart" width="256" height="60" style="background:var(--bg);border:1px solid var(--border);border-radius:3px;display:block;margin-bottom:8px"></canvas>
        <div class="fb">
          <div><div class="sl">最高单价</div><div style="color:var(--amber);font-size:14px;font-weight:600" id="maxprice">¥0</div></div>
          <div><div class="sl">平均评分</div><div style="color:var(--amber);font-size:14px;font-weight:600" id="avgscore">--</div></div>
        </div>
      </div>
      <div class="card mb10"><div class="ct">员工状态</div><div id="staffstatus"></div></div>
      <div class="card"><div class="ct">热门饮品</div><div id="popular"></div></div>
    </div>
  </div>
</div>

<!-- TAB 1: BREW -->
<div class="panel" id="p1">
  <div class="col-r">
    <div>
      <div class="card mb10">
        <div class="fb mb8"><div class="ct" style="margin:0">订单队列</div><span class="faint" id="q-count">0 个订单</span></div>
        <div id="brew-orders"></div>
      </div>
    </div>
    <div>
      <div class="brew-zone">
        <div class="brew-title" id="brew-title">选择左侧订单开始制作</div>
        <div id="brew-steps"></div>
        <div id="brew-result"></div>
      </div>
    </div>
  </div>
</div>

<!-- TAB 2: RECIPE -->
<div class="panel" id="p2">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">菜单饮品</div><div id="menu-list"></div></div>
    </div>
    <div>
      <div class="card mb10">
        <div class="ct">配方研发台</div>
        <div id="recipe-lab"></div>
      </div>
      <div class="card">
        <div class="ct">自定义配方</div>
        <div id="custom-recipes"></div>
      </div>
    </div>
  </div>
</div>

<!-- TAB 3: VIP -->
<div class="panel" id="p3">
  <div class="col-r">
    <div>
      <div class="card mb10"><div class="fb mb8"><div class="ct" style="margin:0">VIP 客户</div><span class="faint" id="vip-count">0 位 VIP</span></div><div id="vip-list"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">VIP 福利计划</div><div id="vip-perks"></div></div>
      <div class="card mb10"><div class="ct">会员积分</div><div id="vip-points"></div></div>
      <div class="card"><div class="ct">VIP 回访率</div><div id="vip-stats"></div></div>
    </div>
  </div>
</div>

<!-- TAB 4: INVENTORY -->
<div class="panel" id="p4">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">原材料库存</div><div id="ingredients"></div></div>
      <div class="card"><div class="ct">补货</div><div id="restock"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">设备采购</div><div id="equipment"></div></div>
      <div class="card"><div class="ct">人员招聘</div><div id="hiring"></div></div>
    </div>
  </div>
</div>

<!-- TAB 5: REVIEWS -->
<div class="panel" id="p5">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">最新评价</div><div id="reviews"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">限时活动</div><div id="events"></div></div>
      <div class="card"><div class="ct">声誉管理</div><div id="reputation"></div></div>
    </div>
  </div>
</div>

</div>

<!-- 加载 Cafe 模块 -->
<!-- 工具函数 -->
<script src="modules/cafe/utils.js"></script>

<!-- 数据模块（拆分） -->
<script src="modules/cafe/data/base.js"></script>
<script src="modules/cafe/data/ingredients.js"></script>
<script src="modules/cafe/data/equipment.js"></script>
<script src="modules/cafe/data/staff.js"></script>
<script src="modules/cafe/data/vip.js"></script>
<script src="modules/cafe/data/reviews.js"></script>
<script src="modules/cafe/data/events.js"></script>
<script src="modules/cafe/data/research.js"></script>

<!-- 系统模块 -->
<script src="modules/cafe/systems/orders.js"></script>
<script src="modules/cafe/systems/ingredients.js"></script>
<script src="modules/cafe/systems/equipment.js"></script>
<script src="modules/cafe/systems/staff.js"></script>
<script src="modules/cafe/systems/vip.js"></script>
<script src="modules/cafe/systems/reviews.js"></script>

<!-- 功能模块 -->
<script src="modules/cafe/features/brew.js"></script>
<script src="modules/cafe/features/research.js"></script>

<!-- 核心和 UI -->
<script src="modules/cafe/core/core.js"></script>
<script src="modules/cafe/ui/ui.js"></script>

<!-- 核心模块 -->
<script src="modules/cafe/actions.js"></script>
<script src="modules/cafe/render.js"></script>
<script src="modules/cafe/save.js"></script>
<script src="modules/cafe/init.js"></script>
<script src="modules/cafe/main.js"></script>

</body>
</html>
