<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style id="theme-vars">
[data-theme="white"]{--bg:#f8f8f6;--surface:#ffffff;--card:#ffffff;--border:#e4e4e0;--border-l:#d0d0cc;--text:#1a1a18;--muted:#6b6b66;--faint:#b0b0aa;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="dark"]{--bg:#0e0f0e;--surface:#141514;--card:#191a19;--border:#2a2b2a;--border-l:#363736;--text:#e8e8e4;--muted:#8a8a84;--faint:#4a4a46;--green:#4ade80;--green-l:rgba(74,222,128,.1);--amber:#fbbf24;--blue:#60a5fa;--blue-l:rgba(96,165,250,.1);--red:#f87171;--red-l:rgba(248,113,113,.1);--scanline:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
[data-theme="mint"]{--bg:#f0f7f4;--surface:#ffffff;--card:#ffffff;--border:#c8e6da;--border-l:#a8d5c2;--text:#1a2e26;--muted:#5a7a6e;--faint:#a0bfb4;--green:#0d9063;--green-l:rgba(13,144,99,.08);--amber:#d97706;--blue:#0369a1;--blue-l:rgba(3,105,161,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="sakura"]{--bg:#fdf4f7;--surface:#ffffff;--card:#ffffff;--border:#f0d0dc;--border-l:#e0b0c0;--text:#2a1a20;--muted:#7a5060;--faint:#c4a0b0;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#7c3aed;--blue-l:rgba(124,58,237,.08);--red:#e11d48;--red-l:rgba(225,29,72,.08);--scanline:none}
[data-theme="sky"]{--bg:#f0f6ff;--surface:#ffffff;--card:#ffffff;--border:#c8dcf8;--border-l:#a8c4f0;--text:#1a2040;--muted:#5060a0;--faint:#a0b0d8;--green:#0d9488;--green-l:rgba(13,148,136,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="warm"]{--bg:#fdf8f0;--surface:#ffffff;--card:#ffffff;--border:#ede0c8;--border-l:#d8c8a8;--text:#2a2018;--muted:#7a6040;--faint:#c0a878;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
body{transition:background .2s,color .2s}
body::after{background:var(--scanline,none)!important}
@media(max-width:640px){.main{padding:10px!important}.g4{grid-template-columns:repeat(2,1fr)!important}.g3{grid-template-columns:repeat(2,1fr)!important}.col-r{grid-template-columns:1fr!important}.tabs{padding:0 8px!important}.topbar{padding:0 10px!important}}
</style>
<script>(function(){var t=localStorage.getItem("moyu-theme")||"white";document.documentElement.setAttribute("data-theme",t);})();</script>
<title>咖啡门店 · 摸鱼工作台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@600;700&display=swap');
:root{--mono:'IBM Plex Mono',monospace;--serif:'Noto Serif SC',serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:9999}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100}
.back{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--mono)}.back:hover{color:var(--text)}
.topbar-title{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--cream)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.tab{padding:8px 14px;font-size:11px;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--mono);white-space:nowrap;transition:all .15s}.tab:hover{color:var(--text)}.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.main{padding:14px 16px;max-width:1200px;margin:0 auto}
.panel{display:none}.panel.on{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px}
.ct{font-size:11px;font-weight:500;margin-bottom:8px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.col-r{display:grid;grid-template-columns:1fr 280px;gap:12px}
.sl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:2px}
.sv{font-size:18px;font-weight:600;line-height:1}.sv.am{color:var(--amber)}.sv.gr{color:var(--green)}.sv.cr{color:var(--cream)}.sv.rd{color:var(--red)}
.sd{font-size:9px;color:var(--faint);margin-top:2px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}.row:last-child{border-bottom:none}
.rn{font-size:11px;font-weight:500}.rdd{font-size:9px;color:var(--faint);margin-top:1px}
.rr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:5px 12px;border-radius:3px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap}
.ba{background:rgba(212,164,76,.15);color:var(--amber);border-color:rgba(212,164,76,.3)}.ba:hover:not(:disabled){background:rgba(212,164,76,.25)}
.bg{background:rgba(90,158,90,.15);color:var(--green);border-color:rgba(90,158,90,.3)}.bg:hover:not(:disabled){background:rgba(90,158,90,.25)}
.br{background:rgba(204,85,68,.15);color:var(--red);border-color:rgba(204,85,68,.3)}.br:hover:not(:disabled){background:rgba(204,85,68,.25)}
.bc{background:rgba(85,128,170,.15);color:var(--blue);border-color:rgba(85,128,170,.3)}.bc:hover:not(:disabled){background:rgba(85,128,170,.25)}
.bo{background:transparent;color:var(--muted);border-color:var(--border-l)}.bo:hover:not(:disabled){color:var(--text)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.bsm{padding:3px 9px;font-size:10px}.bxs{padding:2px 7px;font-size:9px}.bfull{width:100%;display:flex}
.bdg{display:inline-block;padding:2px 6px;border-radius:2px;font-size:9px}
.bdg-g{background:var(--green-l);color:var(--green);border:1px solid rgba(90,158,90,.2)}
.bdg-a{background:var(--amber-l);color:var(--amber);border:1px solid rgba(212,164,76,.2)}
.bdg-r{background:rgba(204,85,68,.1);color:var(--red);border:1px solid rgba(204,85,68,.2)}
.bdg-b{background:rgba(85,128,170,.1);color:var(--blue);border:1px solid rgba(85,128,170,.2)}
.pb{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width .3s}
.pba{background:var(--amber)}.pbg{background:var(--green)}.pbr{background:var(--red)}.pbc{background:var(--blue)}
.log{height:120px;overflow-y:auto;font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:6px 8px}
.ll{padding:1px 0}.lts{color:var(--faint)}.lok .lm{color:var(--green)}.lbad .lm{color:var(--red)}.linfo .lm{color:var(--amber)}

/* ORDER CARD */
.order-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.order-card:hover{border-color:var(--amber)}.order-card.selected{border-color:var(--amber);background:rgba(212,164,76,.05)}
.order-card.urgent{border-color:rgba(204,85,68,.4)}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.oc-name{font-size:11px;font-weight:500}.oc-time{font-size:10px}
.oc-drink{font-size:10px;color:var(--muted)}.oc-req{font-size:9px;color:var(--faint);margin-top:2px}

/* BREW ZONE */
.brew-zone{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px}
.brew-title{font-size:12px;font-weight:600;color:var(--cream);margin-bottom:10px}
.brew-step{display:flex;align-items:center;gap:8px;padding:8px;border-radius:3px;background:var(--card);margin-bottom:6px;border:1px solid var(--border);transition:all .2s}
.brew-step.active{border-color:var(--amber);background:rgba(212,164,76,.08)}
.brew-step.done{border-color:rgba(90,158,90,.3);opacity:.6}
.step-icon{font-size:18px;width:24px;text-align:center}
.step-name{flex:1;font-size:11px}
.step-action{flex-shrink:0}
.step-progress{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.step-pf{height:100%;border-radius:2px;transition:width .1s;background:var(--amber)}

/* RECIPE CARD */
.recipe-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:6px}
.rc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rc-name{font-size:11px;font-weight:500}.rc-price{font-size:11px;color:var(--amber)}

/* VIP */
.vip-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:9px;margin-bottom:6px;display:flex;gap:8px}
.vc-icon{font-size:22px}.vc-info{flex:1}.vc-name{font-size:11px;font-weight:500}.vc-desc{font-size:9px;color:var(--faint);margin-top:1px}.vc-stat{font-size:9px;color:var(--amber)}

/* INGREDIENT */
.ing-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)}.ing-row:last-child{border-bottom:none}
.ing-icon{font-size:14px;width:20px;text-align:center}.ing-name{flex:1;font-size:10px}
.ing-track{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.ing-fill{height:100%;border-radius:2px}
.ing-val{font-size:9px;color:var(--muted);width:50px;text-align:right}

/* REVIEW */
.review{padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;margin-bottom:5px}
.rv-top{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.rv-content{font-size:10px;color:var(--muted);line-height:1.5}

.mt8{margin-top:8px}.mt10{margin-top:10px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.flex{display:flex;align-items:center}.fb{display:flex;align-items:center;justify-content:space-between}
.gap6{gap:6px}.gap8{gap:8px}.faint{color:var(--faint);font-size:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="saveBack()">← 返回</button>
  <div class="topbar-title">☕ 咖啡门店经营</div>
  <div style="display:flex;gap:5px;align-items:center;margin-left:8px">
  <button onclick="st('white')" title="纸白" style="width:14px;height:14px;border-radius:50%;background:#f8f8f6;border:1px solid #ccc;cursor:pointer;padding:0"></button>
  <button onclick="st('dark')" title="暗黑" style="width:14px;height:14px;border-radius:50%;background:#191a19;border:1px solid #555;cursor:pointer;padding:0"></button>
  <button onclick="st('mint')" title="薄荷" style="width:14px;height:14px;border-radius:50%;background:#a8d5c2;border:1px solid #8abfaa;cursor:pointer;padding:0"></button>
  <button onclick="st('sakura')" title="樱花" style="width:14px;height:14px;border-radius:50%;background:#f0b8cc;border:1px solid #d898b0;cursor:pointer;padding:0"></button>
  <button onclick="st('sky')" title="天空" style="width:14px;height:14px;border-radius:50%;background:#a8c4f0;border:1px solid #88a4d8;cursor:pointer;padding:0"></button>
  <button onclick="st('warm')" title="暖橙" style="width:14px;height:14px;border-radius:50%;background:#e8c878;border:1px solid #c8a858;cursor:pointer;padding:0"></button>
</div>
  <div class="flex gap8" style="font-size:10px;color:var(--faint)"><span id="starlbl">⭐</span><span id="clk">--:--:--</span></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw(0)">📊 营业概览</button>
  <button class="tab" onclick="sw(1)">☕ 制作咖啡</button>
  <button class="tab" onclick="sw(2)">🧪 配方研发</button>
  <button class="tab" onclick="sw(3)">👑 VIP客户</button>
  <button class="tab" onclick="sw(4)">📦 库存管理</button>
  <button class="tab" onclick="sw(5)">⭐ 评价&活动</button>
</div>
<div class="main">

<!-- TAB 0: OVERVIEW -->
<div class="panel on" id="p0">
  <div class="g4 mb10">
    <div class="card"><div class="sl">现金</div><div class="sv am" id="cash">¥500</div><div class="sd up">营业收入</div></div>
    <div class="card"><div class="sl">完成订单</div><div class="sv cr" id="done">0</div><div class="sd">总单数</div></div>
    <div class="card"><div class="sl">满意度</div><div class="sv gr" id="sat">80%</div><div class="sd" id="stard">⭐ 新手店</div></div>
    <div class="card"><div class="sl">今日营收</div><div class="sv am" id="today">¥0</div><div class="sd" id="todayd">今天</div></div>
  </div>
  <div class="col-r">
    <div>
      <div class="card mb10"><div class="ct">当前客户队列</div><div id="queue"></div></div>
      <div class="card mb10"><div class="ct">门店状态</div><div id="shopstatus"></div></div>
      <div class="card"><div class="ct">营业日志</div><div class="log" id="clog"></div></div>
    </div>
    <div>
      <div class="card mb10">
        <div class="ct">今日营收图</div>
        <canvas id="rev-chart" width="256" height="60" style="background:var(--bg);border:1px solid var(--border);border-radius:3px;display:block;margin-bottom:8px"></canvas>
        <div class="fb">
          <div><div class="sl">最高单价</div><div style="color:var(--amber);font-size:14px;font-weight:600" id="maxprice">¥0</div></div>
          <div><div class="sl">平均评分</div><div style="color:var(--amber);font-size:14px;font-weight:600" id="avgscore">--</div></div>
        </div>
      </div>
      <div class="card mb10"><div class="ct">员工状态</div><div id="staffstatus"></div></div>
      <div class="card"><div class="ct">热门饮品</div><div id="popular"></div></div>
    </div>
  </div>
</div>

<!-- TAB 1: BREW -->
<div class="panel" id="p1">
  <div class="col-r">
    <div>
      <div class="card mb10">
        <div class="fb mb8"><div class="ct" style="margin:0">订单队列</div><span class="faint" id="q-count">0个订单</span></div>
        <div id="brew-orders"></div>
      </div>
    </div>
    <div>
      <div class="brew-zone">
        <div class="brew-title" id="brew-title">选择左侧订单开始制作</div>
        <div id="brew-steps"></div>
        <div id="brew-result"></div>
      </div>
    </div>
  </div>
</div>

<!-- TAB 2: RECIPE -->
<div class="panel" id="p2">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">菜单饮品</div><div id="menu-list"></div></div>
    </div>
    <div>
      <div class="card mb10">
        <div class="ct">配方研发台</div>
        <div id="recipe-lab"></div>
      </div>
      <div class="card">
        <div class="ct">自定义配方</div>
        <div id="custom-recipes"></div>
      </div>
    </div>
  </div>
</div>

<!-- TAB 3: VIP -->
<div class="panel" id="p3">
  <div class="col-r">
    <div>
      <div class="card mb10"><div class="fb mb8"><div class="ct" style="margin:0">VIP客户</div><span class="faint" id="vip-count">0位VIP</span></div><div id="vip-list"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">VIP福利计划</div><div id="vip-perks"></div></div>
      <div class="card mb10"><div class="ct">会员积分</div><div id="vip-points"></div></div>
      <div class="card"><div class="ct">VIP回访率</div><div id="vip-stats"></div></div>
    </div>
  </div>
</div>

<!-- TAB 4: INVENTORY -->
<div class="panel" id="p4">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">原材料库存</div><div id="ingredients"></div></div>
      <div class="card"><div class="ct">补货</div><div id="restock"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">设备采购</div><div id="equipment"></div></div>
      <div class="card"><div class="ct">人员招聘</div><div id="hiring"></div></div>
    </div>
  </div>
</div>

<!-- TAB 5: REVIEWS -->
<div class="panel" id="p5">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">最新评价</div><div id="reviews"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">限时活动</div><div id="events"></div></div>
      <div class="card"><div class="ct">声誉管理</div><div id="reputation"></div></div>
    </div>
  </div>
</div>

</div>
<script>
const $=id=>document.getElementById(id);
const ts=()=>new Date().toTimeString().slice(0,8);
const fmt=n=>n>=1000?'¥'+(n/1000).toFixed(1)+'K':'¥'+Math.floor(n);
function dlog(b,msg,type){const el=$(b),d=document.createElement('div');d.className='ll '+type;d.innerHTML=`<span class="lts">[${ts()}]</span> <span class="lm">${msg}</span>`;el.prepend(d);while(el.children.length>60)el.removeChild(el.lastChild)}
function sw(i){document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('on',i===j));render()}
setInterval(()=>$('clk').textContent=new Date().toTimeString().slice(0,8),1000);

const C={
  cash:500,done:0,satisfaction:80,todayRev:0,totalRev:0,starLevel:0,
  maxPrice:0,scores:[],revHistory:[],
  ingredients:{beans:100,milk:80,water:200,sugar:50,syrup:20,cream:30,matcha:15,ice:100},
  maxIng:{beans:200,milk:200,water:500,sugar:100,syrup:50,cream:80,matcha:50,ice:200},
  ingNames:{beans:'咖啡豆',milk:'牛奶',water:'净水',sugar:'白糖',syrup:'果糖',cream:'奶油',matcha:'抹茶粉',ice:'冰块'},
  ingIcons:{beans:'☕',milk:'🥛',water:'💧',sugar:'🍬',syrup:'🍯',cream:'🧴',matcha:'🍵',ice:'🧊'},
  equipment:{espresso:false,frothing:false,cold_brew:false,grinder:false,syrup_pump:false,auto_temp:false},
  equipNames:{espresso:'意式咖啡机',frothing:'奶泡机',cold_brew:'冷萃设备',grinder:'专业磨豆机',syrup_pump:'果糖泵',auto_temp:'自动控温壶'},
  equipDesc:{espresso:'解锁浓缩/美式',frothing:'解锁拿铁系列',cold_brew:'解锁冷萃系列',grinder:'咖啡品质+20%',syrup_pump:'果糖调味更精准',auto_temp:'手冲品质+30%'},
  equipCost:{espresso:800,frothing:500,cold_brew:1200,grinder:1500,syrup_pump:300,auto_temp:900},
  staff:[
    {id:'self',name:'你自己',icon:'🧑',skill:1,role:'店主',mood:90},
  ],
  staffPool:[
    {name:'阿明',icon:'👨',skill:1,role:'学徒咖啡师',cost:200,salary:50},
    {name:'小晴',icon:'👩',skill:2,role:'咖啡师',cost:500,salary:120},
    {name:'老李',icon:'🧔',skill:3,role:'资深咖啡师',cost:1200,salary:280},
  ],
  menu:[

function genOrder(){
  if(C.orders.length>=C.maxOrders)return;
  const avail=C.menu.filter(m=>m.unlocked);
  const drink=avail[Math.floor(Math.random()*avail.length)];
  const vipChance=C.vips.length>0&&Math.random()<.3;
  const isVip=vipChance;
  const cust=CNAMES[Math.floor(Math.random()*CNAMES.length)];
  const custIcon=ICONS[Math.floor(Math.random()*ICONS.length)];
  const extraOpts=[];
  if(Math.random()<.3)extraOpts.push('少冰');
  if(Math.random()<.25)extraOpts.push('少糖');
  if(Math.random()<.2)extraOpts.push('加大杯');
  const price=Math.floor(drink.price*(1+(extraOpts.includes('加大杯')?.3:0))*(C.activeEvent?.mult||1));
  C.orders.push({id:Date.now(),name:cust,icon:custIcon,drink:drink.id,drinkName:drink.name,drinkIcon:drink.icon,extra:extraOpts,price,vip:isVip,timeLeft:60,patience:60});
}

function startBrew(orderId){
  const order=C.orders.find(o=>o.id===orderId);if(!order)return;
  const drink=C.menu.find(m=>m.id===order.drink);if(!drink)return;
  C.currentOrder=order;
  // Init brew steps
  C.brewSteps=drink.steps.map(sid=>{
    const def={...C.stepDefs[sid]};def.id=sid;
    if(def.type==='click'){def.clicks=0}
    if(def.type==='wait'){def.elapsed=0}
    if(def.type==='hold'){def.progress=0}
    if(def.type==='temp'){def.current=20}
    if(def.type==='choice'){def.choice=null}
    return def;
  });
  C.currentStep=0;C.brewDone=false;
  render();sw(1);
}

function doStepAction(type,extra){
  const step=C.brewSteps[C.currentStep];if(!step||step.done)return;
  if(type==='click'){step.clicks++;if(step.clicks>=step.maxClicks){step.done=true;nextStep()}}
  if(type==='hold_progress'){step.progress=extra;if(step.progress>=100){step.done=true;nextStep()}}
  if(type==='temp_set'){step.current=extra;if(Math.abs(step.current-step.target)<=5){step.done=true;nextStep()}}
  if(type==='choice'){step.choice=extra;step.done=true;nextStep()}
  render();
}

function nextStep(){C.currentStep++;if(C.currentStep>=C.brewSteps.length)completeBrew()}
function completeBrew(){
  C.brewDone=true;
  const order=C.currentOrder;
  if(!order)return;
  // Score based on quality
  const score=Math.floor(75+Math.random()*25);
  const price=order.price;
  C.cash+=price;C.totalRev+=price;C.todayRev+=price;C.done++;
  if(price>C.maxPrice)C.maxPrice=price;
  C.scores.push(score);C.revHistory.push(price);
  // Remove order
  const idx=C.orders.findIndex(o=>o.id===order.id);
  if(idx>=0)C.orders.splice(idx,1);
  // Popularity
  if(!C.popularDrinks[order.drink])C.popularDrinks[order.drink]=0;
  C.popularDrinks[order.drink]++;
  // VIP?
  if(order.vip||Math.random()<.1){const vip=C.vips.find(v=>v.name===order.name);if(vip){vip.visits++;vip.spent+=price}else C.vips.push({name:order.name,icon:order.icon,visits:1,spent:price,fav:order.drinkName,mood:'😊'})}
  // Review
  if(Math.random()<.4){
    const pos=score>=85;
    const posRevs=['☕ 咖啡超好喝！','下次还来！','环境很好，咖啡也不错','制作过程太专业了','这是我喝过最好的拿铁','会推荐给朋友'];
    const negRevs=['等了好久...','咖啡有点凉','口感一般般','有点贵','没想象中好喝'];
    C.reviews.unshift({name:order.name,icon:order.icon,score,text:(pos?posRevs:negRevs)[Math.floor(Math.random()*(pos?posRevs:negRevs).length)],drink:order.drinkName,time:ts()});
    if(C.reviews.length>20)C.reviews.pop();
  }
  C.satisfaction=Math.max(0,Math.min(100,C.satisfaction+(score>=80?2:-3)));
  C.starLevel=Math.floor(C.done/50);
  dlog('clog',`✅ 完成 ${order.drinkIcon}${order.drinkName} +${fmt(price)} 评分${score}`,'lok');
  C.currentOrder=null;C.brewSteps=[];C.currentStep=0;C.brewDone=false;
  render();
}

function buyEquip(id){
  const cost=C.equipCost[id];if(C.cash<cost||C.equipment[id])return;
  C.cash-=cost;C.equipment[id]=true;
  C.menu.forEach(m=>{if(m.req===id)m.unlocked=true});
  dlog('clog',`🔧 购入 ${C.equipNames[id]}`,'lok');render();
}
function hireStaff(i){
  const sp=C.staffPool[i];if(C.cash<sp.cost)return;
  C.cash-=sp.cost;
  C.staff.push({...sp,id:Date.now(),mood:80});
  C.staffPool.splice(i,1);
  dlog('clog',`✅ 招聘 ${sp.icon}${sp.name}`,'lok');render();
}
function restock(ing,amt){
  const costs={beans:5,milk:2,water:0.5,sugar:1,syrup:3,cream:4,matcha:8,ice:0.5};
  const cost=Math.ceil(costs[ing]*amt);
  if(C.cash<cost)return;
  C.cash-=cost;C.ingredients[ing]=Math.min(C.maxIng[ing],C.ingredients[ing]+amt);
  dlog('clog',`📦 补货 ${C.ingNames[ing]}×${amt}`,'linfo');render();
}
function activateEvent(i){
  const ev=C.events[i];if(ev.active||C.cash<ev.cost)return;
  C.cash-=ev.cost;ev.active=true;C.activeEvent=ev;
  dlog('clog',`🎪 开始活动: ${ev.name}`,'lok');render();
}
function recruitVip(){
  if(C.cash<200)return;C.cash-=200;
  const names=CNAMES;const n=names[Math.floor(Math.random()*names.length)];
  const icon=ICONS[Math.floor(Math.random()*ICONS.length)];

function drawRevChart(){
  const cv=$('rev-chart');if(!cv)return;const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const hist=C.revHistory.slice(-20);if(hist.length<2)return;
  const mn=Math.min(...hist),mx=Math.max(...hist),range=mx-mn||1;
  ctx.beginPath();
  hist.forEach((v,i)=>{const x=i/(hist.length-1)*cv.width,y=cv.height-(v-mn)/range*(cv.height-6)-3;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.strokeStyle='#d4a44c';ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(cv.width,cv.height);ctx.lineTo(0,cv.height);ctx.closePath();ctx.fillStyle='rgba(212,164,76,.15)';ctx.fill();
}

    return`<div class="ing-row"><div class="ing-icon">${C.ingIcons[k]}</div><div class="ing-name">${C.ingNames[k]}</div><div class="ing-track"><div class="ing-fill" style="width:${pct}%;background:${pct<20?'var(--red)':pct<50?'var(--amber)':'var(--green)'}"></div></div><div class="ing-val">${v}/${max}</div></div>`;
  }).join('');
  $('restock').innerHTML=Object.keys(C.ingredients).map(k=>`<div class="row"><div class="rn">${C.ingIcons[k]}${C.ingNames[k]}</div><div class="rr"><button class="btn bo bxs" onclick="restock('${k}',20)">+20</button><button class="btn bo bxs" onclick="restock('${k}',50)">+50</button></div></div>`).join('');
  $('equipment').innerHTML=Object.entries(C.equipment).map(([k,v])=>`<div class="row"><div><div class="rn">${v?'✅ ':''}${C.equipNames[k]}</div><div class="rdd">${C.equipDesc[k]}</div></div><div class="rr">${v?'<span class="bdg bdg-g">已购置</span>':`<span class="faint">${fmt(C.equipCost[k])}</span><button class="btn bo bsm" onclick="buyEquip('${k}')" ${C.cash>=C.equipCost[k]?'':'disabled'}>购买</button>`}</div></div>`).join('');
  $('hiring').innerHTML=C.staffPool.map((s,i)=>`<div class="row"><div><div class="rn">${s.icon}${s.name}</div><div class="rdd">${s.role}·技能Lv.${s.skill}</div></div><div class="rr"><span class="faint">${fmt(s.cost)}</span><button class="btn bo bsm" onclick="hireStaff(${i})" ${C.cash>=s.cost?'':'disabled'}>招聘</button></div></div>`).join('')||'<div class="faint" style="padding:8px">已无可招聘员工</div>';

  // Reviews
  $('reviews').innerHTML=C.reviews.slice(0,8).map(r=>`<div class="review">
    <div class="rv-top"><span>${r.icon}${r.name}</span><span>${'⭐'.repeat(Math.floor(r.score/20))} ${r.score}分</span></div>
    <div class="rv-content">"${r.text}" - 点了${r.drink}</div>
  </div>`).join('')||'<div class="faint" style="padding:8px">暂无评价</div>';
  $('events').innerHTML=C.events.map((ev,i)=>`<div class="row"><div><div class="rn">${ev.icon}${ev.name}</div><div class="rdd">${ev.desc}</div></div><div class="rr">${ev.active?'<span class="bdg bdg-a">进行中</span>':`<span class="faint">${fmt(ev.cost)}</span><button class="btn bo bsm" onclick="activateEvent(${i})" ${C.cash>=ev.cost?'':'disabled'}>开始</button>`}</div></div>`).join('');
  $('reputation').innerHTML=`<div class="row"><div class="rn">总体声誉</div><div class="rr"><span style="color:var(--amber)">${C.satisfaction}%</span></div></div>
    <div class="row"><div class="rn">差评数量</div><div class="rr"><span class="faint">${C.reviews.filter(r=>r.score<60).length}条</span></div></div>
    <div class="row"><div class="rn">五星评价</div><div class="rr"><span style="color:var(--green)">${C.reviews.filter(r=>r.score>=90).length}条</span></div></div>`;
}

function createCustom(){
  const names=['特调拿铁','秘制冷萃','招牌特饮','季节限定','店主特供'];
  const icons=['☕','🍵','🧊','🌸','✨'];
  const n=names[Math.floor(Math.random()*names.length)];
  const ico=icons[Math.floor(Math.random()*icons.length)];
  C.customRecipes.push({name:n,icon:ico,price:45+Math.floor(Math.random()*30)});
  dlog('clog',`🧪 创建配方: ${ico}${n}`,'lok');render();
}

// Hold mechanic
setInterval(()=>{
  if(window._holding&&C.currentOrder&&C.brewSteps[C.currentStep]?.type==='hold'){
    const step=C.brewSteps[C.currentStep];step.progress=Math.min(100,(step.progress||0)+3);
    doStepAction('hold_progress',step.progress);
  }
},100);

// Wait steps auto-progress
let tick=0;
setInterval(()=>{
  tick++;
  // Order timers
  if(tick%10===0){
    C.orders.forEach(o=>{o.timeLeft-=1;if(o.timeLeft<=0){C.satisfaction=Math.max(0,C.satisfaction-5);C.orders.splice(C.orders.indexOf(o),1);dlog('clog',`😤 ${o.icon}${o.name}等太久离开了`,'lbad')}});
    // Auto-generate orders
    if(Math.random()<.3)genOrder();
    // Wait steps
    if(C.currentOrder&&C.brewSteps[C.currentStep]?.type==='wait'){
      const step=C.brewSteps[C.currentStep];step.elapsed=(step.elapsed||0)+0.1;
      if(step.elapsed>=step.duration){step.done=true;nextStep()}
    }
    render();
  }
  if(tick%300===0)save();
  if(tick%600===0)C.todayRev=0;
},100);

// Initial orders
for(let i=0;i<2;i++)genOrder();
render();
dlog('clog','☕ 咖啡门店系统启动','linfo');
dlog('clog','💡 点击客户订单开始制作咖啡','linfo');

function st(t){
  localStorage.setItem('moyu-theme',t);
  document.documentElement.setAttribute('data-theme',t);
}
</script>
