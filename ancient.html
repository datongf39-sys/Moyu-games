<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style id="theme-vars">
[data-theme="white"]{--bg:#f8f8f6;--surface:#ffffff;--card:#ffffff;--border:#e4e4e0;--border-l:#d0d0cc;--text:#1a1a18;--muted:#6b6b66;--faint:#b0b0aa;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#7c3aed;--scanline:none}
[data-theme="dark"]{--bg:#0e0f0e;--surface:#141514;--card:#191a19;--border:#2a2b2a;--border-l:#363736;--text:#e8e8e4;--muted:#8a8a84;--faint:#4a4a46;--green:#4ade80;--green-l:rgba(74,222,128,.1);--amber:#fbbf24;--amber-l:rgba(251,191,36,.1);--blue:#60a5fa;--blue-l:rgba(96,165,250,.1);--red:#f87171;--red-l:rgba(248,113,113,.1);--purple:#c084fc;--scanline:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
[data-theme="mint"]{--bg:#f0f7f4;--surface:#ffffff;--card:#ffffff;--border:#c8e6da;--border-l:#a8d5c2;--text:#1a2e26;--muted:#5a7a6e;--faint:#a0bfb4;--green:#0d9063;--green-l:rgba(13,144,99,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#0369a1;--blue-l:rgba(3,105,161,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#6d28d9;--scanline:none}
[data-theme="sakura"]{--bg:#fdf4f7;--surface:#ffffff;--card:#ffffff;--border:#f0d0dc;--border-l:#e0b0c0;--text:#2a1a20;--muted:#7a5060;--faint:#c4a0b0;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#7c3aed;--blue-l:rgba(124,58,237,.08);--red:#e11d48;--red-l:rgba(225,29,72,.08);--purple:#db2777;--scanline:none}
[data-theme="sky"]{--bg:#f0f6ff;--surface:#ffffff;--card:#ffffff;--border:#c8dcf8;--border-l:#a8c4f0;--text:#1a2040;--muted:#5060a0;--faint:#a0b0d8;--green:#0d9488;--green-l:rgba(13,148,136,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#7c3aed;--scanline:none}
[data-theme="warm"]{--bg:#fdf8f0;--surface:#ffffff;--card:#ffffff;--border:#ede0c8;--border-l:#d8c8a8;--text:#2a2018;--muted:#7a6040;--faint:#c0a878;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#7c3aed;--scanline:none}
body{transition:background .2s,color .2s}
body::after{background:var(--scanline,none)!important}
@media(max-width:640px){.main-grid{grid-template-columns:1fr!important}.topbar{padding:0 10px!important}.action-grid{grid-template-columns:1fr 1fr!important}}
</style>
<script>(function(){var t=localStorage.getItem("moyu-theme")||"white";document.documentElement.setAttribute("data-theme",t);})();</script>
<title>古代人生 · 摸鱼工作台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root{--mono:'IBM Plex Mono',monospace;--serif:'Noto Serif SC',serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:9999}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100}
.back{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--mono)}.back:hover{color:var(--text)}
.topbar-title{font-family:var(--serif);font-size:15px;font-weight:700}
.main{padding:12px 14px 32px;max-width:960px;margin:0 auto}
.main-grid{display:grid;grid-template-columns:300px 1fr;gap:12px;align-items:start}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.card:last-child{margin-bottom:0}
.ct{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.avatar-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;text-align:center}
.avatar-emoji{font-size:48px;line-height:1;margin-bottom:8px}
.avatar-name{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text)}
.avatar-meta{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.6}
.avatar-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;margin:2px;letter-spacing:.04em}
.tag-age{background:var(--blue-l);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.tag-job{background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2)}
.tag-alive{background:var(--green-l);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.tag-dead{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.tag-married{background:rgba(124,58,237,.08);color:var(--purple);border:1px solid rgba(124,58,237,.2)}
.tag-family{background:rgba(217,119,6,.08);color:var(--amber);border:1px solid rgba(217,119,6,.2)}
.tag-sick{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.3);animation:sickPulse 2s ease infinite}
@keyframes sickPulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.stat-label{font-size:10px;color:var(--muted);flex:1}
.stat-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;max-width:80px}
.stat-fill{height:100%;border-radius:3px;transition:width .4s}
.stat-val{font-size:10px;font-weight:500;width:28px;text-align:right}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.action-btn{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:9px 6px;text-align:center;cursor:pointer;transition:all .15s;font-family:var(--mono);position:relative;overflow:hidden}
.action-btn:hover:not(:disabled){border-color:var(--border-l);background:var(--surface);transform:translateY(-1px)}
.action-btn:disabled{opacity:.3;cursor:not-allowed}
.action-btn .ab-icon{font-size:18px;margin-bottom:3px}
.action-btn .ab-name{font-size:9px;color:var(--muted);letter-spacing:.03em;line-height:1.3}
.action-btn .ab-cost{font-size:8px;color:var(--faint);margin-top:2px}
.action-btn.ab-amber{border-color:rgba(217,119,6,.3);background:var(--amber-l)}.action-btn.ab-amber:hover:not(:disabled){background:rgba(217,119,6,.15)}
.action-btn.ab-green{border-color:rgba(22,163,74,.3);background:var(--green-l)}.action-btn.ab-green:hover:not(:disabled){background:rgba(22,163,74,.15)}
.action-btn.ab-red{border-color:rgba(220,38,38,.3);background:var(--red-l)}.action-btn.ab-red:hover:not(:disabled){background:rgba(220,38,38,.15)}
.action-btn.ab-blue{border-color:rgba(37,99,235,.3);background:var(--blue-l)}.action-btn.ab-blue:hover:not(:disabled){background:rgba(37,99,235,.15)}
.action-btn.ab-purple{border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.08)}.action-btn.ab-purple:hover:not(:disabled){background:rgba(124,58,237,.15)}
@keyframes btnRipple{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes btnSuccess{0%{opacity:1}50%{opacity:.7}100%{opacity:1}}
.action-btn.clicked{animation:btnSuccess .3s ease}
.btn-ripple{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);pointer-events:none;animation:btnRipple .45s ease-out forwards}
@keyframes resultFlash{0%{opacity:0;transform:translateY(-4px)}30%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-4px)}}
.result-chip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:2px 8px;border-radius:10px;font-size:9px;white-space:nowrap;pointer-events:none;animation:resultFlash 1.6s ease forwards;z-index:10}
.result-chip.good{background:var(--green);color:#fff}
.result-chip.bad{background:var(--red);color:#fff}
.result-chip.info{background:var(--muted);color:#fff}
.log-wrap{background:var(--bg);border:1px solid var(--border);border-radius:4px;height:220px;overflow-y:auto;padding:8px 10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.log-wrap::-webkit-scrollbar{width:3px}.log-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.log-entry{padding:3px 0;border-bottom:1px solid var(--border);font-size:10px;line-height:1.5}
.log-entry:last-child{border-bottom:none}
.log-age{color:var(--faint);margin-right:6px;font-size:9px}
.log-good{color:var(--green)}.log-bad{color:var(--red)}.log-event{color:var(--amber)}.log-info{color:var(--muted)}
.family-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.family-item:last-child{border-bottom:none}
.fi-icon{font-size:18px;flex-shrink:0}
.fi-info{flex:1}
.fi-name{font-size:11px;font-weight:500}
.fi-rel{font-size:9px;color:var(--faint);margin-top:1px}
.fi-btn{font-size:9px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-family:var(--mono);color:var(--muted)}
.fi-btn:hover{color:var(--text);border-color:var(--border-l)}
.fi-btn:disabled{opacity:.3;cursor:not-allowed}
.obituary{text-align:center;padding:24px 16px}
.obit-icon{font-size:52px;margin-bottom:12px}
.obit-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:6px}
.obit-sub{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.obit-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.os{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:10px}
.os-val{font-size:18px;font-weight:600;color:var(--amber)}
.os-lbl{font-size:9px;color:var(--faint);margin-top:2px;letter-spacing:.06em}
.inherit-list{margin-bottom:16px}
.inherit-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.inherit-item:hover{border-color:var(--amber)}
.ii-left{display:flex;align-items:center;gap:8px}
.ii-icon{font-size:20px}
.ii-name{font-size:11px;font-weight:500}
.ii-rel{font-size:9px;color:var(--faint)}
.ii-age{font-size:10px;color:var(--amber)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:350;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border:1px solid var(--border-l);border-radius:10px;width:min(440px,92vw);padding:20px;transform:translateY(12px) scale(.97);transition:transform .22s cubic-bezier(.34,1.3,.64,1);box-shadow:0 20px 50px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto}
.modal-overlay.show .modal-box{transform:none}
.modal-title{font-family:var(--serif);font-size:16px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:10px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.modal-opt{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.modal-opt:hover{border-color:var(--amber);background:var(--amber-l)}
.modal-opt-cost{font-size:9px;color:var(--faint)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.mclose{padding:6px 16px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:11px}
.mclose:hover{color:var(--text)}
.mconfirm{padding:6px 16px;border-radius:4px;border:none;background:var(--text);color:var(--bg);cursor:pointer;font-family:var(--mono);font-size:11px}
.mconfirm:hover{opacity:.85}
/* Fullscreen venue modal */
.venue-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s}
.venue-overlay.show{opacity:1;pointer-events:all}
.venue-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px}
.venue-body{flex:1;overflow-y:auto;padding:16px;max-width:700px;margin:0 auto;width:100%}
.venue-spot{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.venue-spot:hover{border-color:var(--amber);transform:translateY(-1px)}
.venue-spot-name{font-family:var(--serif);font-size:13px;font-weight:600;margin-bottom:3px}
.venue-spot-desc{font-size:10px;color:var(--muted);margin-bottom:6px}
.venue-spot-people{font-size:9px;color:var(--faint)}
.stamina-bar-wrap{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.stamina-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;max-width:200px}
.stamina-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
/* Next btn */
.next-btn{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-family:var(--serif);font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:opacity .15s;margin-top:4px}
.next-btn:hover{opacity:.85}
.next-btn:disabled{opacity:.3;cursor:not-allowed}
/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;margin-bottom:0}
.tab{padding:7px 12px;font-size:10px;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--mono);white-space:nowrap;transition:all .12s}
.tab:hover{color:var(--text)}.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.panel{display:none}.panel.on{display:block}
.sec-head{font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:5px 12px;border-radius:3px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .12s;border:1px solid transparent}
.ba{background:var(--amber-l);color:var(--amber);border-color:rgba(217,119,6,.3)}.ba:hover:not(:disabled){background:rgba(217,119,6,.2)}
.bg{background:var(--green-l);color:var(--green);border-color:rgba(22,163,74,.3)}.bg:hover:not(:disabled){background:rgba(22,163,74,.2)}
.br{background:var(--red-l);color:var(--red);border-color:rgba(220,38,38,.3)}.br:hover:not(:disabled){background:rgba(220,38,38,.2)}
.bc{background:var(--blue-l);color:var(--blue);border-color:rgba(37,99,235,.3)}.bc:hover:not(:disabled){background:rgba(37,99,235,.2)}
.btn:disabled{opacity:.3;cursor:not-allowed}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeup{animation:fadeUp .3s ease}
.job-rank{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2);margin-left:4px}
.xp-bar-wrap{margin:4px 0 0}
.xp-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;border-radius:2px;background:var(--amber);transition:width .4s}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.shop-item{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:9px;cursor:pointer;transition:all .12s;font-family:var(--mono)}
.shop-item:hover:not(.sold-out){border-color:var(--amber);background:var(--amber-l)}
.shop-item.sold-out{opacity:.4;cursor:not-allowed}
.si-icon{font-size:20px;margin-bottom:4px}
.si-name{font-size:10px;font-weight:500;margin-bottom:2px}
.si-desc{font-size:9px;color:var(--faint);line-height:1.4}
.si-price{font-size:10px;color:var(--amber);margin-top:4px;font-weight:600}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.inv-slot{width:100%;aspect-ratio:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;font-size:18px;position:relative}
.inv-slot.empty{cursor:default;opacity:.3}
.inv-slot:not(.empty):hover{border-color:var(--amber);background:var(--amber-l)}
.inv-slot .slot-name{font-size:7px;color:var(--faint);margin-top:2px;text-align:center;line-height:1.2}
.favor-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;width:60px}
.favor-fill{height:100%;border-radius:2px;background:var(--purple);transition:width .4s}
.shop-item.job-book{border-color:rgba(217,119,6,.35);background:rgba(217,119,6,.05)}
.shop-item.job-book:hover:not(.sold-out){background:var(--amber-l)}
/* Sick badge */
.sick-badge{display:inline-block;padding:1px 5px;background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.3);border-radius:3px;font-size:8px;animation:sickPulse 2s infinite}
/* Year log cards */
.year-log-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px}
.year-log-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:8px;margin-bottom:6px}
/* Estate manage */
.estate-resident-chip{display:inline-flex;align-items:center;gap:3px;background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2);border-radius:3px;padding:1px 6px;font-size:9px;margin:2px;cursor:pointer}
.estate-resident-chip:hover{background:rgba(217,119,6,.2)}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="location.href='index.html'">← 返回</button>
  <span class="topbar-title">🏯 古代人生模拟</span>
  <div style="display:flex;gap:5px;align-items:center">
    <button onclick="st('white')" title="纸白" style="width:14px;height:14px;border-radius:50%;background:#f8f8f6;border:1px solid #ccc;cursor:pointer;padding:0"></button>
    <button onclick="st('dark')" title="暗黑" style="width:14px;height:14px;border-radius:50%;background:#191a19;border:1px solid #555;cursor:pointer;padding:0"></button>
    <button onclick="st('mint')" title="薄荷" style="width:14px;height:14px;border-radius:50%;background:#a8d5c2;border:1px solid #8abfaa;cursor:pointer;padding:0"></button>
    <button onclick="st('sakura')" title="樱花" style="width:14px;height:14px;border-radius:50%;background:#f0b8cc;border:1px solid #d898b0;cursor:pointer;padding:0"></button>
    <button onclick="st('sky')" title="天空" style="width:14px;height:14px;border-radius:50%;background:#a8c4f0;border:1px solid #88a4d8;cursor:pointer;padding:0"></button>
    <button onclick="st('warm')" title="暖橙" style="width:14px;height:14px;border-radius:50%;background:#e8c878;border:1px solid #c8a858;cursor:pointer;padding:0"></button>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="confirmRestart()" style="font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--red-l);color:var(--red);cursor:pointer;font-family:var(--mono)">⟳ 重开此生</button>
    <span style="font-size:9px;color:var(--faint);letter-spacing:.08em">ANCIENT · v3.3</span>
  </div>
</div>

function genYearShop(){
  if(!G._shopSeed||G._shopYear!==G.age){
    G._shopYear=G.age;
    const general=SHOP_ITEMS_POOL.filter(i=>i.tags.includes('general'));
    const jobbooks=G.age>10?SHOP_ITEMS_POOL.filter(i=>i.tags.includes('jobbook')):[];
    const gifts=SHOP_ITEMS_POOL.filter(i=>i.tags.includes('gift'));
    const shuffle=arr=>[...arr].sort(()=>Math.random()-0.5);
    const picked=[];
    shuffle(general).slice(0,3+Math.floor(Math.random()*2)).forEach(i=>picked.push(i));
    if(gifts.length) shuffle(gifts).slice(0,1+Math.floor(Math.random()*2)).forEach(i=>picked.push(i));
    if(jobbooks.length&&Math.random()<0.6) picked.push(shuffle(jobbooks)[0]);
    const unique=[...new Map(picked.map(i=>[i.id,i])).values()];
    G._shopPool=unique.slice(0,6).map(i=>i.id);
    G._shopSeed=true;
  }
  return SHOP_ITEMS_POOL.filter(i=>G._shopPool&&G._shopPool.includes(i.id));
}

function save(){localStorage.setItem('ancient',JSON.stringify(G));}
function load(){
  try{const d=JSON.parse(localStorage.getItem('ancient')||'null');if(d)G=d;return !!d;}
  catch(e){return false;}
}
function addLog(text,type='info'){
  G.log.unshift({age:G.age,text,type});
  if(G.log.length>200)G.log.pop();
}

    <span class="stat-label">${label}</span>

  </div>`;
}

  const freeSchoolAge=bgInfo.freeSchoolAge;

  html+=actionBtn('🏃','强身健体',!canEx?'年龄太小':exDone?'今年已做':'健康+ 费5文',canEx?'ab-green':'',canEx&&!exDone?'exercise(event)':'',!canEx||exDone,exDone?'今年已做':'');

/* ══════════════════════════════════════════
   CAREER PANEL （职业与生计独立）
══════════════════════════════════════════ */
function renderCareer(){
  const a=G.age;
  const job=JOBS.find(j=>j.id===G.job);
  const canWork=G.job!=='none'&&a>=job.minAge&&a<=job.maxAge;
  let html=`<div class="ct">职业与生计</div>`;
  html+=`<div class="action-grid">`;
  html+=actionBtn('💼','转换职业','选择工作','ab-amber','openJobModal()');
  html+=`</div>`;
  // Job info
  if(job&&job.id!=='none'){
    const rankLabel=job.ranks[Math.min(G.jobRank,job.ranks.length-1)];
    const profNeeded=job.profPerRank[Math.min(G.jobRank,job.profPerRank.length-1)]||0;
    const profPct=profNeeded>0?Math.min(100,(G.jobProf/profNeeded)*100):100;
    html+=`<div style="background:var(--amber-l);border:1px solid rgba(217,119,6,.2);border-radius:6px;padding:10px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:22px">${job.icon}</span>
        <div>
          <div style="font-family:var(--serif);font-size:13px;font-weight:600">${job.name} · <span style="color:var(--amber)">${rankLabel}</span></div>
          <div style="font-size:9px;color:var(--muted)">${job.desc}</div>
        </div>
      </div>
      ${profNeeded>0?`<div style="font-size:8px;color:var(--faint);margin-bottom:2px">熟练度 ${G.jobProf}/${profNeeded}</div>
      <div class="xp-bar"><div class="xp-fill" style="width:${profPct}%"></div></div>`:'<div style="font-size:8px;color:var(--amber)">已达最高职级</div>'}
      <div style="font-size:9px;color:var(--muted);margin-top:6px">薪俸区间：${Math.round(job.salaryRange[0])} ～ ${Math.round(job.salaryRange[1]*(1+(job.ranks.length-1)*0.3))} 文/年（点击"度过一年"后自动发放）</div>
      <div style="font-size:9px;color:var(--faint);margin-top:3px">职级路径：${job.ranks.join(' → ')}</div>
    </div>`;
  }
  // Tasks
  if(canWork&&job.tasks&&job.tasks.length>0){
    if(!G._yearTasks||G._yearTasksAge!==G.age||G._yearTasksJob!==G.job||G._yearTasksRank!==G.jobRank){
      const unlocked=job.tasks.filter(t=>t.minRank<=G.jobRank);
      const shuffled=[...unlocked].sort(()=>Math.random()-0.5);
      G._yearTasks=shuffled.slice(0,Math.min(3,unlocked.length)).map(t=>job.tasks.indexOf(t));
      G._yearTasksAge=G.age;G._yearTasksJob=G.job;G._yearTasksRank=G.jobRank;
    }
    const doneCount=(G.tasksDoneThisYear||[]).length;
    html+=`<div class="sec-head">工作任务（今年可做最多2件，已做${doneCount}/2）</div><div class="action-grid">`;
    G._yearTasks.forEach(idx=>{
      const t=job.tasks[idx];if(!t)return;
      const stars='★'.repeat(t.diff)+'☆'.repeat(5-t.diff);
      const taskDone=(G.tasksDoneThisYear||[]).includes(idx);
      const maxReached=doneCount>=2&&!taskDone;
      html+=actionBtn(['📋','📑','📊','🏆','🌟'][t.diff-1],t.name,
        taskDone?'今年已做':maxReached?'已达上限':`难度${stars}`,
        taskDone||maxReached?'':'ab-amber',
        taskDone||maxReached?'':`doWorkTask(event,${idx})`,
        taskDone||maxReached,taskDone?'已做':'');
    });
    html+=`</div>`;
  } else if(G.job==='none'){
    html+=`<div style="color:var(--faint);font-size:10px;text-align:center;padding:16px">尚无职业，前往"转换职业"寻找差事。</div>`;
  }
  return html;
}

/* ══════════════════════════════════════════
   ESTATE PANEL
══════════════════════════════════════════ */
function renderEstate(){
  if(!G.estates)G.estates=[];
  let html=`<div class="ct">地产 — 安居乐业，广置田产</div>`;

  // Helper: get all family members who can reside
  // self + spouse + children + concubines (parents NOT counted)
  function familyResidents(){
    const list=[{name:G.name,label:`${G.name}（本人）`,emoji:G.emoji}];
    if(G.married&&G.spouseName) list.push({name:G.spouseName,label:`${G.spouseName}（配偶）`,emoji:G.spouseEmoji||'👤'});
    (G.children||[]).forEach(c=>list.push({name:c.name,label:`${c.name}（${c.gender==='male'?'子':'女'}·${c.age}岁）`,emoji:c.emoji}));
    (G.concubines||[]).forEach(c=>list.push({name:c.name,label:`${c.name}（${c.role==='concubine'?'妾室':'面首'}）`,emoji:c.emoji}));
    return list;
  }

  if(G.estates.length>0){
    html+=`<div class="sec-head">名下地产</div>`;
    G.estates.forEach((e,i)=>{
      const residents=e.residents||[];
      const occupied=residents.length;
      const hasMinor=G.children.some(c=>c.age<18&&residents.includes(c.name));
      html+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:22px">${e.icon}</span>
          <div style="flex:1">
            <div style="font-size:11px;font-weight:600">${e.name} <span style="font-size:9px;color:var(--amber)">入住${occupied}/${e.capacity}人</span></div>
            <div style="font-size:9px;color:var(--faint)">${e.desc}</div>
            ${e.incomePerYear>0?`<div style="font-size:9px;color:var(--green)">每年收入+${e.incomePerYear}文</div>`:''}
            <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">
              ${residents.map(r=>`<span class="estate-resident-chip" onclick="removeFromEstate(${i},'${r}')" title="点击移出">${r} ✕</span>`).join('')}
              ${occupied===0?`<span style="font-size:9px;color:var(--faint)">空置</span>`:''}
            </div>
            <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
              ${familyResidents().filter(fr=>!residents.includes(fr.name)&&occupied<e.capacity).map(fr=>`<button class="fi-btn" onclick="addToEstate(${i},'${fr.name}')" style="font-size:8px">${fr.emoji} 安置${fr.label.split('（')[0]}</button>`).join('')}
            </div>
          </div>
          <button class="fi-btn" onclick="sellEstate(${i})" style="color:var(--red)" ${hasMinor?'disabled title="有未成年子女居住，不可售出"':''}>售出</button>
        </div>
      </div>`;
    });
  } else {
    html+=`<div style="color:var(--faint);font-size:10px;text-align:center;padding:12px">名下尚无房产田产。</div>`;
  }

  html+=`<div class="sec-head">购置地产（当前余钱 🪙${G.money}文）</div>`;
  html+=`<div class="shop-grid">`;
  ESTATES.forEach(e=>{
    const canBuy=G.money>=e.price;
    html+=`<div class="shop-item${canBuy?'':' sold-out'}" onclick="${canBuy?`buyEstate('${e.id}')`:''}" >
      <div class="si-icon">${e.icon}</div>
      <div class="si-name">${e.name} <span style="font-size:8px;color:var(--faint)">容${e.capacity}人</span></div>
      <div class="si-desc">${e.desc}</div>
      <div class="si-price">🪙 ${e.price}文${e.incomePerYear>0?' · 年入'+e.incomePerYear+'文':''}${!canBuy?' · 钱不够':''}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function addToEstate(estateIdx,residentName){
  const e=G.estates[estateIdx];if(!e)return;
  if(!e.residents)e.residents=[];
  if(e.residents.includes(residentName)){showToast('此人已在该处居住！');return;}
  if(e.residents.length>=e.capacity){showToast('此房已住满！');return;}
  // Remove from other estates first
  G.estates.forEach((oe,oi)=>{if(oi!==estateIdx&&oe.residents)oe.residents=oe.residents.filter(r=>r!==residentName);});
  e.residents.push(residentName);
  save();render();
}
function removeFromEstate(estateIdx,residentName){
  const e=G.estates[estateIdx];if(!e||!e.residents)return;
  e.residents=e.residents.filter(r=>r!==residentName);
  save();render();
}

function buyEstate(estateId){
  const tmpl=ESTATES.find(e=>e.id===estateId);if(!tmpl)return;
  if(G.money<tmpl.price){showToast('钱不够！');return;}
  confirmSpend(tmpl.price,`${tmpl.icon} 购置【${tmpl.name}】\n容纳 ${tmpl.capacity} 人`,()=>{
    G.money-=tmpl.price;
    if(!G.estates)G.estates=[];
    G.estates.push({...tmpl,eid:'e_'+Date.now(),residents:[]});
    addLog(`🏠 购置了【${tmpl.name}】，花费 ${tmpl.price}文。`,'event');
    save();showModal(`🏠 购置成功`,`${tmpl.icon} <b>${tmpl.name}</b> 已纳入名下。`,
      [{label:'甚好',sub:'',cost:'',id:'ok'}],()=>{closeModal();render();});
  });
}
function sellEstate(idx){
  const e=G.estates[idx];if(!e)return;
  const hasMinor=G.children.some(c=>c.age<18&&(e.residents||[]).includes(c.name));
  if(hasMinor){showToast('有未成年子女居住于此，不可售出！');return;}
  const sellPrice=Math.floor(e.price*0.6);
  showModal('🏠 确认售出',`将【${e.name}】以 ${sellPrice}文 售出？（原价${e.price}文，六折回收）`,
    [{label:`✅ 确认售出 ${sellPrice}文`,sub:'',cost:'',id:'yes'}],
    (id)=>{closeModal();if(id==='yes'){
      G.money+=sellPrice;G.estates.splice(idx,1);
      addLog(`🏠 售出【${e.name}】，得 ${sellPrice}文。`,'info');
      save();render();
    }});
}

/* ══════════════════════════════════════════
   ACTION BTN HELPER
══════════════════════════════════════════ */
function actionBtn(icon,name,desc,cls,onclick,disabled=false,badge=''){
  const ripple=onclick?`onclick="addRipple(event);${onclick}"`:'';
  const badgeHtml=badge?`<span style="position:absolute;top:3px;right:3px;font-size:7px;background:var(--amber);color:#fff;padding:1px 4px;border-radius:3px">${badge}</span>`:'';
  return `<button class="action-btn ${cls}" ${ripple} ${disabled?'disabled':''}>
    ${badgeHtml}<div class="ab-icon">${icon}</div><div class="ab-name">${name}</div><div class="ab-cost">${desc}</div>
  </button>`;
}

/* ══════════════════════════════════════════
   RIPPLE / RESULT
══════════════════════════════════════════ */
function addRipple(e){
  const btn=e.currentTarget;
  const r=document.createElement('span');r.className='btn-ripple';
  const rect=btn.getBoundingClientRect();
  r.style.left=(e.clientX-rect.left-30)+'px';r.style.top=(e.clientY-rect.top-30)+'px';
  btn.appendChild(r);setTimeout(()=>r.remove(),500);
  btn.classList.add('clicked');setTimeout(()=>btn.classList.remove('clicked'),300);
}
function showResult(btn,text,type='good'){
  if(!btn)return;
  btn.querySelectorAll('.result-chip').forEach(c=>c.remove());
  const chip=document.createElement('span');chip.className=`result-chip ${type}`;chip.textContent=text;
  btn.style.position='relative';btn.appendChild(chip);setTimeout(()=>chip.remove(),1800);
}

function toggleSchool(e){
  const btn=e&&e.currentTarget;

    showResult(btn,'退学','info');
    showModal('📚 离开学堂',`当前成绩：${G.schoolGrade||'F'}`,
      [{label:'知道了',sub:'',cost:'',id:'ok'}],()=>closeModal());
  } else {
    const bg=FAMILY_BG[G.familyBg]||FAMILY_BG.normal;
    const isFree=bg.freeSchoolAge>0&&G.age<bg.freeSchoolAge;
    const needPay=!isFree;
    if(needPay&&G.money<20){showToast('没有足够的钱交学费！需要20文。');return;}

      confirmSpend(20,'📖 缴纳束脩，入读学堂',()=>{G.money-=20;G.inSchool=true;addLog(`📖 交了束脩，入读学堂。`,'event');showResult(btn,'入学','good');save();render();});return;

function gradeFromScore(score){if(score>=92)return 'S';if(score>=80)return 'A';if(score>=70)return 'B';if(score>=60)return 'C';if(score>=48)return 'D';if(score>=35)return 'E';return 'F';}

function openExamModal(e){
  if(actionDone('exam')){showToast('今年已经考过试了！');return;}
  const prompt=ESSAY_PROMPTS[Math.floor(Math.random()*ESSAY_PROMPTS.length)];
  const styles=[
    {id:'safe', label:'🖌️ 四平八稳，中规中矩',sub:'稳妥保守，失误较少',scoreMod:0},
    {id:'bold', label:'⚡ 文采飞扬，大胆立意',sub:'创意十足，成功则高分，失败则低分',scoreMod:20},
    {id:'copy', label:'📋 照抄经典，引经据典',sub:'智识要求高，通过率稳定',scoreMod:-5},
  ];
  showModal(`✍️ 写文应考`,`题目：《${prompt.title}》\n${prompt.desc}\n\n当前成绩：${G.schoolGrade||'F'} · 智识：${G.intel}`,
    styles.map(s=>({label:s.label,sub:s.sub,cost:'',id:s.id,_mod:s.scoreMod})),(id)=>{closeModal();const style=styles.find(s=>s.id===id);doExam(prompt,style);});
}

function doExam(prompt,style){
  markAction('exam');
  const intelScore=G.intel*0.9+(Math.random()-0.5)*14;
  let finalScore=intelScore+(style&&style._mod||0);
  if(style&&style.id==='bold')finalScore+=(Math.random()-0.5)*28;
  finalScore=Math.max(0,Math.min(100,finalScore));
  const gradeThresholds={F:[0,35],E:[22,48],D:[35,60],C:[48,70],B:[60,80],A:[72,91],S:[80,999]};
  const gradeOrder=['F','E','D','C','B','A','S'];
  const curGradeIdx=gradeOrder.indexOf(G.schoolGrade||'F');
  const[keepLine,upLine]=gradeThresholds[G.schoolGrade||'F'];
  let newGradeIdx;
  if(finalScore>=upLine)newGradeIdx=Math.min(curGradeIdx+1,6);
  else if(finalScore<keepLine)newGradeIdx=Math.max(curGradeIdx-1,0);
  else newGradeIdx=curGradeIdx;
  const newGrade=gradeOrder[newGradeIdx];
  const gradeInfo=GRADE_INFO[newGrade];
  const oldGrade=G.schoolGrade||'F';
  G.schoolGrade=newGrade;
  G.intel=clamp(G.intel+gradeInfo.intelBonus);
  const improved=gradeOrder.indexOf(newGrade)>gradeOrder.indexOf(oldGrade);
  const dropped=gradeOrder.indexOf(newGrade)<gradeOrder.indexOf(oldGrade);
  G.mood=clamp(G.mood+(improved?8:dropped?-8:2));
  const changeStr=improved?`↑ 从${oldGrade}升至${newGrade}！`:dropped?`↓ 从${oldGrade}跌至${newGrade}…`:`持平${newGrade}`;
  addLog(`✍️ 《${prompt.title}》— 成绩${newGrade}。${gradeInfo.desc} ${changeStr}`,'info');
  let recMsg='';
  if((newGrade==='A'||newGrade==='S')&&!G.examRecommended&&!G.examPassed){
    if(Math.random()<(newGrade==='S'?0.85:0.5)){G.examRecommended=true;recMsg='\n\n🌟 先生特别推荐你参加科举！';addLog(`🌟 先生推荐你参加科举！科举入口已解锁。`,'event');}
  }
  save();render();
  showModal('📜 考试结果',`题目：《${prompt.title}》\n得分：${Math.round(finalScore)} 分\n成绩：<span style="color:${gradeInfo.color};font-size:18px;font-weight:700">${newGrade}</span>\n${gradeInfo.desc}\n${changeStr}\n智识+${gradeInfo.intelBonus}${recMsg}`,
    [{label:'✅ 知道了',sub:'',cost:'',id:'ok'}],()=>closeModal());
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function doWorkTask(e,taskIdx){
  const btn=e&&e.currentTarget;
  const job=JOBS.find(j=>j.id===G.job);if(!job||!job.tasks[taskIdx])return;
  if((G.tasksDoneThisYear||[]).length>=2){showToast('今年已完成2项任务，不能再做了！');return;}
  if((G.tasksDoneThisYear||[]).includes(taskIdx)){showToast('今年这项任务已做过了！');return;}
  if(!G.tasksDoneThisYear)G.tasksDoneThisYear=[];
  G.tasksDoneThisYear.push(taskIdx);
  const task=job.tasks[taskIdx];
  const baseRate=0.7-(task.diff-1)*0.08;
  const attrBonus=(G.intel+G.health)/(200)*0.25;
  const success=roll(baseRate+attrBonus);
  if(success){
    G.jobProf+=task.prof;
    const rankNow=job.ranks[Math.min(G.jobRank,job.ranks.length-1)];
    const profNeeded=job.profPerRank[Math.min(G.jobRank,job.profPerRank.length-1)]||0;
    addLog(`✅ [${job.name}·${rankNow}] ${task.text} 熟练度+${task.prof}。`,'good');
    showResult(btn,`+${task.prof}熟练`,'good');checkPromotion();save();
    showModal('✅ 任务完成',`<b>${task.name}</b><br><br>${task.text}<br><br>职业熟练度+${task.prof}<br>当前进度：${G.jobProf}／${profNeeded}`,
      [{label:'好的',sub:'',cost:'',id:'ok'}],()=>{closeModal();render();});
  } else {
    const xpLoss=task.failProf||Math.floor(task.prof*0.75);
    G.jobProf=Math.max(0,G.jobProf-xpLoss);G.mood=clamp(G.mood-4);
    addLog(`❌ [${job.name}] ${task.name} 出了差错，熟练度-${xpLoss}。`,'bad');showResult(btn,'出了差错','bad');save();
    showModal('❌ 任务失误',`<b>${task.name}</b><br><br>出了差错。<br>熟练度-${xpLoss}，心情-4`,
      [{label:'知道了',sub:'',cost:'',id:'ok'}],()=>{closeModal();render();});
  }
}

function checkPromotion(){
  const job=JOBS.find(j=>j.id===G.job);if(!job||!Array.isArray(job.profPerRank))return;
  const maxRank=job.ranks.length-1;let promoted=false,lastRank='',lastBonus=0;
  while(G.jobRank<maxRank){
    const needed=job.profPerRank[G.jobRank]||0;if(needed===0||G.jobProf<needed)break;
    G.jobProf-=needed;G.jobRank++;lastRank=job.ranks[G.jobRank];lastBonus=50+G.jobRank*30;
    G.money+=lastBonus;G.totalMoney+=lastBonus;G.mood=clamp(G.mood+20);
    addLog(`🎊 晋升为【${lastRank}】，获奖赏 ${lastBonus}文！`,'event');promoted=true;G._yearTasksAge=-1;
  }
  if(promoted){
    const nsl=Math.round(job.salaryRange[0]*(1+G.jobRank*0.3));const nsh=Math.round(job.salaryRange[1]*(1+G.jobRank*0.3));
    setTimeout(()=>showModal('🎊 职位晋升！',`荣升 <b>【${lastRank}】</b>！<br><br>🪙 晋升奖赏：+${lastBonus} 文<br>📈 新薪资：${nsl}～${nsh} 文/年<br>😊 心情+20`,
      [{label:'🎉 多谢提携！',sub:'',cost:'',id:'ok'}],()=>closeModal()),200);
  }
}

// 染病检测（每年在nextYear中调用）
function checkDisease(){
  if(!G.diseases)G.diseases=[];
  // 患病概率：健康越低越容易染病
  const riskBase=0.06+(1-G.health/100)*0.14;
  if(Math.random()<riskBase&&G.diseases.length<3){
    // 随机选一种未患的病
    const existing=G.diseases.map(d=>d.id);
    const candidates=DISEASES.filter(d=>!existing.includes(d.id));
    if(candidates.length>0){
      const d=candidates[Math.floor(Math.random()*candidates.length)];
      G.diseases.push({...d,turnsLeft:2+d.level});
      addLog(`🤒 染上了【${d.name}】，需要及时就医！`,'bad');
    }
  }
  // 疾病每年造成伤害
  G.diseases.forEach(d=>{
    G.health=clamp(G.health-d.healthPerYear);
    G.mood=clamp(G.mood-d.moodPerYear);
    if(d.deathRisk>0&&Math.random()<d.deathRisk){
      G.dead=true;G.deathCause=`因【${d.name}】不治，${G.age}岁含恨离世。`;
    }
  });
}

    showModal('⚕️ 身体无恙','你目前没有任何疾病，无需治疗。',

    return;
  }

  showModal('⚕️ 选择要治疗的疾病','你目前患有：',
    G.diseases.map((d,i)=>({label:`${d.icon} ${d.name}（${['','轻症','中症','重症','危症'][d.level]}）`,sub:d.desc,cost:'',id:String(i)})),
    (id)=>{closeModal();openDoctorSelect(parseInt(id));});
}

function openDoctorSelect(diseaseIdx){
  const d=G.diseases[diseaseIdx];if(!d)return;
  showModal(`⚕️ 治疗【${d.name}】`,`${d.desc}\n\n选择大夫（越贵成功率越高，最低成功率1%，最低失败率1%）：`,
    DOCTORS.filter(doc=>G.money>=doc.cost).map(doc=>({
      label:`${doc.icon} ${doc.name}`,
      sub:'成功率约'+Math.round(Math.min(99,Math.max(1,(d.cureBase+doc.successBonus)*100)))+'%',
      cost:`🪙${doc.cost}文`,id:doc.id
    })).concat(DOCTORS.filter(doc=>G.money<doc.cost).map(doc=>({label:`${doc.icon} ${doc.name}（钱不够）`,sub:'',cost:`🪙${doc.cost}文`,id:'_skip_'+doc.id}))),
    (id)=>{closeModal();if(id.startsWith('_skip_'))return;doTreatment(diseaseIdx,id);});
}

function doTreatment(diseaseIdx,docId){
  const d=G.diseases[diseaseIdx];const doc=DOCTORS.find(x=>x.id===docId);
  if(!d||!doc)return;
  if(G.money<doc.cost){showToast('钱不够！');return;}
  confirmSpend(doc.cost,`⚕️ 请【${doc.name}】治疗【${d.name}】`,()=>{
    G.money-=doc.cost;
    const successRate=Math.min(0.99,Math.max(0.01,d.cureBase+doc.successBonus));
    const success=Math.random()<successRate;
    if(success){
      G.diseases.splice(diseaseIdx,1);
      const healBonus=5+doc.successBonus*20;G.health=clamp(G.health+healBonus);
      addLog(`✅ 【${doc.name}】妙手回春，治愈了【${d.name}】！健康+${Math.round(healBonus)}。`,'good');
      save();render();
      showModal('✅ 治愈成功！',`${doc.emoji} ${doc.name}妙手回春！<br><br>【${d.name}】已痊愈。<br>健康+${Math.round(healBonus)}`,
        [{label:'多谢大夫',sub:'',cost:'',id:'ok'}],()=>closeModal());
    } else {
      const dmg=3+d.level;G.health=clamp(G.health-dmg);
      addLog(`❌ 【${doc.name}】治疗【${d.name}】失败，病情未见好转，健康-${dmg}。`,'bad');
      save();render();
      showModal('❌ 治疗未愈',`${doc.emoji} ${doc.name}开的方子未见成效。<br><br>【${d.name}】仍在缠绕。<br>健康-${dmg}`,
        [{label:'再想办法',sub:'',cost:'',id:'ok'}],()=>closeModal());
    }
  });
}

/* ══════════════════════════════════════════
   VENUE SYSTEM （全屏模态）
══════════════════════════════════════════ */
let _currentVenue=null;
let _venueSpotPeople={};  // {spotId: count}

function openVenue(venueId){
  const loc=LOCATIONS.find(l=>l.id===venueId);if(!loc)return;
  _currentVenue=venueId;
  // Init spot people if not set for this year
  const key='venue_'+venueId+'_'+G.age;
  if(!G._venueData)G._venueData={};
  if(!G._venueData[key]){
    const spotData={};
    loc.spots.forEach(s=>{
      // Randomize people count (0~5)
      spotData[s.id]=Math.max(0,Math.min(5,s.basePeople+Math.floor((Math.random()-0.5)*3)));
    });
    G._venueData[key]=spotData;
  }
  _venueSpotPeople=G._venueData[key];

  // Reset stamina if new venue visit
  if(!G.venueStamina||G.venueStamina<=0) G.venueStamina=100;

  document.getElementById('venue-title').textContent=loc.icon+' '+loc.name;
  document.getElementById('venue-desc').textContent=loc.desc;

  refreshVenueBody(loc);
  document.getElementById('venue-overlay').classList.add('show');
  updateStaminaBar();
}

function closeVenue(){
  document.getElementById('venue-overlay').classList.remove('show');
  _currentVenue=null;
  save();render();
}

function refreshVenueBody(loc){
  if(!loc)loc=LOCATIONS.find(l=>l.id===_currentVenue);if(!loc)return;
  let html='';

  // Special: clinic
  if(loc.id==='clinic'){
    html+=`<div class="venue-spot" onclick="openClinicTreatment()">
      <div class="venue-spot-name">⚕️ 就诊问诊</div>
      <div class="venue-spot-desc">请大夫诊治疾病，选择不同级别大夫影响成功率。</div>
      <div class="venue-spot-people" style="color:var(--red)">${G.diseases&&G.diseases.length>0?'🤒 当前患病：'+G.diseases.map(d=>d.name).join('、'):'身体无恙，无需就诊'}</div>
    </div>`;
    html+=`<div style="font-size:10px;color:var(--muted);margin-top:12px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px">
      <div style="font-weight:600;margin-bottom:6px">大夫一览</div>
      ${DOCTORS.map(d=>`<div style="padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
        <span>${d.icon} ${d.name} <span style="color:var(--faint)">${d.desc}</span></span>
        <span style="color:var(--amber)">🪙${d.cost}文</span>
      </div>`).join('')}
    </div>`;
  } else if(loc.id==='shopst'){
    // Shop
    const items=genYearShop();
    html+=`<div class="ct" style="margin-top:0">杂货铺 — 今年在售商品（包裹 ${G.inventory.length}/${G.bagLimit} · 余钱 🪙${G.money}文）</div>`;
    html+=`<div class="shop-grid">`;
    items.forEach(item=>{
      const tooFull=G.inventory.length>=G.bagLimit&&!item.isGift;
      const cantAfford=G.money<item.price;
      const canBuy=!tooFull&&!cantAfford;
      html+=`<div class="shop-item${canBuy?'':' sold-out'}" onclick="${canBuy?`buyItemVenue('${item.id}')`:''}" title="${tooFull?'包裹已满':cantAfford?'钱不够':''}">
        <div class="si-icon">${item.icon}${item.isJobBook?'<span style="font-size:8px;vertical-align:top;color:var(--amber)">书</span>':item.isGift?'<span style="font-size:8px;vertical-align:top;color:var(--purple)">礼</span>':''}</div>
        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
        <div class="si-price">🪙 ${item.price}文${cantAfford?' · 钱不够':''}</div>
      </div>`;
    });
    html+=`</div>`;
  } else {
    // Social venue: show spots
    loc.spots.forEach(spot=>{
      const count=_venueSpotPeople[spot.id]||0;
      html+=`<div class="venue-spot" onclick="enterSpot('${loc.id}','${spot.id}')">
        <div class="venue-spot-name">${spot.name}</div>
        <div class="venue-spot-desc">${spot.desc}</div>
        <div class="venue-spot-people">👥 当前有 <b>${count}</b> 人${count===0?' · 空无一人':count>=4?' · 人气鼎盛':''}</div>
      </div>`;
    });
  }

  document.getElementById('venue-body').innerHTML=html;
  document.getElementById('venue-year-status').textContent=`⚡ 体力: ${Math.round(G.venueStamina||0)}`;
}

function buyItemVenue(itemId){
  const item=SHOP_ITEMS_POOL.find(i=>i.id===itemId);if(!item)return;
  if(G.money<item.price){showToast('钱不够！');return;}
  if(!item.isGift&&G.inventory.length>=G.bagLimit){showToast('包裹已满！');return;}
  confirmSpend(item.price,`${item.icon} 购买【${item.name}】\n${item.desc}`,()=>{
    G.money-=item.price;
    G.inventory.push({id:item.id,name:item.name,icon:item.icon,effect:item.effect,isGift:item.isGift||false,isJobBook:item.isJobBook||false,giftTrait:item.giftTrait||[],favorBonus:item.favorBonus||0});
    addLog(`🛍️ 在商铺购入【${item.name}】，花费 ${item.price}文。`,'info');
    save();refreshVenueBody();showToast(`已购入【${item.name}】！`);
  });
}

function updateStaminaBar(){
  const st=Math.round(G.venueStamina||0);
  const fill=document.getElementById('stamina-fill');
  const val=document.getElementById('stamina-val');
  if(fill)fill.style.width=st+'%';
  if(val)val.textContent=st+'/100';
}

function staminaCost(){
  // 健康越低体力消耗越多
  return Math.round(8+Math.max(0,(100-G.health)/100*12));
}

function restStamina(){
  const gain=15+Math.floor(Math.random()*10);
  G.venueStamina=Math.min(100,(G.venueStamina||0)+gain);
  G.mood=clamp(G.mood+1);
  showToast(`歇息片刻，体力+${gain}`);
  updateStaminaBar();
  document.getElementById('venue-year-status').textContent=`⚡ 体力: ${Math.round(G.venueStamina)}`;
  save();
}

function enterSpot(venueId,spotId){
  const loc=LOCATIONS.find(l=>l.id===venueId);
  const spot=loc&&loc.spots.find(s=>s.id===spotId);
  if(!spot)return;

  const cost=staminaCost();
  if((G.venueStamina||0)<cost){showToast(`体力不足（需${cost}），请先休息！`);return;}

  G.venueStamina=Math.max(0,(G.venueStamina||0)-cost);
  updateStaminaBar();

  const count=_venueSpotPeople[spotId]||0;
  if(count===0){
    showToast('这里没有人，转身离开。');
    // Shift some people
    _venueSpotPeople[spotId]=Math.floor(Math.random()*2);
    save();refreshVenueBody();
    return;
  }

  // Generate a person here
  const person=genNPC(G.gender);
  const initFavor=5+Math.floor(Math.random()*15);
  person.favor=initFavor;person.venue=venueId;

  // Show interaction
  showModal(
    `${spot.name} — 遇到了陌生人`,
    `${person.emoji} <b>${person.name}</b>（${person.age}岁 · ${person.gender==='male'?'男':'女'}）\n职业：${person.job} · 家境：${person.bg}\n性格：${person.trait}\n\n初始好感：${initFavor}/100`,
    [{label:'💬 搭话聊天',sub:'好感达20可选择结交',cost:`⚡${cost}`,id:'chat'},
     {label:'🚶 无视继续逛',sub:'不互动，四处看看',cost:'',id:'skip'}],
    (id)=>{
      closeModal();
      if(id==='chat'){
        const rate=0.35+(G.charm/100)*0.4+(G.intel/100)*0.2;
        const success=roll(rate);
        if(success){
          const gain=8+Math.floor(Math.random()*12);person.favor=Math.min(100,initFavor+gain);
          G.mood=clamp(G.mood+3);
          if(person.favor>=20){
            // Ask to add to social circle
            showModal(`🤝 与 ${person.name} 聊得甚欢`,
              `${person.emoji} ${person.name} 对你颇有好感（${person.favor}/100）。\n\n是否结交，加入社交圈？`,
              [{label:'✅ 结交为友',sub:'加入社交圈',cost:'',id:'yes'},{label:'↩ 点头道别',sub:'',cost:'',id:'no'}],
              (id2)=>{
                closeModal();
                if(id2==='yes'){
                  if(!G.npcs)G.npcs=[];if(G.npcs.length>=12)G.npcs.shift();
                  G.npcs.push(person);
                  addLog(`${loc.icon} 在${loc.name}·${spot.name} 结识了 ${person.name}（好感${person.favor}）。`,'event');
                }
                _venueSpotPeople[spotId]=Math.max(0,count-1+Math.floor(Math.random()*2));
                save();refreshVenueBody();
              });
          } else {
            showToast(`聊得不错，好感${person.favor}，仍未到结交门槛（20）。`);
            _venueSpotPeople[spotId]=Math.max(0,count-1+Math.floor(Math.random()*2));
            save();refreshVenueBody();
          }
        } else {
          G.mood=clamp(G.mood-2);showToast('话不投机，颇为尴尬。');
          _venueSpotPeople[spotId]=Math.max(0,count-1);
          save();refreshVenueBody();
        }
      } else {
        _venueSpotPeople[spotId]=Math.max(0,count+Math.floor((Math.random()-0.5)*2));
        save();refreshVenueBody();
      }
    }
  );
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function openNPCInteract(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;
  const alreadyChat=actionDone('interact_'+npc.id);
  const alreadyMoney=actionDone('giveMoney_'+npc.id);
  const alreadyGift=actionDone('giftBag_'+npc.id);
  const canPropose=npc.favor>=80&&!G.married;
  const canConcubine=npc.favor>=70&&G.married;
  const sameGender=npc.gender===G.gender;
  const gifts=G.inventory.filter(i=>i.isGift);
  const opts=[];
  opts.push({label:'💬 聊天叙旧',sub:alreadyChat?'今年已互动':'魅力/智识影响好感',cost:'',id:'chat'});
  if(gifts.length>0)opts.push({label:'🎁 赠送礼物',sub:alreadyGift?'今年已赠礼':`包裹中有${gifts.length}件礼物`,cost:'',id:'gift'});
  opts.push({label:'💰 赠送钱财',sub:alreadyMoney?'今年已赠钱':'花费文钱，增加好感',cost:'',id:'money'});
  if(canPropose)opts.push({label:sameGender?'💍 求婚':'💍 提亲',sub:'好感≥80',cost:'',id:'propose'});
  if(canConcubine)opts.push({label:'🏮 纳为妾室/面首',sub:'好感≥70，已婚可纳',cost:'',id:'concubine'});
  if(npc.favor>=90)opts.push({label:'🤝 结为挚友',sub:'好感≥90',cost:'',id:'bestfriend'});
  opts.push({label:'🚪 疏远此人',sub:'从社交圈移除',cost:'',id:'remove'});
  showModal(`${npc.emoji} ${npc.name}`,`${npc.gender==='male'?'男':'女'} · ${npc.age}岁 · ${npc.job}\n${npc.bg}家境 · ${npc.trait}\n好感度：${npc.favor}/100`,opts,
    (id)=>{closeModal();
      if(id==='chat')doNPCChat(idx);
      else if(id==='gift')doNPCGiftFromBag(idx);
      else if(id==='money')doNPCGiveMoney(idx);
      else if(id==='propose')proposeToNPC(idx);
      else if(id==='concubine')offerConcubine(idx);
      else if(id==='bestfriend')doNPCBestFriend(idx);
      else if(id==='remove')removeNPC(idx);
    });
}

function doNPCChat(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;
  const key='interact_'+npc.id;if(actionDone(key)){showToast('今年已经和此人聊过了！');return;}
  markAction(key);
  const success=roll(0.3+(G.charm/100)*0.4+(G.intel/100)*0.2);
  if(success){
    const gain=5+Math.floor(Math.random()*10);npc.favor=Math.min(100,npc.favor+gain);G.mood=clamp(G.mood+3);
    addLog(`🍵 与 ${npc.name} 相谈甚欢，好感+${gain}。`,'good');
    showModal('🍵 相谈甚欢',`与 <b>${npc.name}</b> 促膝而谈。<br><br>好感+${gain}（现为${npc.favor}/100）${npc.favor>=80?'<br>💡 好感已达80，可提亲！':''}`,
      [{label:'甚好',sub:'',cost:'',id:'ok'}],()=>{closeModal();save();render();});
  } else {
    const loss=2+Math.floor(Math.random()*4);npc.favor=Math.max(0,npc.favor-loss);
    addLog(`😅 与 ${npc.name} 话不投机，好感-${loss}。`,'bad');
    showModal('😅 话不投机',`与 <b>${npc.name}</b> 交谈尴尬。<br><br>好感-${loss}（现为${npc.favor}/100）`,
      [{label:'有些尴尬',sub:'',cost:'',id:'ok'}],()=>{closeModal();save();render();});
  }
  save();render();
}

function doNPCGiftFromBag(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;
  const key='giftBag_'+npc.id;if(actionDone(key)){showToast('今年已经送过礼了！');return;}
  const gifts=G.inventory.map((item,i)=>({item,i})).filter(({item})=>item.isGift);
  if(gifts.length===0){showToast('包裹里没有礼物！');return;}
  const opts=gifts.map(({item,i})=>{
    const matched=item.giftTrait&&item.giftTrait.length>0&&item.giftTrait.includes(npc.trait);
    const bonus=matched?Math.round(item.favorBonus*1.5):item.favorBonus;
    return {label:`${item.icon} ${item.name}`,sub:`好感+${bonus}${matched?' ✨投其所好':''}`,cost:'',id:String(i)};
  });
  showModal(`🎁 赠送礼物给 ${npc.name}`,`对方性格：${npc.trait}`,opts,(id)=>{
    closeModal();const slotIdx=parseInt(id);const item=G.inventory[slotIdx];if(!item)return;
    const matched=item.giftTrait&&item.giftTrait.length>0&&item.giftTrait.includes(npc.trait);
    const bonus=matched?Math.round(item.favorBonus*1.5):item.favorBonus;
    npc.favor=Math.min(100,npc.favor+bonus);G.inventory.splice(slotIdx,1);
    markAction('giftBag_'+npc.id);
    addLog(`🎁 将【${item.name}】送给 ${npc.name}，好感+${bonus}${matched?'（投其所好）':''}。`,'good');
    save();render();showModal('🎁 赠礼成功',`${npc.emoji} ${npc.name} ${matched?'喜笑颜开！':'礼貌收下。'}<br><br>好感+${bonus}（现为${npc.favor}/100）${matched?'<br>✨ 投其所好，效果加成！':''}`,
      [{label:'好的',sub:'',cost:'',id:'ok'}],()=>closeModal());
  });
}

function doNPCGiveMoney(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;
  const key='giveMoney_'+npc.id;if(actionDone(key)){showToast('今年已经给过钱了！');return;}
  const cost=20+Math.floor(G.age/10)*5;if(G.money<cost){showToast(`赠钱需要 ${cost}文！`);return;}
  confirmSpend(cost,`💰 赠送 ${cost}文 给 ${npc.name}`,()=>{
    markAction(key);G.money-=cost;const gain=8+Math.floor(Math.random()*8);npc.favor=Math.min(100,npc.favor+gain);
    addLog(`💰 赠给 ${npc.name} ${cost}文，好感+${gain}。`,'good');save();render();
    showModal('💰 慷慨解囊',`${npc.emoji} ${npc.name} 感激不已。<br><br>好感+${gain}（现为${npc.favor}/100）`,
      [{label:'举手之劳',sub:'',cost:'',id:'ok'}],()=>closeModal());
  });
}

function doNPCBestFriend(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;if(npc.favor<90){showToast('好感度不足90！');return;}
  npc.role='bestfriend';addLog(`🤝 与 ${npc.name} 结为挚友！`,'event');save();render();
  showModal('🤝 结为挚友',`${npc.emoji} <b>${npc.name}</b> 与你结为一生挚友！<br><br>好感不再自然衰减。`,
    [{label:'一生之交！',sub:'',cost:'',id:'ok'}],()=>closeModal());
}

function removeNPC(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;
  if(!confirm(`确定要疏远 ${npc.name} 吗？`))return;G.npcs.splice(idx,1);save();render();
}

function proposeToNPC(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;
  if(npc.favor<80){showToast('好感度不足80！');return;}if(G.married){showToast('你已有配偶！');return;}
  const sameGender=npc.gender===G.gender;
  showModal(`💑 向 ${npc.name} 提亲`,
    `${npc.emoji} <b>${npc.name}</b>（${npc.age}岁）\n家境：${npc.bg} · 身家：约${npc.money}文\n性格：${npc.trait}\n好感度：${npc.favor}/100\n${npc.estates&&npc.estates.length>0?'随嫁地产：'+npc.estates.map(e=>e.name).join('、'):'无随嫁地产'}\n${sameGender?'（同性结合，无法孕育子嗣）':''}`,
    [{label:`💍 正式提亲`,sub:sameGender?'同性婚姻':'缔结良缘',cost:'',id:'yes'},{label:'↩ 再考虑一下',sub:'',cost:'',id:'no'}],
    (id)=>{closeModal();if(id==='yes')sendProposal(npc,sameGender);});
}

function sendProposal(npc,sameGender){
  const agreeRate=0.3+(npc.favor-80)/20*0.5;
  if(roll(agreeRate)){doMarryNPC(npc,sameGender);}
  else{G.mood=clamp(G.mood-12);npc.favor=clamp(npc.favor-15);addLog(`💔 ${npc.name} 婉言谢绝了提亲。`,'bad');
    showModal('💔 提亲结果',`${npc.emoji} ${npc.name} 婉言谢绝。\n\n好感-15，心情受损。`,
      [{label:'↩ 黯然离去',sub:'',cost:'',id:'ok'}],()=>{closeModal();save();render();});}
}

function doMarryNPC(npc,sameGender){
  if(!G.npcs)G.npcs=[];G.npcs=G.npcs.filter(n=>n.id!==npc.id);
  G.married=true;G.spouseName=npc.name;G.spouseEmoji=npc.emoji;G.spouseGender=npc.gender;
  G.spouseBg=npc.bg;G.spouseMoney=npc.money;G.spouseEstates=npc.estates||[];G.spouseFavor=80;
  G.sameGenderMarriage=sameGender||false;
  if(npc.estates&&npc.estates.length>0)npc.estates.forEach(e=>G.estates.push({...e,eid:'se_'+Date.now()+Math.random(),residents:[]}));
  G.mood=clamp(G.mood+20);
  // Auto-add spouse to an estate if space available
  const availEstate=G.estates.find(e=>!(e.residents||[]).includes(npc.name)&&(e.residents||[]).length<e.capacity);
  if(availEstate){if(!availEstate.residents)availEstate.residents=[];availEstate.residents.push(npc.name);}
  addLog(`🎊 与 ${npc.name} 喜结连理！${sameGender?'（同性结合）':''}${npc.estates&&npc.estates.length>0?' 对方带来'+npc.estates.map(e=>e.name).join('、')+'。':''}`, 'event');
  showModal('🎊 大喜之日！',`${npc.emoji} <b>${npc.name}</b> 欣然应允，喜结连理！<br><br>${sameGender?'✨ 同性结合，无法孕育子嗣。<br><br>':''}${npc.estates&&npc.estates.length>0?'💰 随嫁地产：'+npc.estates.map(e=>e.icon+e.name).join('、')+'<br><br>':''}配偶好感度：${G.spouseFavor}/100`,
    [{label:'🎉 成婚大吉！',sub:'',cost:'',id:'ok'}],()=>{closeModal();save();render();});
}

function blindDate(e){
  const btn=e&&e.currentTarget;if(actionDone('blindDate')){showToast('今年已经相亲过了！');return;}
  markAction('blindDate');
  const candidate=genNPCGender(G.gender==='male'?'female':'male');
  showModal('💑 媒人来访',

function haveChild(e){
  const btn=e&&e.currentTarget;if(actionDone('haveChild')){showToast('今年已经尝试过了！');return;}
  if(G.sameGenderMarriage){showToast('同性结合，无法孕育子嗣。');return;}
  // Need estate space
  const mainEstate=G.estates&&G.estates.find(e=>{
    const concubineNames=(G.concubines||[]).map(c=>c.name);
    const hasConcubine=(e.residents||[]).some(r=>concubineNames.includes(r));
    return !hasConcubine&&(e.residents||[]).length<e.capacity;
  });
  if(G.estates&&G.estates.length>0&&!mainEstate){showToast('名下房产已住满或均有妾室居住，无法生子！');return;}
  markAction('haveChild');
  const agePenalty=G.age>40?0.2:G.age>35?0.1:0;
  const rate=clamp(0.25+(G.health/100)*0.3-agePenalty,0.05,0.6);
  if(roll(rate)){
    const isMale=Math.random()>0.5;const childName=G.surname+(isMale?MALE_NAMES:FEMALE_NAMES)[Math.floor(Math.random()*MALE_NAMES.length)];
    const childEmoji=(isMale?MALE_EMOJI:FEMALE_EMOJI)[Math.floor(Math.random()*3)];
    const child={name:childName,gender:isMale?'male':'female',emoji:childEmoji,age:0};G.children.push(child);
    if(mainEstate){if(!mainEstate.residents)mainEstate.residents=[];mainEstate.residents.push(childName);}
    G.mood=clamp(G.mood+15);if(G.spouseFavor)G.spouseFavor=clamp(G.spouseFavor+5);
    addLog(`🎉 ${isMale?'子':'女'} ${childName} 呱呱坠地，家中添丁！`,'good');showResult(btn,'添丁！','good');
    showModal('🎊 喜得子嗣！',`${childEmoji} <b>${childName}</b> 降生，${isMale?'男孩':'女孩'}。`,
      [{label:'🎉 大吉大利！',sub:'',cost:'',id:'ok'}],()=>closeModal());
  } else {
    addLog(`👶 今年未能添丁，来年再盼。`,'info');showResult(btn,'未能添丁','info');
  }
  save();render();
}

function offerConcubine(idx){
  const npc=G.npcs&&G.npcs[idx];if(!npc)return;if(!G.married){showToast('尚未成婚！');return;}
  const spareEstate=G.estates.find(e=>{
    const hasKids=G.children.some(c=>e.residents&&e.residents.includes(c.name));
    const occupied=(e.residents&&e.residents.length||0);return occupied<e.capacity&&!hasKids;
  });
  if(!spareEstate){showToast('需要一间空置（无孩子）的额外房产才能纳妾！');return;}
  if(npc.favor<70){showToast('好感度不足70，对方不愿意！');return;}
  const role=G.gender==='male'?'concubine':'lover';const roleLabel=G.gender==='male'?'妾室':'面首';
  const cost=200;
  confirmSpend(cost,`将 ${npc.name} 纳为${roleLabel}（将入住${spareEstate.name}）`,()=>{
    G.money-=cost;if(!G.concubines)G.concubines=[];
    const c={name:npc.name,gender:npc.gender,emoji:npc.emoji,age:npc.age,favor:npc.favor,role,estateId:spareEstate.eid||spareEstate.id};
    G.concubines.push(c);if(!spareEstate.residents)spareEstate.residents=[];spareEstate.residents.push(npc.name);
    G.npcs=G.npcs.filter(n=>n.id!==npc.id);addLog(`🏮 将 ${npc.name} 纳为${roleLabel}，入住${spareEstate.name}。`,'event');
    save();render();showToast(`${npc.name} 已成为你的${roleLabel}。`);
  });
}

function dismissConcubine(idx){
  const c=G.concubines&&G.concubines[idx];if(!c)return;
  if(!confirm(`确定遣散 ${c.name} 吗？`))return;
  G.estates.forEach(e=>{if(e.residents)e.residents=e.residents.filter(n=>n!==c.name);});
  const dismissedName=c.name,dismissedRole=c.role==='concubine'?'妾室':'面首';
  G.concubines.splice(idx,1);addLog(`📜 遣散了${dismissedRole} ${dismissedName}。`,'info');save();
  showModal('📜 遣散',`${dismissedRole} ${dismissedName} 已离开。`,
    [{label:'好聚好散',sub:'',cost:'',id:'ok'}],()=>{closeModal();render();});
}

function buildNPC(gender){
  const isMale=gender==='male';
  const surname=SURNAMES[Math.floor(Math.random()*SURNAMES.length)];
  const given=(isMale?MALE_NAMES:FEMALE_NAMES)[Math.floor(Math.random()*MALE_NAMES.length)];
  const bg=NPC_BG[Math.floor(Math.random()*NPC_BG.length)];
  const[mlo,mhi]=NPC_BG_MONEY[bg];const money=mlo+Math.floor(Math.random()*(mhi-mlo));
  const job=NPC_JOBS[Math.floor(Math.random()*NPC_JOBS.length)];
  const trait=NPC_TRAITS[Math.floor(Math.random()*NPC_TRAITS.length)];
  const emoji=(isMale?MALE_EMOJI:FEMALE_EMOJI)[Math.floor(Math.random()*3)];
  let estates=[];
  if(money>=300&&Math.random()<0.5){const e=ESTATES[1+Math.floor(Math.random()*3)];estates=[{...e,eid:'nse_'+Date.now()+Math.floor(Math.random()*9999),residents:[]}];}
  else if(money>=80&&Math.random()<0.3){estates=[{...ESTATES[0],eid:'nse_'+Date.now()+Math.floor(Math.random()*9999),residents:[]}];}
  return {id:'npc_'+Date.now()+'_'+Math.floor(Math.random()*9999),name:surname+given,gender,emoji,age:14+Math.floor(Math.random()*30),job,bg,money,trait,estates,favor:0,role:'friend',venue:''};
}

function useItem(slotIdx){
  const item=G.inventory[slotIdx];if(!item)return;
  if(item.isGift){
    const npcs=G.npcs||[];if(npcs.length===0){showToast('没有可以赠送的人！');return;}
    const opts=npcs.map((npc,i)=>{
      const matched=item.giftTrait&&item.giftTrait.length>0&&item.giftTrait.includes(npc.trait);
      const bonus=matched?Math.round(item.favorBonus*1.5):item.favorBonus;
      return{label:`${npc.emoji} ${npc.name}（${npc.trait}）`,sub:`好感+${bonus}${matched?' ✨投其所好':''}`,cost:'',id:String(i)};
    });
    showModal(`${item.icon} 赠送【${item.name}】`,'选择赠送对象：',opts,(id)=>{
      closeModal();const idx=parseInt(id);const npc=npcs[idx];if(!npc)return;
      const matched=item.giftTrait&&item.giftTrait.length>0&&item.giftTrait.includes(npc.trait);
      const bonus=matched?Math.round(item.favorBonus*1.5):item.favorBonus;
      npc.favor=Math.min(100,npc.favor+bonus);G.inventory.splice(slotIdx,1);
      addLog(`🎁 将【${item.name}】送给 ${npc.name}，好感+${bonus}${matched?'（投其所好）':''}。`,'good');save();render();
    });return;
  }
  const effectDesc=item.effect?Object.entries(item.effect).map(([k,v])=>{const names={health:'健康',mood:'心情',intel:'智识',charm:'魅力',bagExpand:'包裹',jobProf:'职业熟练度'};return`${names[k]||k}+${v}`;}).join('  '):'';
  showModal('📦 使用物品',`${item.icon} ${item.name}\n效果：${effectDesc||'特殊'}\n\n确认使用？`,
    [{label:`✅ 确认使用`,sub:effectDesc,cost:'',id:'yes'}],(id)=>{
      closeModal();const e=item.effect||{};let msg=`✨ 使用了【${item.name}】`;
      if(e.health){G.health=clamp(G.health+e.health);msg+=`，健康+${e.health}`;}
      if(e.mood){G.mood=clamp(G.mood+e.mood);msg+=`，心情+${e.mood}`;}
      if(e.intel){G.intel=clamp(G.intel+e.intel);msg+=`，智识+${e.intel}`;}
      if(e.charm){G.charm=clamp(G.charm+e.charm);msg+=`，魅力+${e.charm}`;}
      if(e.bagExpand){G.bagLimit=Math.min(20,G.bagLimit+e.bagExpand);msg+=`，包裹上限+${e.bagExpand}（现${G.bagLimit}）`;}
      if(e.jobProf){
        const cj=JOBS.find(j=>j.id===G.job);
        const matchJob=item.jobId?item.jobId===G.job:true;
        if(cj&&cj.id!=='none'&&matchJob){G.jobProf+=e.jobProf;msg+=`，熟练度+${e.jobProf}`;checkPromotion();}
        else if(!matchJob){const targetJob=JOBS.find(j=>j.id===item.jobId);msg+=`（此书仅适用于${targetJob?targetJob.name:'对应职业'}，当前职业不符，无效）`;}
        else{msg+=`（当前无业，无效）`;}
      }
      G.inventory.splice(slotIdx,1);addLog(msg+'。','good');save();render();
    });
}

function inheritChild(idx){
  const child=G.children[idx];if(!child||child.age<18){showToast('子嗣尚未成年！');return;}
  const prev={name:G.name,emoji:G.emoji,age:G.age,money:G.money};
  const newAncestors=[...G.ancestors,{name:G.name,emoji:G.emoji,age:G.age,rel:'先祖'}];
  const inheritMoney=Math.floor(G.money*0.4);
  initGame(prev);
  G.name=child.name;G.given=child.name.slice(1);G.surname=child.name[0];
  G.gender=child.gender;G.emoji=child.emoji;G.age=child.age;
  G.money=inheritMoney+50;G.ancestors=newAncestors;G.log=[];
  addLog(`🌅 承继 ${newAncestors[newAncestors.length-1].name} 之遗志，${child.name} 开始书写自己的人生。`,'event');
  save();render();
}

/* ══════════════════════════════════════════
   NEXT YEAR — sequential log popups
══════════════════════════════════════════ */
function nextYear(){
  G.age+=1;G.yearsLived+=1;
  G.salaryCollectedThisYear=false;G.parentMoneyAskedThisYear=false;
  G.tasksDoneThisYear=[];G.actionsThisYear=[];
  G._shopSeed=false;G._shopYear=-1;
  G._yearTasksAge=-1;
  G.venueStamina=100;  // reset stamina each year
  if(!G.diseases)G.diseases=[];
  if(!G.npcs)G.npcs=[];

  const yearEvents=[];  // collect log entries to show sequentially

  // Age children
  G.children.forEach(c=>c.age+=1);

  // Auto salary
  const job=JOBS.find(j=>j.id===G.job);
  if(job&&G.job!=='none'&&G.age>=job.minAge&&G.age<=job.maxAge){
    const rankMult=1+G.jobRank*0.3;
    const lo=Math.round(job.salaryRange[0]*rankMult);const hi=Math.round(job.salaryRange[1]*rankMult);
    const rankLabel=job.ranks[Math.min(G.jobRank,job.ranks.length-1)];
    const success=roll(0.75+G.jobRank*0.04);
    if(success){
      const earned=lo+Math.floor(Math.random()*(hi-lo+1));G.money+=earned;G.totalMoney+=earned;
      yearEvents.push({icon:'💰',title:`【${rankLabel}】薪俸到手`,body:`本年薪俸已结清。<br><br>入账 <b style="color:var(--amber)">+${earned} 文</b><br>当前余钱：${G.money} 文`,type:'good'});
      addLog(`💰 【${rankLabel}】薪俸 +${earned}文。`,'good');
    } else {
      const ded=Math.floor((lo+hi)/4);G.money=Math.max(0,G.money-ded);
      yearEvents.push({icon:'😤',title:'业绩扣款',body:`今年差事办得不妥，被扣去 <b style="color:var(--red)">${ded} 文</b>。`,type:'bad'});
      addLog(`😤 业绩不佳，被扣 ${ded}文。`,'bad');
    }
  }

  // Estate income
  if(G.estates&&G.estates.length>0){
    let estateIncome=0;
    G.estates.forEach(e=>{if(e.incomePerYear>0){estateIncome+=e.incomePerYear+(Math.floor(Math.random()*10)-5);}});
    if(estateIncome>0){G.money+=estateIncome;G.totalMoney+=estateIncome;addLog(`🏠 地产收入 +${estateIncome}文。`,'good');}
  }

  // Disease effects
  checkDisease();
  if(G.diseases&&G.diseases.length>0){
    yearEvents.push({icon:'🤒',title:'疾病困扰',body:`你目前患有：<br><br>${G.diseases.map(d=>`${d.icon} <b>${d.name}</b> — ${d.desc}`).join('<br>')}<br><br>请前往<b>地点 → 医馆</b>就诊！`,type:'bad'});
  }

  // Concubine events
  if(G.concubines&&G.concubines.length>0&&G.married){
    G.concubines.forEach((c,i)=>{
      if(c.favor>=80&&Math.random()<0.12){
        yearEvents.push({icon:'🏮',title:`${c.name} 要求扶正`,
          body:`${c.emoji} ${c.name}（好感${c.favor}）哭诉多年情深，求你扶正她为正室。<br><br>若答应：${G.spouseName}好感-30，${c.name}好感+20<br>若拒绝：${c.name}好感-20`,
          type:'event',opts:[{label:'✅ 扶正为妻',id:'yes'},{label:'❌ 婉言安抚',id:'no'}],
          onAction:(id)=>{if(id==='yes'){G.spouseFavor=clamp((G.spouseFavor||50)-30);c.favor=clamp(c.favor+20);addLog(`📜 扶正 ${c.name} 为正室。`,'event');}
          else{c.favor=clamp(c.favor-20);if(c.favor<30){G.concubines.splice(i,1);addLog(`💔 ${c.name} 心灰意冷，悄然离去。`,'bad');}
          else{addLog(`😞 婉言安抚 ${c.name}。`,'info');}}}});
        addLog(`🏮 妾室 ${c.name} 要求扶正……`,'event');
      }
    });
  }

  if(G.married&&G.concubines&&G.concubines.length>0&&Math.random()<0.15){
    const c=G.concubines[0];G.spouseFavor=clamp((G.spouseFavor||50)-15);
    addLog(`😡 ${G.spouseName} 察觉到了 ${c.name} 的存在，好感-15。`,'bad');
    if((G.spouseFavor||50)<25&&Math.random()<0.4){
      const exSpouseName=G.spouseName;
      G.married=false;G.spouseName=null;G.spouseEmoji=null;G.spouseFavor=50;G.mood=clamp(G.mood-25);
      addLog(`💔 ${exSpouseName} 无法忍受，提出和离！`,'bad');
    }
  }

  // NPC decay
  G.npcs.forEach(npc=>{
    if(npc.role==='bestfriend')return;
    if(!actionDone('interact_'+npc.id)&&Math.random()<0.3)npc.favor=Math.max(0,npc.favor-3);
  });
  G.npcs=G.npcs.filter(n=>n.favor>0||n.role==='bestfriend');

  // Parent mortality
  G.parents.forEach(p=>{
    if(p.alive&&Math.random()<0.03+(G.age*0.002)){
      p.alive=false;addLog(`💔 ${p.rel} ${p.name} 已离世，往事如烟。`,'bad');G.mood=clamp(G.mood-15);
      if(p.favor==null)p.favor=G.parentFavor||50;p.favor=0;G.parentFavor=clamp(G.parentFavor-10);
      yearEvents.push({icon:'💔',title:`${p.rel}离世`,body:`${p.emoji} ${p.name} 已离世，往事如烟。<br><br>心情-15，愿${p.rel}一路走好。`,type:'bad'});
    }
  });

  // Attribute decay
  const healthDecay=1+Math.floor(Math.random()*2)+(G.age>=40?1:0)+(G.age>=55?2:0)+(G.age>=70?3:0);
  const moodDecay=Math.floor(Math.random()*3);
  let charmDecay=0;
  if(G.age<20)charmDecay=Math.random()<0.15?1:0;
  else if(G.age<35)charmDecay=Math.random()<0.30?1:0;
  else if(G.age<50)charmDecay=1+(Math.random()<0.4?1:0);
  else if(G.age<65)charmDecay=1+Math.floor(Math.random()*2);
  else charmDecay=2+Math.floor(Math.random()*2);
  let intelDecay=0;
  if(G.age<25)intelDecay=Math.random()<0.10?1:0;
  else if(G.age<40)intelDecay=Math.random()<0.25?1:0;
  else if(G.age<55)intelDecay=Math.random()<0.50?1:0;
  else if(G.age<70)intelDecay=1+(Math.random()<0.35?1:0);
  else intelDecay=2+Math.floor(Math.random()*2);
  G.health=clamp(G.health-healthDecay);G.mood=clamp(G.mood-moodDecay);G.charm=clamp(G.charm-charmDecay);G.intel=clamp(G.intel-intelDecay);

  // School
  if(G.inSchool){
    const bg=FAMILY_BG[G.familyBg]||FAMILY_BG.normal;const isFree=bg.freeSchoolAge>0&&G.age<bg.freeSchoolAge;
    if(G.age>18){G.inSchool=false;addLog(`📚 年岁渐长，离开了学堂。`,'info');}
    else if(!isFree&&G.money>=20){G.money-=20;G.schoolYears++;const ev=SCHOOL_EVENTS[Math.floor(Math.random()*SCHOOL_EVENTS.length)];G.intel=clamp(G.intel+4+(ev.intel||0));G.mood=clamp(G.mood+(ev.mood||0));addLog(`📖 ${ev.text}`,'info');}
    else if(!isFree&&G.money<20){G.inSchool=false;addLog(`📚 交不起学费，不得不辍学。`,'bad');}
    else{G.schoolYears++;const ev=SCHOOL_EVENTS[Math.floor(Math.random()*SCHOOL_EVENTS.length)];G.intel=clamp(G.intel+4+(ev.intel||0));G.mood=clamp(G.mood+(ev.mood||0));addLog(`📖 ${ev.text}`,'info');}
  }

  // Job age out
  if(job&&G.job!=='none'){
    if(G.age>job.maxAge){addLog(`👴 年岁太大，从 ${job.name} 退休。`,'info');G.job='none';G.jobRank=0;G.jobProf=0;}
    else if(job.dangerRisk&&Math.random()<0.12){G.health=clamp(G.health-20);addLog(`⚔️ 在战场上受了重伤！健康大减。`,'bad');}
  }

  // Random event
  const eligible=RANDOM_EVENTS.filter(e=>{
    if(G.age<e.age[0]||G.age>e.age[1])return false;
    if(e.job&&e.job!==G.job)return false;if(e.reqIntel&&G.intel<e.reqIntel)return false;return true;
  });
  const weights=eligible.map(e=>e.w);const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total,ev;
  for(let i=0;i<eligible.length;i++){r-=eligible[i].w;if(r<=0){ev=eligible[i];break;}}
  if(!ev)ev=eligible[0];
  if(ev){if(ev.money){G.money+=ev.money;if(ev.money>0)G.totalMoney+=ev.money;}if(ev.health)G.health=clamp(G.health+ev.health);if(ev.mood)G.mood=clamp(G.mood+ev.mood);if(ev.intel)G.intel=clamp(G.intel+ev.intel);if(ev.charm)G.charm=clamp(G.charm+ev.charm);addLog(ev.text,ev.type==='good'?'good':ev.type==='bad'?'bad':'info');}

  // Death check
  let dead=false,cause='';
  if(G.age>=G.maxAge){dead=true;cause=`寿终正寝，${G.age}岁无病而终，乃是喜丧。`;}
  else if(G.health<=0){dead=true;cause=`因病体虚，油尽灯枯，${G.age}岁与世长辞。`;}
  else if(G.mood<=0){dead=true;cause=`心灰意冷，郁郁寡欢，${G.age}岁抑郁而终。`;}
  else if(G.money<-200){dead=true;cause=`家贫如洗，饥寒交迫，${G.age}岁含冤离世。`;}
  else if(G.dead){dead=true;}

  if(dead){G.dead=true;G.deathCause=cause||G.deathCause;addLog(`☠️ ${cause||G.deathCause}`,'bad');save();renderObituary();return;}

  save();render();
  setTimeout(()=>{const lw=document.querySelector('.log-wrap');if(lw)lw.scrollTop=0;},100);

  // Sequential year event popups
  if(yearEvents.length>0){
    showSequentialEvents(yearEvents,0);
  }
}

// Show year-end events one by one as separate popups
function showSequentialEvents(events,idx){
  if(idx>=events.length)return;
  const ev=events[idx];
  const isInteractive=ev.opts&&ev.opts.length>0;
  const opts=isInteractive?ev.opts.map(o=>({label:o.label,sub:'',cost:'',id:o.id})):
    [{label:'继续 →',sub:`${idx+1}/${events.length}`,cost:'',id:'next'}];
  showModal(`${ev.icon} ${ev.title}`,ev.body,opts,(id)=>{
    closeModal();
    if(isInteractive&&ev.onAction)ev.onAction(id);
    save();
    if(idx+1<events.length){setTimeout(()=>showSequentialEvents(events,idx+1),120);}
  });
}

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
let _currentTab='actions';

function switchTab(id){
  _currentTab=id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  event.target.classList.add('on');
}
function restoreTab(){
  const id=_currentTab||'actions';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const panel=document.getElementById('panel-'+id);if(panel)panel.classList.add('on');
  const map={actions:'行动',career:'职业',places:'地点',estate:'地产',bag:'包裹',log:'日志',family:'家族'};
  document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.trim()===map[id])t.classList.add('on');});
}

function showModal(title,sub,opts,onSelect){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-sub').innerHTML=(sub||'').replace(/\n/g,'<br>');
  const optsEl=document.getElementById('modal-opts');optsEl.innerHTML='';
  (opts||[]).forEach(opt=>{
    const el=document.createElement('div');el.className='modal-opt';
    el.innerHTML=`<span>${opt.label}<br><span style="font-size:9px;color:var(--faint)">${opt.sub||''}</span></span><span class="modal-opt-cost">${opt.cost||''}</span>`;
    el.onclick=()=>onSelect(opt.id);optsEl.appendChild(el);
  });
  document.getElementById('modal-actions').innerHTML=`<button class="mclose" onclick="closeModal()">取消</button>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function modalBgClick(e){if(e.target===document.getElementById('modal'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();}});

function confirmSpend(cost,desc,onConfirm){
  showModal('💰 确认花费',`${desc}\n\n需要花费：🪙 ${cost} 文\n当前余钱：🪙 ${G.money} 文`,
    [{label:`✅ 确认花费 ${cost}文`,sub:'',cost:'',id:'yes'}],(id)=>{closeModal();onConfirm();});
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:6px;font-size:11px;font-family:var(--mono);z-index:9999;transition:opacity .3s;white-space:nowrap';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2400);
}

function st(t){localStorage.setItem('moyu-theme',t);document.documentElement.setAttribute('data-theme',t);}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
if(!load())initGame(null);else render();
</script>
