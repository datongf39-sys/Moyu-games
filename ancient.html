<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style id="theme-vars">
[data-theme="white"]{--bg:#f8f8f6;--surface:#ffffff;--card:#ffffff;--border:#e4e4e0;--border-l:#d0d0cc;--text:#1a1a18;--muted:#6b6b66;--faint:#b0b0aa;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#7c3aed;--scanline:none}
[data-theme="dark"]{--bg:#0e0f0e;--surface:#141514;--card:#191a19;--border:#2a2b2a;--border-l:#363736;--text:#e8e8e4;--muted:#8a8a84;--faint:#4a4a46;--green:#4ade80;--green-l:rgba(74,222,128,.1);--amber:#fbbf24;--amber-l:rgba(251,191,36,.1);--blue:#60a5fa;--blue-l:rgba(96,165,250,.1);--red:#f87171;--red-l:rgba(248,113,113,.1);--purple:#c084fc;--scanline:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
[data-theme="mint"]{--bg:#f0f7f4;--surface:#ffffff;--card:#ffffff;--border:#c8e6da;--border-l:#a8d5c2;--text:#1a2e26;--muted:#5a7a6e;--faint:#a0bfb4;--green:#0d9063;--green-l:rgba(13,144,99,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#0369a1;--blue-l:rgba(3,105,161,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#6d28d9;--scanline:none}
[data-theme="sakura"]{--bg:#fdf4f7;--surface:#ffffff;--card:#ffffff;--border:#f0d0dc;--border-l:#e0b0c0;--text:#2a1a20;--muted:#7a5060;--faint:#c4a0b0;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#7c3aed;--blue-l:rgba(124,58,237,.08);--red:#e11d48;--red-l:rgba(225,29,72,.08);--purple:#db2777;--scanline:none}
[data-theme="sky"]{--bg:#f0f6ff;--surface:#ffffff;--card:#ffffff;--border:#c8dcf8;--border-l:#a8c4f0;--text:#1a2040;--muted:#5060a0;--faint:#a0b0d8;--green:#0d9488;--green-l:rgba(13,148,136,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#7c3aed;--scanline:none}
[data-theme="warm"]{--bg:#fdf8f0;--surface:#ffffff;--card:#ffffff;--border:#ede0c8;--border-l:#d8c8a8;--text:#2a2018;--muted:#7a6040;--faint:#c0a878;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--amber-l:rgba(217,119,6,.08);--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--purple:#7c3aed;--scanline:none}
body{transition:background .2s,color .2s}
body::after{background:var(--scanline,none)!important}
@media(max-width:640px){.main-grid{grid-template-columns:1fr!important}.topbar{padding:0 10px!important}.action-grid{grid-template-columns:1fr 1fr!important}}
</style>
<script>(function(){var t=localStorage.getItem("moyu-theme")||"white";document.documentElement.setAttribute("data-theme",t);})();</script>
<title>古代人生 · 摸鱼工作台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root{--mono:'IBM Plex Mono',monospace;--serif:'Noto Serif SC',serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:9999}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100}
.back{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--mono)}.back:hover{color:var(--text)}
.topbar-title{font-family:var(--serif);font-size:15px;font-weight:700}
.main{padding:12px 14px 32px;max-width:960px;margin:0 auto}
.main-grid{display:grid;grid-template-columns:300px 1fr;gap:12px;align-items:start}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.card:last-child{margin-bottom:0}
.ct{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.avatar-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;text-align:center}
.avatar-emoji{font-size:48px;line-height:1;margin-bottom:8px}
.avatar-name{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text)}
.avatar-meta{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.6}
.avatar-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;margin:2px;letter-spacing:.04em}
.tag-age{background:var(--blue-l);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.tag-job{background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2)}
.tag-alive{background:var(--green-l);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.tag-dead{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.tag-married{background:rgba(124,58,237,.08);color:var(--purple);border:1px solid rgba(124,58,237,.2)}
.tag-family{background:rgba(217,119,6,.08);color:var(--amber);border:1px solid rgba(217,119,6,.2)}
.stat-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.stat-label{font-size:10px;color:var(--muted);flex:1}
.stat-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;max-width:80px}
.stat-fill{height:100%;border-radius:3px;transition:width .4s}
.stat-val{font-size:10px;font-weight:500;width:28px;text-align:right}
.money-display{text-align:center;padding:10px 0}
.money-val{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--amber)}
.money-label{font-size:9px;color:var(--faint);margin-top:2px;letter-spacing:.08em}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.action-btn{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:9px 6px;text-align:center;cursor:pointer;transition:all .15s;font-family:var(--mono);position:relative;overflow:hidden}
.action-btn:hover:not(:disabled){border-color:var(--border-l);background:var(--surface);transform:translateY(-1px)}
.action-btn:disabled{opacity:.3;cursor:not-allowed}
.action-btn .ab-icon{font-size:18px;margin-bottom:3px}
.action-btn .ab-name{font-size:9px;color:var(--muted);letter-spacing:.03em;line-height:1.3}
.action-btn .ab-cost{font-size:8px;color:var(--faint);margin-top:2px}
.action-btn.ab-amber{border-color:rgba(217,119,6,.3);background:var(--amber-l)}.action-btn.ab-amber:hover:not(:disabled){background:rgba(217,119,6,.15)}
.action-btn.ab-green{border-color:rgba(22,163,74,.3);background:var(--green-l)}.action-btn.ab-green:hover:not(:disabled){background:rgba(22,163,74,.15)}
.action-btn.ab-red{border-color:rgba(220,38,38,.3);background:var(--red-l)}.action-btn.ab-red:hover:not(:disabled){background:rgba(220,38,38,.15)}
.action-btn.ab-blue{border-color:rgba(37,99,235,.3);background:var(--blue-l)}.action-btn.ab-blue:hover:not(:disabled){background:rgba(37,99,235,.15)}
.action-btn.ab-purple{border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.08)}.action-btn.ab-purple:hover:not(:disabled){background:rgba(124,58,237,.15)}
/* Button click ripple effect */
@keyframes btnRipple{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes btnSuccess{0%{opacity:1}50%{opacity:.7}100%{opacity:1}}
.action-btn.clicked{animation:btnSuccess .3s ease}
.btn-ripple{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);pointer-events:none;animation:btnRipple .45s ease-out forwards}
/* Result flash */
@keyframes resultFlash{0%{opacity:0;transform:translateY(-4px)}30%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-4px)}}
.result-chip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:2px 8px;border-radius:10px;font-size:9px;white-space:nowrap;pointer-events:none;animation:resultFlash 1.6s ease forwards;z-index:10}
.result-chip.good{background:var(--green);color:#fff}
.result-chip.bad{background:var(--red);color:#fff}
.result-chip.info{background:var(--muted);color:#fff}
.log-wrap{background:var(--bg);border:1px solid var(--border);border-radius:4px;height:220px;overflow-y:auto;padding:8px 10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.log-wrap::-webkit-scrollbar{width:3px}.log-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.log-entry{padding:3px 0;border-bottom:1px solid var(--border);font-size:10px;line-height:1.5}
.log-entry:last-child{border-bottom:none}
.log-age{color:var(--faint);margin-right:6px;font-size:9px}
.log-good{color:var(--green)}.log-bad{color:var(--red)}.log-event{color:var(--amber)}.log-info{color:var(--muted)}
.family-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.family-item:last-child{border-bottom:none}
.fi-icon{font-size:18px;flex-shrink:0}
.fi-info{flex:1}
.fi-name{font-size:11px;font-weight:500}
.fi-rel{font-size:9px;color:var(--faint);margin-top:1px}
.fi-btn{font-size:9px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-family:var(--mono);color:var(--muted)}
.fi-btn:hover{color:var(--text);border-color:var(--border-l)}
.fi-btn:disabled{opacity:.3;cursor:not-allowed}
.obituary{text-align:center;padding:24px 16px}
.obit-icon{font-size:52px;margin-bottom:12px}
.obit-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:6px}
.obit-sub{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.obit-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.os{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:10px}
.os-val{font-size:18px;font-weight:600;color:var(--amber)}
.os-lbl{font-size:9px;color:var(--faint);margin-top:2px;letter-spacing:.06em}
.inherit-list{margin-bottom:16px}
.inherit-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.inherit-item:hover{border-color:var(--amber)}
.ii-left{display:flex;align-items:center;gap:8px}
.ii-icon{font-size:20px}
.ii-name{font-size:11px;font-weight:500}
.ii-rel{font-size:9px;color:var(--faint)}
.ii-age{font-size:10px;color:var(--amber)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border:1px solid var(--border-l);border-radius:10px;width:min(440px,92vw);padding:20px;transform:translateY(12px) scale(.97);transition:transform .22s cubic-bezier(.34,1.3,.64,1);box-shadow:0 20px 50px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto}
.modal-overlay.show .modal-box{transform:none}
.modal-title{font-family:var(--serif);font-size:16px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:10px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.modal-opt{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.modal-opt:hover{border-color:var(--amber);background:var(--amber-l)}
.modal-opt-cost{font-size:9px;color:var(--faint)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.mclose{padding:6px 16px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:11px}
.mclose:hover{color:var(--text)}
.mconfirm{padding:6px 16px;border-radius:4px;border:none;background:var(--text);color:var(--bg);cursor:pointer;font-family:var(--mono);font-size:11px}
.mconfirm:hover{opacity:.85}
.next-btn{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-family:var(--serif);font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:opacity .15s;margin-top:4px}
.next-btn:hover{opacity:.85}
.next-btn:disabled{opacity:.3;cursor:not-allowed}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;margin-bottom:0}
.tab{padding:7px 12px;font-size:10px;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--mono);white-space:nowrap;transition:all .12s}
.tab:hover{color:var(--text)}.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.panel{display:none}.panel.on{display:block}
.sec-head{font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:5px 12px;border-radius:3px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .12s;border:1px solid transparent}
.ba{background:var(--amber-l);color:var(--amber);border-color:rgba(217,119,6,.3)}.ba:hover:not(:disabled){background:rgba(217,119,6,.2)}
.bg{background:var(--green-l);color:var(--green);border-color:rgba(22,163,74,.3)}.bg:hover:not(:disabled){background:rgba(22,163,74,.2)}
.br{background:var(--red-l);color:var(--red);border-color:rgba(220,38,38,.3)}.br:hover:not(:disabled){background:rgba(220,38,38,.2)}
.bc{background:var(--blue-l);color:var(--blue);border-color:rgba(37,99,235,.3)}.bc:hover:not(:disabled){background:rgba(37,99,235,.2)}
.btn:disabled{opacity:.3;cursor:not-allowed}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeup{animation:fadeUp .3s ease}
/* Job rank badge */
.job-rank{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2);margin-left:4px}
/* Progress bar for job xp */
.xp-bar-wrap{margin:4px 0 0}
.xp-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;border-radius:2px;background:var(--amber);transition:width .4s}
/* Shop items */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.shop-item{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:9px;cursor:pointer;transition:all .12s;font-family:var(--mono)}
.shop-item:hover:not(.sold-out){border-color:var(--amber);background:var(--amber-l)}
.shop-item.sold-out{opacity:.4;cursor:not-allowed}
.si-icon{font-size:20px;margin-bottom:4px}
.si-name{font-size:10px;font-weight:500;margin-bottom:2px}
.si-desc{font-size:9px;color:var(--faint);line-height:1.4}
.si-price{font-size:10px;color:var(--amber);margin-top:4px;font-weight:600}
/* Inventory */
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.inv-slot{width:100%;aspect-ratio:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;font-size:18px;position:relative}
.inv-slot.empty{cursor:default;opacity:.3}
.inv-slot:not(.empty):hover{border-color:var(--amber);background:var(--amber-l)}
.inv-slot .slot-name{font-size:7px;color:var(--faint);margin-top:2px;text-align:center;line-height:1.2}
.inv-count{font-size:9px;color:var(--muted);margin-bottom:6px}
/* Family favor bar */
.favor-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;width:60px}
.favor-fill{height:100%;border-radius:2px;background:var(--purple);transition:width .4s}
.shop-item.job-book{border-color:rgba(217,119,6,.35);background:rgba(217,119,6,.05)}
.shop-item.job-book:hover:not(.sold-out){background:var(--amber-l)}
.favor-chip{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--purple)}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="location.href='index.html'">← 返回</button>
  <span class="topbar-title">🏯 古代人生模拟</span>
  <div style="display:flex;gap:5px;align-items:center">
    <button onclick="st('white')" title="纸白" style="width:14px;height:14px;border-radius:50%;background:#f8f8f6;border:1px solid #ccc;cursor:pointer;padding:0"></button>
    <button onclick="st('dark')" title="暗黑" style="width:14px;height:14px;border-radius:50%;background:#191a19;border:1px solid #555;cursor:pointer;padding:0"></button>
    <button onclick="st('mint')" title="薄荷" style="width:14px;height:14px;border-radius:50%;background:#a8d5c2;border:1px solid #8abfaa;cursor:pointer;padding:0"></button>
    <button onclick="st('sakura')" title="樱花" style="width:14px;height:14px;border-radius:50%;background:#f0b8cc;border:1px solid #d898b0;cursor:pointer;padding:0"></button>
    <button onclick="st('sky')" title="天空" style="width:14px;height:14px;border-radius:50%;background:#a8c4f0;border:1px solid #88a4d8;cursor:pointer;padding:0"></button>
    <button onclick="st('warm')" title="暖橙" style="width:14px;height:14px;border-radius:50%;background:#e8c878;border:1px solid #c8a858;cursor:pointer;padding:0"></button>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="confirmRestart()" style="font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--red-l);color:var(--red);cursor:pointer;font-family:var(--mono)">⟳ 重开此生</button>
    <span style="font-size:9px;color:var(--faint);letter-spacing:.08em">ANCIENT · v3.0</span>
  </div>
</div>
<div id="app-main"></div>
<div class="modal-overlay" id="modal" onclick="modalBgClick(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-opts" id="modal-opts"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const SURNAMES = ['李','王','张','刘','陈','杨','赵','黄','周','吴','徐','孙','马','朱','胡','郭','何','林','高','梁','郑','罗','宋','谢','唐','韩','曹','许','邓','萧'];
const MALE_NAMES = ['文远','子昂','明德','怀仁','伯阳','仲谦','志远','承恩','若水','清风','景明','玉衡','鸿飞','世杰','元博','正阳','思源','光宗','宏图','廷玉'];
const FEMALE_NAMES = ['婉儿','如月','清荷','玉珠','素梅','芳菲','雪莲','翠竹','兰芝','锦绣','沁雪','凤鸣','映红','妙音','含烟','素心','柔嘉','碧玉','晴空','幽兰'];
const MALE_EMOJI = ['👨','🧑','👦'];
const FEMALE_EMOJI = ['👩','🧒','👧'];

// Family backgrounds

function genNPC(playerGender){
  const isMale = Math.random()>0.5;
  const surname = SURNAMES[Math.floor(Math.random()*SURNAMES.length)];
  const given = (isMale?MALE_NAMES:FEMALE_NAMES)[Math.floor(Math.random()*MALE_NAMES.length)];
  const bg = NPC_BG[Math.floor(Math.random()*NPC_BG.length)];
  const [mlo,mhi] = NPC_BG_MONEY[bg];
  const money = mlo + Math.floor(Math.random()*(mhi-mlo));
  const job = NPC_JOBS[Math.floor(Math.random()*NPC_JOBS.length)];
  const trait = NPC_TRAITS[Math.floor(Math.random()*NPC_TRAITS.length)];
  const emoji = (isMale?MALE_EMOJI:FEMALE_EMOJI)[Math.floor(Math.random()*3)];
  let estates = [];
  if(money>=300&&Math.random()<0.5){
    const e=ESTATES[1+Math.floor(Math.random()*3)];
    estates=[{...e,eid:'nse_'+Date.now()+Math.floor(Math.random()*9999),residents:[]}];
  } else if(money>=80&&Math.random()<0.3){
    estates=[{...ESTATES[0],eid:'nse_'+Date.now()+Math.floor(Math.random()*9999),residents:[]}];
  }
  return {
    id:'npc_'+Date.now()+'_'+Math.floor(Math.random()*9999),
    name:surname+given, gender:isMale?'male':'female', emoji,
    age:14+Math.floor(Math.random()*30),
    job, bg, money, trait, estates, favor:0, role:'friend', venue:'',
  };
}

function clamp(v,lo=0,hi=100){ return Math.max(lo, Math.min(hi, v)); }

function initGame(inheritFrom){
  const isMale  = Math.random() > 0.5;
  const surname  = SURNAMES[Math.floor(Math.random()*SURNAMES.length)];
  const given    = (isMale?MALE_NAMES:FEMALE_NAMES)[Math.floor(Math.random()*(isMale?MALE_NAMES:FEMALE_NAMES).length)];
  const startAge = 0; // 始终从0岁降生
  const bgKeys   = ['poor','normal','normal','rich']; // weighted
  const bgKey    = inheritFrom ? 'normal' : bgKeys[Math.floor(Math.random()*bgKeys.length)];
  const bg       = FAMILY_BG[bgKey];
  const startMoney = inheritFrom ? Math.floor(inheritFrom.money * 0.4) : 0;

  G = {
    name: surname+given, surname, given,
    gender: isMale?'male':'female',
    emoji: (isMale?MALE_EMOJI:FEMALE_EMOJI)[Math.floor(Math.random()*3)],
    age: startAge,
    maxAge: 60 + Math.floor(Math.random()*41), // hidden
    health:  clamp(70 + Math.floor(Math.random()*30)),
    mood:    clamp(60 + Math.floor(Math.random()*30)),
    intel:   clamp(15 + Math.floor(Math.random()*35)),
    charm:   clamp(20 + Math.floor(Math.random()*40)),
    parentFavor: bgKey==='rich' ? 70 : bgKey==='normal' ? 50 : 30,
    money: startMoney,
    job: 'none',
    jobRank: 0,
    jobProf: 0,
    salaryCollectedThisYear: false,
    parentMoneyAskedThisYear: false,
    tasksDoneThisYear: [],
    actionsThisYear: [],
    inSchool: false,
    married: false,
    spouseName: null, spouseEmoji: null,
    children: [],
    parents: inheritFrom ? [] : [
      { name:surname+MALE_NAMES[Math.floor(Math.random()*MALE_NAMES.length)], rel:'父亲', emoji:'👨', alive:true },
      { name:SURNAMES[Math.floor(Math.random()*SURNAMES.length)]+FEMALE_NAMES[Math.floor(Math.random()*FEMALE_NAMES.length)], rel:'母亲', emoji:'👩', alive:true },
    ],
    ancestors: inheritFrom ? [{name:inheritFrom.name,emoji:inheritFrom.emoji,age:inheritFrom.age,rel:'先祖'}] : [],
    familyBg: bgKey,
    log: [],
    yearsLived: 0,
    totalMoney: 0,
    dead: false, deathCause: '',
    examPassed: false,      // 科举高中标记
    examRecommended: false, // 老师推荐参加科举
    schoolYears: 0,
    schoolGrade: 'F',
    inventory: [],
    bagLimit: 5,
    // 地产
    estates: [],       // [{...ESTATES定义, residents:[], eid}]
    // 社交NPC
    npcs: [],          // genNPC() 对象列表，最多保留10个
    // 配偶详细信息（扩展）
    spouseGender: null,
    spouseBg: null,
    spouseMoney: 0,
    spouseEstates: [],
    // 妾室/面首
    concubines: [],    // [{name, gender, emoji, age, favor}]
    // 配偶好感
    spouseFavor: 80,
  };

  if(inheritFrom){
    addLog(`🌅 承继先祖 ${inheritFrom.name} 的遗志，开始新的人生。`,'event');
  } else {
    const bgInfo = FAMILY_BG[bgKey];
    addLog(`🎋 ${G.name} 降生于世，${G.gender==='male'?'男':'女'}，出身${bgInfo.label}。`,'event');
  }
  save(); render();
}

/* ══════════════════════════════════════════
   SAVE / LOAD / LOG
══════════════════════════════════════════ */
function save(){ localStorage.setItem('ancient', JSON.stringify(G)); }
function load(){
  try{ const d=JSON.parse(localStorage.getItem('ancient')||'null'); if(d) G=d; return !!d; }
  catch(e){ return false; }
}
function addLog(text, type='info'){
  G.log.unshift({ age:G.age, text, type });
  if(G.log.length > 150) G.log.pop();
}

/* ══════════════════════════════════════════
   SUCCESS RATE HELPER
   rate: 0~1 float, clamped to [0.05, 0.95]
══════════════════════════════════════════ */
function roll(rate){ return Math.random() < clamp(rate, 0.05, 0.95); }

          </div>
          ${job && job.id!=='none' && profNeeded>0 ? `

            <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--faint);margin-bottom:2px"><span>职业熟练度</span><span>${G.jobProf}/${profNeeded}</span></div>

            <span class="stat-label">父母好感</span>
            <div class="favor-bar"><div class="favor-fill" style="width:${Math.min(100,G.parentFavor)}%"></div></div>

          </div>
          <div class="stat-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:6px">
            <span class="stat-icon">🪙</span>
            <span class="stat-label">余钱</span>
            <span style="font-size:13px;font-weight:700;color:var(--amber);font-family:var(--serif)">${G.money} 文</span>
          </div>
        </div>

        <div class="card fadeup" style="max-height:200px;overflow-y:auto">
          <div class="ct">人生日志</div>
          <div style="font-size:10px;line-height:1.7">

      </div>

      <div>

          <button class="tab on" onclick="switchTab('actions')">行动</button>

        <div class="panel on card" id="panel-actions" style="border-top:none;border-radius:0 0 6px 6px">

function statRow(icon,label,val,color){
  const pct = clamp(val);
  const dangerColor = val<=20?'#ef4444':color;
  return `<div class="stat-row">
    <span class="stat-icon">${icon}</span>
    <span class="stat-label">${label}</span>
    <div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${dangerColor}"></div></div>
    <span class="stat-val" style="color:${val<=20?'var(--red)':'inherit'}">${Math.round(val)}</span>
  </div>`;
}

function renderFamilyList(){
  let html='';
  const all=[...(G.parents||[]),...(G.married&&G.spouseName?[{name:G.spouseName,rel:'配偶',emoji:G.spouseEmoji,alive:true}]:[])];
  if(all.length===0) return '<div style="color:var(--faint);font-size:10px;text-align:center;padding:10px">孑然一身</div>';
  all.forEach(m=>{ html+=`<div class="family-item"><span class="fi-icon">${m.emoji}</span><div class="fi-info"><div class="fi-name">${m.name}</div><div class="fi-rel">${m.rel}${m.alive===false?' · 已故':''}</div></div></div>`; });
  if(G.children.length>0) html+=`<div style="font-size:9px;color:var(--faint);margin-top:4px">子嗣 ${G.children.length} 人</div>`;
  return html;
}

function renderFamilyFull(){
  let html='';
  const all=[...(G.parents||[])];
  if(G.married&&G.spouseName) all.push({name:G.spouseName,rel:'配偶',emoji:G.spouseEmoji,alive:true});
  if(all.length>0){
    html+=`<div class="sec-head">直系</div>`;
    all.forEach(m=>{ html+=`<div class="family-item"><span class="fi-icon">${m.emoji}</span><div class="fi-info"><div class="fi-name">${m.name}</div><div class="fi-rel">${m.rel}${m.alive===false?' · 已故':''}</div></div></div>`; });
  }
  if(G.children.length>0){
    html+=`<div class="sec-head">子嗣</div>`;
    G.children.forEach((c,i)=>{ html+=`<div class="family-item"><span class="fi-icon">${c.emoji}</span><div class="fi-info"><div class="fi-name">${c.name}</div><div class="fi-rel">${c.gender==='male'?'子':'女'} · ${c.age}岁</div></div>${!G.dead?`<button class="fi-btn" onclick="inheritChild(${i})" ${c.age<18?'disabled title="未成年"':''}>继承人生</button>`:''}</div>`; });
  }
  if(all.length===0&&G.children.length===0) return '<div style="color:var(--faint);font-size:10px;text-align:center;padding:16px">暂无家族成员</div>';
  return html;
}

/* ══════════════════════════════════════════
   ACTIONS RENDER
══════════════════════════════════════════ */
function renderActions(){
  const a=G.age; let html='';

  // Job
  html+=`<div class="sec-head">职业与生计</div><div class="action-grid">`;
  html+=actionBtn('💼','转换职业','选择工作','ab-amber','openJobModal()');
  const job=JOBS.find(j=>j.id===G.job);
  const canWork=G.job!=='none'&&a>=job.minAge&&a<=job.maxAge;
  html+=actionBtn('🪙','领取薪俸',canWork?`本年薪俸`:'无业',canWork?'ab-green':'',canWork?`collectSalary(event)`:''  ,!canWork||G.salaryCollectedThisYear, G.salaryCollectedThisYear?'今年已领':'');
  const hasParents=G.parents&&G.parents.some(p=>p.alive);
  const canAsk=hasParents&&a>=3&&a<18&&!G.parentMoneyAskedThisYear;
  html+=actionBtn('🙏','向父母要钱','与好感度挂钩',canAsk?'ab-blue':'',canAsk?'askParents(event)':'',!canAsk,G.parentMoneyAskedThisYear?'今年已要':'');
  html+=`</div>`;

  // Work tasks
  if(canWork&&job.tasks&&job.tasks.length>0){
    html+=`<div class="sec-head">工作任务（完成获得升职点）</div><div class="action-grid">`;
    job.tasks.forEach((t,i)=>{
      const stars='★'.repeat(t.diff)+'☆'.repeat(4-t.diff);
      html+=actionBtn(['📋','📑','📊','🏆'][t.diff-1],t.name,`难度${stars} +${t.prof}熟练度`,'ab-amber',`doWorkTask(event,${i})`);
    });
    html+=`</div>`;
  }

  // Education
  html+=`<div class="sec-head">求学</div><div class="action-grid">`;
  const bgInfo=FAMILY_BG[G.familyBg]||FAMILY_BG.normal;
  const freeSchoolAge=bgInfo.freeSchoolAge;
  const canSchool=a>=6&&a<=18;
  const isFree=freeSchoolAge>0&&a<freeSchoolAge;
  const schoolCostNote=G.inSchool?'就读中':(isFree?'免费就读':'费:20文/年');
  const gradeInfo=GRADE_INFO[G.schoolGrade||'F'];
  html+=actionBtn('📖','入读学堂',schoolCostNote,G.inSchool?'ab-green':(canSchool?'ab-blue':''),'toggleSchool(event)',!canSchool);
  const canSelfStudy=a>=8;
  const selfDone=actionDone('selfStudy');
  html+=actionBtn('📜','自学苦读',!canSelfStudy?'年龄太小':selfDone?'今年已做':'智识+，消耗心情',canSelfStudy?'ab-blue':'',canSelfStudy&&!selfDone?'selfStudy(event)':'',!canSelfStudy||selfDone,selfDone?'今年已做':'');
  // School exam button — only when in school
  if(G.inSchool){
    const examDone=actionDone('exam');
    html+=actionBtn('✍️','写文应考',examDone?'今年已考':`成绩: ${G.schoolGrade||'F'}`,'ab-amber',examDone?'':'openExamModal(event)',examDone,examDone?'今年已考':'');
  }
  // 科举按钮：需老师推荐（在校A/S成绩触发）
  if(G.examRecommended||G.examPassed){
    const examNote=G.examPassed?'已高中，可再考':'老师推荐！';
    html+=actionBtn('🏛️','参加科举',examNote,a>=16?'ab-amber':'',a>=16?'takeExam(event)':'',a<16);
  } else if(!G.inSchool&&G.intel>=60&&a>=20){
    html+=actionBtn('🏛️','参加科举','需老师推荐（在校A/S成绩）','','' ,true);
  }
  html+=`</div>`;

  // Social
  html+=`<div class="sec-head">社交与婚姻</div><div class="action-grid">`;
  const canMarry=a>=14&&!G.married;
  const marryDone=actionDone('blindDate');
  html+=actionBtn('💑','相亲寻缘',(!canMarry&&G.married)?'已婚':(!canMarry)?'年龄不够':marryDone?'今年已相亲':'媒人随机匹配',canMarry&&!marryDone?'ab-purple':'',canMarry&&!marryDone?'blindDate(event)':'',!canMarry||marryDone,marryDone?'今年已':'');
  const canChild=G.married&&G.age>=16&&G.age<=50;
  const childDone=actionDone('haveChild');
  html+=actionBtn('👶','生儿育女',!canChild?'需已婚且适龄':childDone?'今年已尝试':'健康影响成功率',canChild&&!childDone?'ab-green':'',canChild&&!childDone?'haveChild(event)':'',!canChild||childDone,childDone?'今年已做':'');
  const canVisit=a>=5;
  const visitDone=actionDone('visitNeighbor');
  html+=actionBtn('🍵','拜访邻里',!canVisit?'年龄太小':visitDone?'今年已去':'心情+，魅力+',canVisit?'ab-blue':'',canVisit&&!visitDone?'visitNeighbor(event)':'',!canVisit||visitDone,visitDone?'今年已去':'');
  const canGift=a>=8&&hasParents;
  const giftDone=actionDone('giftParents');
  html+=actionBtn('🎁','孝敬父母',!canGift?(!hasParents?'无父母':'年龄太小'):giftDone?'今年已孝敬':'父母好感+',canGift&&!giftDone?'ab-purple':'',canGift&&!giftDone?'giftParents(event)':'',!canGift||giftDone,giftDone?'今年已做':'');
  html+=`</div>`;

  // Health
  html+=`<div class="sec-head">养生与修炼</div><div class="action-grid">`;
  const canEx=a>=6;
  const exDone=actionDone('exercise');
  html+=actionBtn('🏃','强身健体',!canEx?'年龄太小':exDone?'今年已做':'健康+ 费5文',canEx?'ab-green':'',canEx&&!exDone?'exercise(event)':'',!canEx||exDone,exDone?'今年已做':'');
  const healDone=actionDone('healSelf');
  html+=actionBtn('🌿','求医问药',healDone?'今年已就医':'健康+ 费40文','ab-green',healDone?'':'healSelf(event)',healDone,healDone?'今年已就医':'');
  const canMeditate=a>=10;
  const meditateDone=actionDone('meditate');
  html+=actionBtn('🧘','修身养性',!canMeditate?'年龄太小':meditateDone?'今年已做':'心情+，智识+',canMeditate?'ab-blue':'',canMeditate&&!meditateDone?'meditate(event)':'',!canMeditate||meditateDone,meditateDone?'今年已做':'');
  html+=`</div>`;

  return html;
}

function actionBtn(icon,name,desc,cls,onclick,disabled=false,badge=''){
  const ripple=onclick?`onclick="addRipple(event);${onclick}"`:'';
  const badgeHtml=badge?`<span style="position:absolute;top:3px;right:3px;font-size:7px;background:var(--amber);color:#fff;padding:1px 4px;border-radius:3px">${badge}</span>`:'';
  return `<button class="action-btn ${cls}" ${ripple} ${disabled?'disabled':''}>
    ${badgeHtml}
    <div class="ab-icon">${icon}</div>
    <div class="ab-name">${name}</div>
    <div class="ab-cost">${desc}</div>
  </button>`;
}

/* ══════════════════════════════════════════
   地产系统渲染 & 操作
══════════════════════════════════════════ */
function renderEstate(){
  if(!G.estates) G.estates=[];
  let html=`<div class="ct">地产 — 安居乐业，广置田产</div>`;

  // 已有地产
  if(G.estates.length>0){
    html+=`<div class="sec-head">名下地产</div>`;
    G.estates.forEach((e,i)=>{
      const residents=e.residents||[];
      const occupied=residents.length;
      const hasKids=G.children.some(c=>residents.includes(c.name));
      html+=`<div class="family-item" style="flex-wrap:wrap">
        <span class="fi-icon">${e.icon}</span>
        <div class="fi-info">
          <div class="fi-name">${e.name} <span style="font-size:8px;color:var(--amber)">入住${occupied}/${e.capacity}人</span></div>
          <div class="fi-rel">${e.desc}</div>
          <div style="font-size:9px;color:var(--faint);margin-top:2px">
            ${e.incomePerYear>0?`每年收入+${e.incomePerYear}文 · `:''}
            ${residents.length>0?'居住：'+residents.join('、'):'空置'}
            ${hasKids?' · 🧒有孩子居住':''}
          </div>
        </div>
        <button class="fi-btn" onclick="sellEstate(${i})" style="color:var(--red)">售出</button>
      </div>`;
    });
  } else {
    html+=`<div style="color:var(--faint);font-size:10px;text-align:center;padding:12px">名下尚无房产田产。</div>`;
  }

  // 购买地产
  html+=`<div class="sec-head">购置地产（当前余钱 🪙${G.money}文）</div>`;
  html+=`<div class="shop-grid">`;
  ESTATES.forEach(e=>{
    const canBuy=G.money>=e.price;
    html+=`<div class="shop-item${canBuy?'':' sold-out'}" onclick="${canBuy?`buyEstate('${e.id}')`:''}" >
      <div class="si-icon">${e.icon}</div>
      <div class="si-name">${e.name} <span style="font-size:8px;color:var(--faint)">容${e.capacity}人</span></div>
      <div class="si-desc">${e.desc}</div>
      <div class="si-price">🪙 ${e.price}文${e.incomePerYear>0?' · 年入'+e.incomePerYear+'文':''}${!canBuy?' · 钱不够':''}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function buyEstate(estateId){
  const tmpl=ESTATES.find(e=>e.id===estateId);
  if(!tmpl) return;
  if(G.money<tmpl.price){ showToast('钱不够！'); return; }

function renderShop(){

  html+=`<div class="shop-grid">`;
  // Split items: general + job-specific for current job
  const generalItems=SHOP_ITEMS.filter(i=>!i.jobReq);
  const jobItems=SHOP_ITEMS.filter(i=>i.jobReq&&i.jobReq===G.job);
  const displayItems=[...generalItems,...jobItems];



  displayItems.forEach(item=>{
    const tooFull=G.inventory.length>=G.bagLimit;
    const cantAfford=G.money<item.price;
    const canBuy=!tooFull&&!cantAfford;
    const isJobBook=!!item.jobReq;
    html+=`<div class="shop-item${canBuy?'':' sold-out'}${isJobBook?' job-book':''}" onclick="${canBuy?`buyItem('${item.id}')`:''}" title="${tooFull?'包裹已满':cantAfford?'钱不够':''}">
      <div class="si-icon">${item.icon}${isJobBook?'<span style="font-size:8px;vertical-align:top;color:var(--amber)">职</span>':''}</div>
      <div class="si-name">${item.name}</div>
      <div class="si-desc">${item.desc}</div>
      <div class="si-price">🪙 ${item.price}文${tooFull?' · 包裹满':''}${cantAfford?' · 钱不够':''}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function renderBag(){
  const slots=[];
  for(let i=0;i<G.bagLimit;i++){
    const item=G.inventory[i]||null;
    if(item){
      slots.push(`<div class="inv-slot" onclick="useItem(${i})" title="点击使用：${item.name}">
        <span>${item.icon}</span>
        <span class="slot-name">${item.name}</span>
      </div>`);
    } else {
      slots.push(`<div class="inv-slot empty"><span style="font-size:10px;color:var(--faint)">空</span></div>`);
    }
  }
  let html=`<div class="ct">包裹 ${G.inventory.length}/${G.bagLimit}</div>`;
  html+=`<div class="inv-grid">${slots.join('')}</div>`;
  html+=`<div style="font-size:9px;color:var(--faint);margin-top:4px">点击物品即可使用。可在商店购买大布袋扩展容量（最大20）。</div>`;

}

   BUTTON FEEDBACK
══════════════════════════════════════════ */
function addRipple(e){
  const btn=e.currentTarget;
  const r=document.createElement('span');
  r.className='btn-ripple';
  const rect=btn.getBoundingClientRect();
  r.style.left=(e.clientX-rect.left-30)+'px';
  r.style.top=(e.clientY-rect.top-30)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),500);
  btn.classList.add('clicked');
  setTimeout(()=>btn.classList.remove('clicked'),300);
}

function showResult(btn, text, type='good'){
  if(!btn) return;
  // Remove old chips
  btn.querySelectorAll('.result-chip').forEach(c=>c.remove());
  const chip=document.createElement('span');
  chip.className=`result-chip ${type}`;
  chip.textContent=text;
  btn.style.position='relative';
  btn.appendChild(chip);
  setTimeout(()=>chip.remove(), 1800);
}

function collectSalary(e){
  if(G.salaryCollectedThisYear){ showToast('今年已领过薪俸了！'); return; }
  const job=JOBS.find(j=>j.id===G.job);
  // 每升一级薪资上下限各提升 30%
  const rankMult=1+G.jobRank*0.3;
  const lo=Math.round(job.salaryRange[0]*rankMult);
  const hi=Math.round(job.salaryRange[1]*rankMult);
  const rankLabel=job.ranks[Math.min(G.jobRank,job.ranks.length-1)];
  const rankBonus=G.jobRank*0.04;
  const success=roll(0.75+rankBonus);
  const btn=e&&e.currentTarget;
  if(success){
    const earned=lo+Math.floor(Math.random()*(hi-lo+1));
    G.money+=earned; G.totalMoney+=earned;
    G.salaryCollectedThisYear=true;
    addLog(`💰 【${rankLabel}】薪俸到手 +${earned}文（本级区间 ${lo}~${hi}文）。`,'good');
    showResult(btn,`+${earned}文`,'good');
    showModal('💰 薪俸到手',`【${rankLabel}】本年薪俸已结清。<br><br>入账 +${earned} 文<br>当前余钱：${G.money} 文`,
      [{label:'收好了',sub:'',cost:'',id:'ok'}],()=>closeModal());
  } else {
    const deducted=Math.floor((lo+hi)/4);
    G.money=Math.max(0,G.money-deducted);
    G.salaryCollectedThisYear=true;
    addLog(`😤 今年业绩不佳，被扣除 ${deducted}文 作为罚款，郁闷。`,'bad');
    showResult(btn,`-${deducted}文`,'bad');
    showModal('😤 业绩扣款',`今年差事办得不够妥当，被扣去 ${deducted} 文作为罚款。<br><br>心情不佳，来年再努力。`,
      [{label:'郁闷',sub:'',cost:'',id:'ok'}],()=>closeModal());
  }
  save(); render();
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function gradeFromScore(score){
  if(score>=92) return 'S';
  if(score>=80) return 'A';
  if(score>=70) return 'B';
  if(score>=60) return 'C';
  if(score>=48) return 'D';
  if(score>=35) return 'E';
  return 'F';
}

function openExamModal(e){
  if(actionDone('exam')){ showToast('今年已经考过试了！'); return; }
  const prompt = ESSAY_PROMPTS[Math.floor(Math.random()*ESSAY_PROMPTS.length)];
  const grades = ['F','E','D','C','B','A','S'];
  // Show 3 essay style choices, each affects score differently
  const styles = [
    { id:'safe',    label:'🖌️ 四平八稳，中规中矩', sub:'稳妥保守，失误较少，但难获高分', scoreMod: 0   },
    { id:'bold',    label:'⚡ 文采飞扬，大胆立意', sub:'创意十足，成功则高分，失败则低分', scoreMod: 20  },
    { id:'copy',    label:'📋 照抄经典，引经据典', sub:'引用典故，智识要求高，通过率稳定',  scoreMod: -5  },
  ];
  showModal(
    `✍️ 写文应考`,
    `题目：《${prompt.title}》
${prompt.desc}

当前成绩：${G.schoolGrade||'F'} · 智识：${G.intel}`,
    styles.map(s=>({ label:s.label, sub:s.sub, cost:'', id:s.id, _mod:s.scoreMod })),
    (id)=>{
      closeModal();
      const style = styles.find(s=>s.id===id);
      doExam(prompt, style);
    }
  );
}

function doExam(prompt, style){
  markAction('exam');
  // 基础分 = 智识映射到0~100，加随机噪声
  const intelScore = G.intel * 0.9 + (Math.random()-0.5)*14;
  const scoreMod = (style&&style._mod)||0;
  let finalScore = intelScore + scoreMod;
  if(style&&style.id==='bold') finalScore += (Math.random()-0.5)*28;
  finalScore = Math.max(0, Math.min(100, finalScore));

  // 成绩分层：越高越难升，需要比当前等级门槛高出更多才能突破
  // 当前等级对应的"保级分"，低于此分会掉级
  const gradeFloors={F:0,E:28,D:40,C:52,B:64,A:76,S:92};
  const gradeOrder=['F','E','D','C','B','A','S'];
  const curGradeIdx=gradeOrder.indexOf(G.schoolGrade||'F');
  // 升级门槛：越高越难，需超出当前等级上限更多
  const gradeThresholds={
    // [保级线, 升级线]
    F:[0, 35],   // 得≥35才能升E
    E:[22, 48],  // 低于22掉F，得≥48升D
    D:[35, 60],  // 低于35掉E，得≥60升C
    C:[48, 70],  // 低于48掉D，得≥70升B
    B:[60, 80],  // 低于60掉C，得≥80升A
    A:[72, 91],  // 低于72掉B，得≥91升S
    S:[80, 999], // 低于80掉A
  };
  const [keepLine, upLine] = gradeThresholds[G.schoolGrade||'F'];
  let newGradeIdx;
  if(finalScore >= upLine){
    newGradeIdx = Math.min(curGradeIdx+1, 6);
  } else if(finalScore < keepLine){
    newGradeIdx = Math.max(curGradeIdx-1, 0);
  } else {
    newGradeIdx = curGradeIdx;
  }
  const newGrade = gradeOrder[newGradeIdx];
  const gradeInfo = GRADE_INFO[newGrade];
  const oldGrade = G.schoolGrade || 'F';
  G.schoolGrade = newGrade;

  const grades = ['F','E','D','C','B','A','S'];
  const improved = grades.indexOf(newGrade) > grades.indexOf(oldGrade);
  const dropped  = grades.indexOf(newGrade) < grades.indexOf(oldGrade);

  // Intel bonus from grade
  G.intel = clamp(G.intel + gradeInfo.intelBonus);
  G.mood  = clamp(G.mood + (improved?8:dropped?-8:2));

  const changeStr = improved ? `↑ 从${oldGrade}提升至${newGrade}！` : dropped ? `↓ 从${oldGrade}跌至${newGrade}…` : `持平${newGrade}`;
  addLog(`✍️ 《${prompt.title}》— 成绩${newGrade}（${Math.round(finalScore)}分）。${gradeInfo.desc} ${changeStr} 智识+${gradeInfo.intelBonus}`, improved?'good':dropped?'bad':'info');

  // 成绩A/S：老师有概率推荐参加科举
  let recMsg='';
  if((newGrade==='A'||newGrade==='S')&&!G.examRecommended&&!G.examPassed){
    const recChance=newGrade==='S'?0.85:0.5;
    if(Math.random()<recChance){
      G.examRecommended=true;
      recMsg='\n\n🌟 先生大为赞赏，特别推荐你参加科举！科举入口已解锁。';
      addLog(`🌟 先生对你的文章赞不绝口，特别推荐你参加科举考试！科举入口已解锁。`,'event');
    }
  }
  save(); render();

  // 弹窗展示考试结果
  const gradeColor=gradeInfo.color;
  const resultHTML=`题目：《${prompt.title}》
风格：${style.label.replace(/[📋📑📊🏆✍️⚡🌿📖🖌️📋]/u,'')}
得分：${Math.round(finalScore)} 分
成绩：<span style="color:${gradeColor};font-size:18px;font-weight:700">${newGrade}</span>

${gradeInfo.desc}
${changeStr}
智识 +${gradeInfo.intelBonus}${recMsg}`;
  showModal('📜 考试结果', resultHTML, [{label:'✅ 知道了', sub:'', cost:'', id:'ok'}], ()=>closeModal());
}

function selfStudy(e){
  const btn=e&&e.currentTarget;
  if(G.mood<20){ showToast('心情太差，无法集中精神！'); return; }
  const rate=0.5+(G.intel/100)*0.4;

function doWorkTask(e, taskIdx){
  const btn=e&&e.currentTarget;
  const job=JOBS.find(j=>j.id===G.job);
  if(!job||!job.tasks[taskIdx]) return;
  const task=job.tasks[taskIdx];
  // Success rate based on difficulty vs intel/health
  const baseRate=0.7-(task.diff-1)*0.1;
  const attrBonus=(G.intel+G.health)/(200)*0.25;
  const success=roll(baseRate+attrBonus);
  if(success){
    G.jobProf+=task.prof;
    const rankNow=job.ranks[Math.min(G.jobRank,job.ranks.length-1)];
    addLog(`✅ [${job.name}·${rankNow}] ${task.text} 职业熟练度+${task.prof}。`,'good');
    showResult(btn,`+${task.prof}熟练`,'good');
    checkPromotion();
    save(); render();
    showModal('✅ 任务完成',
      `<b>${task.name}</b><br><br>${task.text}<br><br>职业熟练度 +${task.prof}<br>当前进度：${G.jobProf}／${job.profPerRank}`,
      [{label:'好的',sub:'',cost:'',id:'ok'}],()=>closeModal());
  } else {
    const xpLoss=Math.floor(task.prof/3);
    G.jobProf=Math.max(0,G.jobProf-xpLoss);
    G.mood=clamp(G.mood-4);
    addLog(`❌ [${job.name}] ${task.text.replace('。','')}，然而出了差错，职业熟练度-${xpLoss}。`,'bad');
    showResult(btn,'出了差错','bad');
    save(); render();
    showModal('❌ 任务失误',
      `<b>${task.name}</b><br><br>${task.text.replace('。','')}，然而出了差错。<br><br>职业熟练度 -${xpLoss}<br>心情 -4`,
      [{label:'知道了',sub:'',cost:'',id:'ok'}],()=>closeModal());
  }
}

function checkPromotion(){
  const job=JOBS.find(j=>j.id===G.job);
  if(!job||job.profPerRank===0) return;
  const maxRank=job.ranks.length-1;
  let promoted=false, lastRank='', lastBonus=0;
  while(G.jobProf>=job.profPerRank&&G.jobRank<maxRank){
    G.jobProf-=job.profPerRank;
    G.jobRank++;
    lastRank=job.ranks[G.jobRank];
    lastBonus=50+G.jobRank*30;
    G.money+=lastBonus; G.totalMoney+=lastBonus;
    G.mood=clamp(G.mood+20);
    addLog(`🎊 恭喜晋升！职位升为【${lastRank}】，薪资随之提升，获得奖赏 ${lastBonus}文！`,'event');
    promoted=true;
  }
  if(promoted){
    const newSalaryLo=Math.round(job.salaryRange[0]*(1+G.jobRank*0.3));
    const newSalaryHi=Math.round(job.salaryRange[1]*(1+G.jobRank*0.3));
    setTimeout(()=>{
      showModal('🎊 职位晋升！',
        `恭喜荣升 <b>【${lastRank}】</b>！<br><br>` +
        `🪙 晋升奖赏：+${lastBonus} 文<br>` +
        `📈 新薪资区间：${newSalaryLo}～${newSalaryHi} 文/年<br>` +
        `😊 心情 +20`,
        [{label:'🎉 多谢提携！',sub:'',cost:'',id:'ok'}],
        ()=>closeModal()
      );
    }, 200);
  }
}

function openJobModal(){
  const available=JOBS.filter(j=>{
    if(j.minAge>G.age||j.maxAge<G.age) return false;
    if(j.reqIntel&&G.intel<j.reqIntel) return false;
    if(j.examOnly&&!G.examPassed) return false; // 官员只能科举解锁
    return true;
  });
  showModal('选择职业','选择一份工作，每年领取薪俸，完成任务获取职业熟练度。',
    available.map(j=>({label:`${j.icon} ${j.name}`,sub:`${j.desc} · 薪俸${j.salaryRange[0]}~${j.salaryRange[1]}文/年`,cost:j.ranks.join('→'),id:j.id})),
    (id)=>{
      if(id!==G.job){
        G.job=id; G.jobRank=0; G.jobProf=0;
        const j=JOBS.find(x=>x.id===id);
        addLog(`💼 开始从事 ${j.icon}${j.name} 一职，从头做起。`,'event');
        save(); closeModal(); render();
        showModal('💼 职业变更',
          `你选择了新的职业：<br><br>${j.icon} <b>${j.name}</b><br>${j.desc}<br><br>薪资区间：${j.salaryRange[0]}～${j.salaryRange[1]} 文/年<br>职级从【${j.ranks[0]}】开始，完成任务积累熟练度可晋升。`,
          [{label:'开始新生活',sub:'',cost:'',id:'ok'}],()=>closeModal());
      } else {
        save(); closeModal(); render();
      }
    }
  );
}

  const success=roll(rate);

    npc.favor=Math.min(100,npc.favor+gain);
    G.mood=clamp(G.mood+3);

    showResult(btn,`好感+${gain}`,'good');
    showModal(`🍵 相谈甚欢`,
      `与 <b>${npc.name}</b> 促膝而谈，相见甚欢。<br><br>好感度 +${gain}（现为 ${npc.favor}/100）<br>${npc.favor>=80?'💡 好感已达80，可在此处提亲！':''}`,

function doMarryNPC(npc, sameGender){
  if(!G.npcs) G.npcs=[];
  // 移除npc出好友列表
  G.npcs=G.npcs.filter(n=>n.id!==npc.id);
  G.married=true;
  G.spouseName=npc.name;
  G.spouseEmoji=npc.emoji;
  G.spouseGender=npc.gender;
  G.spouseBg=npc.bg;
  G.spouseMoney=npc.money;
  G.spouseEstates=npc.estates||[];
  G.spouseFavor=80;
  G.sameGenderMarriage=sameGender||false;
  // 随嫁地产并入
  if(npc.estates&&npc.estates.length>0){
    npc.estates.forEach(e=>{ G.estates.push({...e,eid:'se_'+Date.now()+Math.random(),residents:[]}); });
  }
  G.mood=clamp(G.mood+20);
  addLog(`🎊 与 ${npc.name} 喜结连理！${sameGender?'（同性结合）':''}${npc.estates&&npc.estates.length>0?' 对方带来'+npc.estates.map(e=>e.name).join('、')+'。':''}`, 'event');
  showModal('🎊 大喜之日！',
    `${npc.emoji} <b>${npc.name}</b> 欣然应允，你们喜结连理！<br><br>${sameGender?'✨ 同性结合，二人相伴，但无法孕育子嗣。<br><br>':''}${npc.estates&&npc.estates.length>0?'💰 对方随嫁地产：'+npc.estates.map(e=>e.icon+e.name).join('、')+'<br><br>':''}配偶好感度：${G.spouseFavor}/100`,
    [{label:'🎉 成婚大吉！',sub:'',cost:'',id:'ok'}],
    ()=>{ closeModal(); save(); render(); }
  );
}

// ── 向NPC提出纳妾/养面首 ──
function offerConcubine(idx){
  const npc=G.npcs&&G.npcs[idx];
  if(!npc) return;
  if(!G.married){ showToast('尚未成婚，此事不妥！'); return; }
  // 需要有一间空置（无孩子居住）的额外房产
  const spareEstate=G.estates.find(e=>{
    const hasKids=G.children.some(c=>e.residents&&e.residents.includes(c.name));
    const occupied=(e.residents&&e.residents.length||0);
    return occupied<e.capacity&&!hasKids;
  });
  if(!spareEstate){ showToast('需要一间空置（无孩子）的额外房产才能纳妾！'); return; }
  if(npc.favor<70){ showToast('好感度不足70，对方不愿意！'); return; }

  const role=G.gender==='male'?'concubine':'lover';
  const roleLabel=G.gender==='male'?'妾室':'面首';
  const cost=200;
  confirmSpend(cost,`将 ${npc.name} 纳为${roleLabel}（将入住${spareEstate.name}）`,()=>{
    G.money-=cost;
    if(!G.concubines) G.concubines=[];
    const c={name:npc.name,gender:npc.gender,emoji:npc.emoji,age:npc.age,favor:npc.favor,role,estateId:spareEstate.eid||spareEstate.id};
    G.concubines.push(c);
    if(!spareEstate.residents) spareEstate.residents=[];
    spareEstate.residents.push(npc.name);
    G.npcs=G.npcs.filter(n=>n.id!==npc.id);
    addLog(`🏮 将 ${npc.name} 纳为${roleLabel}，入住${spareEstate.name}。`,'event');
    save(); render();
    showToast(`${npc.name} 已成为你的${roleLabel}。`);
  });
}

// ── 遣散妾室 ──

  const c=G.concubines&&G.concubines[idx];

  if(!confirm(`确定遣散 ${c.name} 吗？`)) return;
  G.estates.forEach(e=>{ if(e.residents) e.residents=e.residents.filter(n=>n!==c.name); });

    [{label:'好聚好散',sub:'',cost:'',id:'ok'}],()=>closeModal());
}

  if(G.money<cost){ showToast(`赠礼需要 ${cost}文！`); return; }

function divorceSpouse(){
  if(!confirm(`确定要与 ${G.spouseName} 和离吗？`)) return;
  const exName=G.spouseName;

  G.married=false; G.spouseName=null; G.spouseEmoji=null;
  G.spouseGender=null; G.spouseFavor=50; G.spouseEstates=[];

function haveChild(e){
  const btn=e&&e.currentTarget;
  if(actionDone('haveChild')){ showToast('今年已经尝试过了！'); return; }
  // 同性婚姻不能生子
  if(G.sameGenderMarriage){ showToast('同性结合，无法孕育子嗣。'); return; }
  // 需要有足够容量的主屋（排除有妾室居住的房产）
  const mainEstate=G.estates&&G.estates.find(e=>{
    const concubineNames=(G.concubines||[]).map(c=>c.name);
    const hasConcubine=(e.residents||[]).some(r=>concubineNames.includes(r));
    return !hasConcubine&&(e.residents||[]).length<e.capacity;
  });
  if(G.estates&&G.estates.length>0&&!mainEstate){
    showToast('名下房产已住满或均有妾室居住，无法生子！'); return;
  }
  markAction('haveChild');
  // 成功率较低，与健康和年龄挂钩
  const agePenalty=G.age>40?0.2:G.age>35?0.1:0;
  const rate=clamp(0.25+(G.health/100)*0.3-agePenalty,0.05,0.6);
  const success=roll(rate);
  if(success){
    const isMale=Math.random()>0.5;
    const childName=G.surname+(isMale?MALE_NAMES:FEMALE_NAMES)[Math.floor(Math.random()*MALE_NAMES.length)];
    const childEmoji=(isMale?MALE_EMOJI:FEMALE_EMOJI)[Math.floor(Math.random()*3)];
    const child={name:childName,gender:isMale?'male':'female',emoji:childEmoji,age:0};
    G.children.push(child);
    // 孩子入住主屋
    if(mainEstate){ if(!mainEstate.residents) mainEstate.residents=[]; mainEstate.residents.push(childName); }
    G.mood=clamp(G.mood+15);
    if(G.spouseFavor) G.spouseFavor=clamp(G.spouseFavor+5);
    addLog(`🎉 ${isMale?'子':'女'} ${childName} 呱呱坠地，家中添丁！`,'good');
    showResult(btn,'添丁！','good');
    showModal('🎊 喜得子嗣！',
      `${childEmoji} <b>${childName}</b> 降生，${isMale?'男孩':'女孩'}。<br><br>${G.spouseName?G.spouseName+'与你同喜！配偶好感+5。<br><br>':''}母子（女）平安。`,
      [{label:'🎉 大吉大利！',sub:'',cost:'',id:'ok'}],
      ()=>closeModal()
    );
  } else {
    addLog(`👶 今年未能添丁，来年再盼。`,'info');
    showResult(btn,'未能添丁','info');
  }
  save(); render();
}

function buyItem(itemId){
  const item=SHOP_ITEMS.find(i=>i.id===itemId);
  if(!item) return;
  if(G.money<item.price){ showToast('钱不够！'); return; }
  if(G.inventory.length>=G.bagLimit){ showToast('包裹已满！请先使用物品或购买大布袋。'); return; }
  confirmSpend(item.price, `${item.icon} 购买【${item.name}】\n${item.desc}`, ()=>{
    G.money-=item.price;
    G.inventory.push({id:item.id,name:item.name,icon:item.icon,effect:item.effect});
    addLog(`🛍️ 在商店购入【${item.name}】，花费 ${item.price}文。`,'info');
    save(); render();
    showToast(`已购入【${item.name}】，前往包裹使用！`);
  });
}

function useItem(slotIdx){
  const item=G.inventory[slotIdx];
  if(!item) return;
  const effectDesc=item.effect?Object.entries(item.effect).map(([k,v])=>{const names={health:'健康',mood:'心情',intel:'智识',charm:'魅力',bagExpand:'包裹'};return `${names[k]||k}+${v}`;}).join('  '):'';
  showModal('📦 使用物品',`${item.icon} ${item.name}\n效果：${effectDesc||'特殊'}\n\n确认使用此物品？`,[{label:`✅ 确认使用【${item.name}】`,sub:effectDesc,cost:'',id:'yes'}],(id)=>{
    closeModal();
  const e=item.effect;
  let msg=`✨ 使用了【${item.name}】`;
  if(e.health){ G.health=clamp(G.health+e.health); msg+=`，健康+${e.health}`; }
  if(e.mood){ G.mood=clamp(G.mood+e.mood); msg+=`，心情+${e.mood}`; }
  if(e.intel){ G.intel=clamp(G.intel+e.intel); msg+=`，智识+${e.intel}`; }
  if(e.charm){ G.charm=clamp(G.charm+e.charm); msg+=`，魅力+${e.charm}`; }
  if(e.bagExpand){
    G.bagLimit=Math.min(20,G.bagLimit+e.bagExpand);
    msg+=`，包裹上限+${e.bagExpand}（现为${G.bagLimit}）`;
  }
  if(e.jobProf){
    const curJob=JOBS.find(j=>j.id===G.job);
    if(curJob&&curJob.id!=='none'){
      G.jobProf+=e.jobProf;
      msg+=`，职业熟练度+${e.jobProf}`;
      checkPromotion();
    } else {
      msg+=`（当前无业，熟练度无效）`;
    }
  }
  G.inventory.splice(slotIdx,1);
  addLog(msg+'。','good');
  save(); render();
  }); // showModal callback
}

function inheritChild(idx){
  const child=G.children[idx];
  if(!child||child.age<18){ showToast('子嗣尚未成年！'); return; }
  const prev={name:G.name,emoji:G.emoji,age:G.age,money:G.money};
  const newAncestors=[...G.ancestors,{name:G.name,emoji:G.emoji,age:G.age,rel:'先祖'}];
  const inheritMoney=Math.floor(G.money*0.4);
  initGame(prev);
  G.name=child.name; G.given=child.name.slice(1); G.surname=child.name[0];
  G.gender=child.gender; G.emoji=child.emoji; G.age=child.age;
  G.money=inheritMoney+50; G.ancestors=newAncestors; G.log=[];
  addLog(`🌅 承继 ${newAncestors[newAncestors.length-1].name} 之遗志，${child.name} 开始书写自己的人生。`,'event');
  save(); render();
}

      const c=G.concubines[0];
      G.spouseFavor=clamp((G.spouseFavor||50)-15);
      addLog(`😡 ${G.spouseName} 察觉到了 ${c.name} 的存在，心中大为不满，好感-15。`,'bad');
      // 若好感过低，有概率离家出走/离婚
      if((G.spouseFavor||50)<25&&Math.random()<0.4){
        addLog(`💔 ${G.spouseName} 无法忍受，收拾行囊，提出和离！`,'bad');
        G.married=false; G.spouseName=null; G.spouseEmoji=null; G.spouseFavor=50;
        G.mood=clamp(G.mood-25);
      }
    }
  }

  // NPC好感自然衰减（若长期不互动）
  if(G.npcs){
    G.npcs.forEach(npc=>{
      if(!actionDone('interact_'+npc.id)&&Math.random()<0.3){
        npc.favor=Math.max(0,npc.favor-3);
      }
    });
    // 移除好感归零者
    G.npcs=G.npcs.filter(n=>n.favor>0);
  }

  // Parents may pass away
  if(G.parents){
    G.parents.forEach(p=>{
      if(p.alive&&Math.random()<0.03+(G.age*0.002)){
        p.alive=false;
        addLog(`💔 ${p.rel} ${p.name} 已离世，往事如烟。`,'bad');
        G.mood=clamp(G.mood-15);
        G.parentFavor=clamp(G.parentFavor-10);
      }
    });
  }

  // Natural attribute decay each year (random)
  // ── 属性年度衰减（年轻衰减慢，中年后加速）────────
  // 健康
  const healthDecay = 1 + Math.floor(Math.random()*2)
    + (G.age>=40 ? 1 : 0)
    + (G.age>=55 ? 2 : 0)
    + (G.age>=70 ? 3 : 0);

  // 心情：小幅随机，不受年龄影响太多
  const moodDecay = Math.floor(Math.random()*3); // 0~2

  // 魅力：青少年几乎不降，中年后明显下滑，老年快速衰退
  let charmDecay = 0;
  if(G.age < 20)       charmDecay = Math.random()<0.15 ? 1 : 0;       // 15%概率-1
  else if(G.age < 35)  charmDecay = Math.random()<0.30 ? 1 : 0;       // 30%概率-1
  else if(G.age < 50)  charmDecay = 1 + (Math.random()<0.4 ? 1 : 0);  // 1~2
  else if(G.age < 65)  charmDecay = 1 + Math.floor(Math.random()*2);  // 1~2
  else                 charmDecay = 2 + Math.floor(Math.random()*2);  // 2~3

  // 智识：年轻时几乎不降，中年后渐渐遗忘，老年衰退
  let intelDecay = 0;
  if(G.age < 25)       intelDecay = Math.random()<0.10 ? 1 : 0;       // 10%概率-1
  else if(G.age < 40)  intelDecay = Math.random()<0.25 ? 1 : 0;       // 25%概率-1
  else if(G.age < 55)  intelDecay = Math.random()<0.50 ? 1 : 0;       // 50%概率-1
  else if(G.age < 70)  intelDecay = 1 + (Math.random()<0.35 ? 1 : 0); // 1~2
  else                 intelDecay = 2 + Math.floor(Math.random()*2);  // 2~3

  G.health = clamp(G.health - healthDecay);
  G.mood   = clamp(G.mood   - moodDecay);
  G.charm  = clamp(G.charm  - charmDecay);
  G.intel  = clamp(G.intel  - intelDecay);

  // School
  if(G.inSchool){
    const bg=FAMILY_BG[G.familyBg]||FAMILY_BG.normal;
    const isFree=bg.freeSchoolAge>0&&G.age<bg.freeSchoolAge;
    if(G.age>18){
      G.inSchool=false; addLog(`📚 年岁渐长，离开了学堂。`,'info');
    } else if(!isFree&&G.money>=20){
      G.money-=20;
      G.schoolYears++;
      const ev=SCHOOL_EVENTS[Math.floor(Math.random()*SCHOOL_EVENTS.length)];
      G.intel=clamp(G.intel+4+(ev.intel||0));
      G.mood=clamp(G.mood+(ev.mood||0));
      addLog(`📖 ${ev.text}`,'info');
    } else if(!isFree&&G.money<20){
      G.inSchool=false;
      addLog(`📚 交不起学费，不得不辍学。`,'bad');
    } else {
      G.schoolYears++;
      const ev=SCHOOL_EVENTS[Math.floor(Math.random()*SCHOOL_EVENTS.length)];
      G.intel=clamp(G.intel+4+(ev.intel||0));
      G.mood=clamp(G.mood+(ev.mood||0));
      addLog(`📖 ${ev.text}`,'info');
    }
  }

  // Job: soldier risk; auto salary not given here (player must collect)
  const job=JOBS.find(j=>j.id===G.job);
  if(job&&G.job!=='none'){
    if(G.age>job.maxAge){
      addLog(`👴 年岁太大，从 ${job.name} 退休。`,'info');
      G.job='none'; G.jobRank=0; G.jobProf=0;
    } else if(job.dangerRisk&&Math.random()<0.12){
      G.health=clamp(G.health-20);
      addLog(`⚔️ 在战场上受了重伤，死里逃生！健康大减。`,'bad');
    }
  }

  // Random event
  const eligible=RANDOM_EVENTS.filter(e=>{
    if(G.age<e.age[0]||G.age>e.age[1]) return false;
    if(e.job&&e.job!==G.job) return false;
    if(e.reqIntel&&G.intel<e.reqIntel) return false;
    return true;
  });
  const weights=eligible.map(e=>e.w);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total, ev;
  for(let i=0;i<eligible.length;i++){ r-=eligible[i].w; if(r<=0){ev=eligible[i];break;} }
  if(!ev) ev=eligible[0];
  if(ev){
    if(ev.money){ G.money+=ev.money; if(ev.money>0) G.totalMoney+=ev.money; }
    if(ev.health) G.health=clamp(G.health+ev.health);
    if(ev.mood)   G.mood=clamp(G.mood+ev.mood);
    if(ev.intel)  G.intel=clamp(G.intel+ev.intel);
    if(ev.charm)  G.charm=clamp(G.charm+ev.charm);
    addLog(ev.text, ev.type==='good'?'good':ev.type==='bad'?'bad':'info');
  }

  // Death check — all attrs have floors via clamp, death triggers at 0
  let dead=false, cause='';
  if(G.age>=G.maxAge){ dead=true; cause=`寿终正寝，${G.age}岁无病而终，乃是喜丧。`; }
  else if(G.health<=0){ dead=true; cause=`因病体虚，油尽灯枯，${G.age}岁与世长辞。`; }
  else if(G.mood<=0){ dead=true; cause=`心灰意冷，郁郁寡欢，${G.age}岁抑郁而终。`; }
  else if(G.money<-200){ dead=true; cause=`家贫如洗，饥寒交迫，${G.age}岁含冤离世。`; }

  if(dead){
    G.dead=true; G.deathCause=cause;
    addLog(`☠️ ${cause}`,'bad');
    save(); renderObituary(); return;
  }

  save(); render();
  setTimeout(()=>{ const lw=document.querySelector('.log-wrap'); if(lw) lw.scrollTop=0; },100);

  // 年度总结弹窗：展示本年日志里新增的条目
  const yearLogs = G.log.filter(l=>l.age===G.age);
  if(yearLogs.length>0){
    const logHTML = yearLogs.map(l=>`<div style="padding:3px 0;border-bottom:1px solid var(--border);font-size:10px"><span class="log-${l.type}">${l.text}</span></div>`).join('');
    setTimeout(()=>{
      showModal(`📅 ${G.age}岁 · 本年记事`,
        `<div style="max-height:300px;overflow-y:auto">${logHTML}</div>`,
        [{label:'知道了',sub:'',cost:'',id:'ok'}],()=>closeModal());
    },150);
  }
}

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
let _currentTab = 'actions';

function switchTab(id){
  _currentTab = id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  event.target.classList.add('on');
}
function switchTabDirect(id){
  _currentTab = id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const panel=document.getElementById('panel-'+id);
  if(panel) panel.classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>{ if(t.textContent.includes(id==='social'?'社交':id==='estate'?'地产':id==='shop'?'商店':id==='bag'?'包裹':id==='log'?'日志':id==='family'?'家族':id)) t.classList.add('on'); });
}
function restoreTab(){
  const id = _currentTab || 'actions';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const panel = document.getElementById('panel-'+id);
  if(panel) panel.classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>{
    const map={actions:'行动',social:'社交',estate:'地产',shop:'商店',bag:'包裹',log:'日志',family:'家族'};
    if(t.textContent.trim()===map[id]) t.classList.add('on');
  });
}

function showModal(title,sub,opts,onSelect){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-sub').innerHTML=sub.replace(/\n/g,'<br>');
  const optsEl=document.getElementById('modal-opts');
  optsEl.innerHTML='';
  opts.forEach(opt=>{
    const el=document.createElement('div');
    el.className='modal-opt';
    el.innerHTML=`<span>${opt.label}<br><span style="font-size:9px;color:var(--faint)">${opt.sub||''}</span></span><span class="modal-opt-cost">${opt.cost||''}</span>`;
    el.onclick=()=>onSelect(opt.id);
    optsEl.appendChild(el);
  });
  document.getElementById('modal-actions').innerHTML=`<button class="mclose" onclick="closeModal()">取消</button>`;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function modalBgClick(e){ if(e.target===document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ══════════════════════════════════════════
   CONFIRM SPEND DIALOG
══════════════════════════════════════════ */
function confirmSpend(cost, desc, onConfirm){
  showModal(
    '💰 确认花费',
    `${desc}\n\n需要花费：🪙 ${cost} 文\n当前余钱：🪙 ${G.money} 文`,
    [{ label:`✅ 确认花费 ${cost}文`, sub:'', cost:'', id:'yes' }],
    (id)=>{ closeModal(); onConfirm(); }
  );
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:6px;font-size:11px;font-family:var(--mono);z-index:9999;transition:opacity .3s;white-space:nowrap'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2400);
}

function st(t){ localStorage.setItem('moyu-theme',t); document.documentElement.setAttribute('data-theme',t); }
function resetGame(){ if(!confirm('确定要从头开始吗？所有进度将清空！'))return; localStorage.removeItem('ancient'); location.reload(); }

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
if(!load()) initGame(null);
else render();
</script>
