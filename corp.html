<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style id="theme-vars">
[data-theme="white"]{--bg:#f8f8f6;--surface:#ffffff;--card:#ffffff;--border:#e4e4e0;--border-l:#d0d0cc;--text:#1a1a18;--muted:#6b6b66;--faint:#b0b0aa;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="dark"]{--bg:#0e0f0e;--surface:#141514;--card:#191a19;--border:#2a2b2a;--border-l:#363736;--text:#e8e8e4;--muted:#8a8a84;--faint:#4a4a46;--green:#4ade80;--green-l:rgba(74,222,128,.1);--amber:#fbbf24;--blue:#60a5fa;--blue-l:rgba(96,165,250,.1);--red:#f87171;--red-l:rgba(248,113,113,.1);--scanline:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
[data-theme="mint"]{--bg:#f0f7f4;--surface:#ffffff;--card:#ffffff;--border:#c8e6da;--border-l:#a8d5c2;--text:#1a2e26;--muted:#5a7a6e;--faint:#a0bfb4;--green:#0d9063;--green-l:rgba(13,144,99,.08);--amber:#d97706;--blue:#0369a1;--blue-l:rgba(3,105,161,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="sakura"]{--bg:#fdf4f7;--surface:#ffffff;--card:#ffffff;--border:#f0d0dc;--border-l:#e0b0c0;--text:#2a1a20;--muted:#7a5060;--faint:#c4a0b0;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#7c3aed;--blue-l:rgba(124,58,237,.08);--red:#e11d48;--red-l:rgba(225,29,72,.08);--scanline:none}
[data-theme="sky"]{--bg:#f0f6ff;--surface:#ffffff;--card:#ffffff;--border:#c8dcf8;--border-l:#a8c4f0;--text:#1a2040;--muted:#5060a0;--faint:#a0b0d8;--green:#0d9488;--green-l:rgba(13,148,136,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
[data-theme="warm"]{--bg:#fdf8f0;--surface:#ffffff;--card:#ffffff;--border:#ede0c8;--border-l:#d8c8a8;--text:#2a2018;--muted:#7a6040;--faint:#c0a878;--green:#16a34a;--green-l:rgba(22,163,74,.08);--amber:#d97706;--blue:#2563eb;--blue-l:rgba(37,99,235,.08);--red:#dc2626;--red-l:rgba(220,38,38,.08);--scanline:none}
body{transition:background .2s,color .2s}
body::after{background:var(--scanline,none)!important}
@media(max-width:640px){.main{padding:10px!important}.g4{grid-template-columns:repeat(2,1fr)!important}.g3{grid-template-columns:repeat(2,1fr)!important}.col-r{grid-template-columns:1fr!important}.tabs{padding:0 8px!important}.topbar{padding:0 10px!important}}
</style>
<script>(function(){var t=localStorage.getItem("moyu-theme")||"white";document.documentElement.setAttribute("data-theme",t)})();</script>
<title>公司运营 · 摸鱼工作台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@600;700&display=swap');
:root{--bg:#0e0f0e;--surface:#141514;--card:#191a19;--border:#2a2b2a;--border-l:#363736;--text:#e8e8e4;--muted:#8a8a84;--faint:#4a4a46;--green:#4ade80;--green-l:rgba(74,222,128,.1);--amber:#fbbf24;--blue:#60a5fa;--blue-l:rgba(96,165,250,.1);--red:#f87171;--red-l:rgba(248,113,113,.1);--mono:'IBM Plex Mono',monospace;--serif:'Noto Serif SC',serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9999}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100}
.back{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--mono);transition:color .15s}.back:hover{color:var(--text)}
.topbar-title{font-family:var(--serif);font-size:15px;font-weight:700}
.tabs{display:flex;gap:2px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.tab{padding:8px 14px;font-size:11px;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--mono);transition:all .15s;white-space:nowrap}.tab:hover{color:var(--text)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.main{padding:14px 16px;max-width:1200px;margin:0 auto}
.panel{display:none}.panel.on{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px}
.ct{font-size:11px;font-weight:500;margin-bottom:8px;letter-spacing:.04em}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.col-r{display:grid;grid-template-columns:1fr 290px;gap:12px}
.sl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.sv{font-size:18px;font-weight:600;line-height:1}.sv.gr{color:var(--green)}.sv.bl{color:var(--blue)}.sv.am{color:var(--amber)}.sv.rd{color:var(--red)}
.sd{font-size:9px;color:var(--faint);margin-top:2px}.sd.up{color:var(--green)}.sd.dn{color:var(--red)}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}.row:last-child{border-bottom:none}
.rn{font-size:11px;font-weight:500}.rd{font-size:9px;color:var(--faint);margin-top:1px}
.rr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:5px 12px;border-radius:4px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap}
.bp{background:var(--blue);color:#000}.bp:hover:not(:disabled){background:#93c5fd}
.bg{background:var(--green);color:#000}.bg:hover:not(:disabled){background:#86efac}
.ba{background:var(--amber);color:#000}.ba:hover:not(:disabled){background:#fde68a}
.br{background:var(--red);color:#000}.br:hover:not(:disabled){background:#fca5a5}
.bo{background:transparent;color:var(--muted);border-color:var(--border-l)}.bo:hover:not(:disabled){color:var(--text);border-color:var(--text)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.bsm{padding:3px 9px;font-size:10px}.bxs{padding:2px 7px;font-size:9px}.bfull{width:100%;display:flex}
.bdg{display:inline-block;padding:2px 6px;border-radius:2px;font-size:9px}
.bdg-g{background:var(--green-l);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.bdg-b{background:var(--blue-l);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.bdg-r{background:var(--red-l);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.bdg-a{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.pb{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.pbf{height:100%;border-radius:2px;transition:width .3s}
.pbl{background:var(--blue)}.pbg{background:var(--green)}.pba{background:var(--amber)}.pbr{background:var(--red)}
.log{height:120px;overflow-y:auto;font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px}
.ll{padding:1px 0}.lts{color:var(--faint)}.lok .lm{color:var(--green)}.lbad .lm{color:var(--red)}.linfo .lm{color:var(--blue)}
.news-band{background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;height:28px;display:flex;align-items:center;margin-bottom:10px}
.nl{font-size:9px;color:var(--red);letter-spacing:.1em;padding:0 10px;border-right:1px solid var(--border);white-space:nowrap;height:100%;display:flex;align-items:center}
.ns{overflow:hidden;flex:1}.ni{display:flex;gap:50px;animation:ns 25s linear infinite;white-space:nowrap;font-size:9px;color:var(--muted)}
@keyframes ns{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.slot{padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;display:flex;gap:8px;align-items:center}
.si{font-size:20px}.sinfo{flex:1}.sn{font-size:11px;font-weight:500}.sd2{font-size:9px;color:var(--faint)}
.emp-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:6px}
.emp-top{display:flex;justify-content:space-between;margin-bottom:4px}
.emp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;font-size:9px;color:var(--faint)}.emp-stats span{color:var(--text)}
.stock-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}.stock-row:last-child{border-bottom:none}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.flex{display:flex;align-items:center}.fb{display:flex;align-items:center;justify-content:space-between}
.gap6{gap:6px}.gap8{gap:8px}.faint{color:var(--faint);font-size:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="saveBack()">← 返回</button>
  <div class="topbar-title">🏢 公司运营模拟</div>
  <div style="display:flex;gap:5px;align-items:center;margin-left:8px">
  <button onclick="st('white')" title="纸白" style="width:14px;height:14px;border-radius:50%;background:#f8f8f6;border:1px solid #ccc;cursor:pointer;padding:0"></button>
  <button onclick="st('dark')" title="暗黑" style="width:14px;height:14px;border-radius:50%;background:#191a19;border:1px solid #555;cursor:pointer;padding:0"></button>
  <button onclick="st('mint')" title="薄荷" style="width:14px;height:14px;border-radius:50%;background:#a8d5c2;border:1px solid #8abfaa;cursor:pointer;padding:0"></button>
  <button onclick="st('sakura')" title="樱花" style="width:14px;height:14px;border-radius:50%;background:#f0b8cc;border:1px solid #d898b0;cursor:pointer;padding:0"></button>
  <button onclick="st('sky')" title="天空" style="width:14px;height:14px;border-radius:50%;background:#a8c4f0;border:1px solid #88a4d8;cursor:pointer;padding:0"></button>
  <button onclick="st('warm')" title="暖橙" style="width:14px;height:14px;border-radius:50%;background:#e8c878;border:1px solid #c8a858;cursor:pointer;padding:0"></button>
</div>
  <span style="font-size:10px;color:var(--faint)" id="clk">--:--:--</span>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw(0)">📊 总览</button>
  <button class="tab" onclick="sw(1)">👥 人力资源</button>
  <button class="tab" onclick="sw(2)">📈 股票市场</button>
  <button class="tab" onclick="sw(3)">🏗️ 部门&办公室</button>
  <button class="tab" onclick="sw(4)">📋 项目竞标</button>
  <button class="tab" onclick="sw(5)">📰 新闻&危机</button>
</div>
<div class="main">

<div class="panel on" id="p0">
  <div class="news-band"><div class="nl">⚡ 快讯</div><div class="ns"><div class="ni" id="nticker">加载中...</div></div></div>
  <div class="g4 mb10">
    <div class="card"><div class="sl">现金余额</div><div class="sv gr" id="cash">¥1,000</div><div class="sd up" id="cps">+0/s</div></div>
    <div class="card"><div class="sl">员工总数</div><div class="sv" id="staff">0</div><div class="sd">人力资源</div></div>
    <div class="card"><div class="sl">累计营收</div><div class="sv bl" id="total">¥0</div><div class="sd" id="lv">Lv.1</div></div>
    <div class="card"><div class="sl">股票市值</div><div class="sv am" id="port">¥0</div><div class="sd" id="portd">持股:0</div></div>
  </div>
  <div class="col-r">
    <div>
      <div class="card mb10">
        <div class="fb mb8"><div class="ct" style="margin:0">手动创收</div><span class="faint" id="cvlbl">+¥10/次</span></div>
        <button class="btn bp bfull mb8" onclick="doClick()" style="height:48px;font-size:14px">💼 签署合同</button>
        <div class="fb" style="font-size:9px;color:var(--faint)"><span>经验值</span><span id="xpt">0/100</span></div>
        <div class="pb mt8"><div class="pbf pbl" id="xpb" style="width:0%"></div></div>
      </div>
      <div class="card mb10"><div class="ct">竞争对手</div><div id="rivals"></div></div>
      <div class="card mb10"><div class="ct">活跃项目</div><div id="aproj0"></div></div>
      <div class="card"><div class="ct">运营日志</div><div class="log" id="clog"></div></div>
    </div>
    <div>
      <div class="card mb10">
        <div class="ct">股价走势</div>
        <canvas id="schart" width="270" height="56" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;display:block;margin-bottom:8px"></canvas>
        <div class="fb">
          <div><div class="sl">当前股价</div><div style="font-size:14px;font-weight:600;color:var(--amber)" id="sp">¥10.00</div><div class="sd" id="spchg">-</div></div>
          <div class="flex gap6"><button class="btn bg bsm" onclick="buySt('own')">买入</button><button class="btn br bsm" onclick="sellSt('own')">卖出</button></div>
        </div>
      </div>
      <div class="card mb10"><div class="ct">里程碑</div><div id="miles"></div></div>
      <div class="card"><div class="ct">公司情报</div><div id="intel"></div></div>
    </div>
  </div>
</div>

<div class="panel" id="p1">
  <div class="g3">
    <div>
      <div class="card mb10"><div class="ct">雇用员工</div><div id="hirelist"></div></div>
    </div>
    <div>
      <div class="card mb10">
        <div class="fb mb8"><div class="ct" style="margin:0">员工列表</div><span class="faint" id="avgmood">平均心情:😊</span></div>
        <div id="emplist" style="max-height:380px;overflow-y:auto"></div>
      </div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">HR政策</div><div id="hrpol"></div></div>
      <div class="card"><div class="ct">企业文化</div><div id="cult"></div></div>
    </div>
  </div>
</div>

<div class="panel" id="p2">
  <div class="col-r">
    <div>
      <div class="card mb10"><div class="fb mb8"><div class="ct" style="margin:0">实时行情</div><span class="faint">5档深度</span></div><div id="mktlist"></div></div>
      <div class="card"><div class="ct">交易记录</div><div class="log" style="height:150px" id="tlog"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">我的持仓</div><div id="holdings"></div><div class="mt8 faint" id="profitlbl">总盈亏: ¥0</div></div>
      <div class="card mb10"><div class="ct">走势图</div><canvas id="fchart" width="270" height="110" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;display:block"></canvas></div>
      <div class="card"><div class="ct">市场情绪</div><div id="sent"></div></div>
    </div>
  </div>
</div>

<div class="panel" id="p3">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="ct">部门建设</div><div id="depts"></div></div>
      <div class="card"><div class="ct">公司升级</div><div id="upgrades"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">办公室装修</div><div id="office"></div></div>
      <div class="card"><div class="ct">效率总览</div><div id="effoverview"></div></div>
    </div>
  </div>
</div>

<div class="panel" id="p4">
  <div class="g2">
    <div>
      <div class="card mb10"><div class="fb mb8"><div class="ct" style="margin:0">可接项目</div><button class="btn bo bsm" onclick="refreshProj()">🔄 刷新</button></div><div id="projlist"></div></div>
    </div>
    <div>
      <div class="card mb10"><div class="ct">进行中</div><div id="aproj"></div></div>
      <div class="card"><div class="ct">完成记录</div><div class="log" style="height:160px" id="plog"></div></div>
    </div>
  </div>
</div>

<div class="panel" id="p5">
  <div class="g2">
    <div><div class="card mb10"><div class="ct">最新新闻</div><div id="newslist"></div></div></div>
    <div>
      <div class="card mb10"><div class="ct">市场影响分析</div><div id="newsimpact"></div></div>
      <div class="card"><div class="ct">危机应对能力</div><div id="crisis"></div></div>
    </div>
  </div>
</div>

</div>
<script>
const $=id=>document.getElementById(id);
const ts=()=>new Date().toTimeString().slice(0,8);
const LVS=['初创公司','小型企业','中型企业','大型企业','跨国集团','世界500强'];
function addLog(box,msg,type){const b=$(box),d=document.createElement('div');d.className='ll '+type;d.innerHTML=`<span class="lts">[${ts()}]</span> <span class="lm">${msg}</span>`;b.prepend(d);while(b.children.length>50)b.removeChild(b.lastChild)}
function fmt(n){if(n>=1e9)return'¥'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'¥'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'¥'+(n/1e3).toFixed(1)+'K';return'¥'+Math.floor(n)}
function sw(i){document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('on',i===j));render()}
setInterval(()=>$('clk').textContent=new Date().toTimeString().slice(0,8),1000);

const G={
  cash:1000,total:0,cps:0,clickVal:10,xp:0,xpMax:100,level:1,
  staffCounts:{},employees:[],
  shares:{},stockHist:{},avgBasis:{},

    {id:'own',name:'本公司',price:10,vol:.04,base:10},

    {id:'gold',name:'黄金ETF',price:380,vol:.008,base:380},
  ],
  hires:[

    {id:'senior',name:'高级员工',desc:'+¥20/s',base:500,cps:20,icon:'👨‍💼'},
    {id:'manager',name:'项目经理',desc:'+¥80/s',base:2000,cps:80,icon:'👩‍💼'},
    {id:'director',name:'总监',desc:'+¥300/s',base:8000,cps:300,icon:'🧑‍💼'},
    {id:'vp',name:'副总裁',desc:'+¥1200/s',base:35000,cps:1200,icon:'🤵'},
    {id:'ceo2',name:'联合创始人',desc:'+¥5000/s',base:150000,cps:5000,icon:'👑'},
  ],
  depts:[
    {id:'hr',name:'人力资源部',desc:'雇人成本-15%',cost:800,built:false,icon:'👥'},
    {id:'rd',name:'研发部',desc:'点击收益×2',cost:2000,built:false,icon:'🔬'},
    {id:'sales',name:'销售部',desc:'自动+500/s',cost:5000,built:false,icon:'📊'},
    {id:'fin',name:'财务部',desc:'股票收益×1.5',cost:10000,built:false,icon:'💹'},
    {id:'legal',name:'法务部',desc:'解锁超大项目',cost:20000,built:false,icon:'⚖️'},
    {id:'pr',name:'公关部',desc:'危机损失-50%',cost:15000,built:false,icon:'📣'},
    {id:'ai',name:'AI实验室',desc:'全体CPS×2',cost:80000,built:false,icon:'🤖'},
    {id:'global',name:'海外事业部',desc:'项目奖励×1.5',cost:200000,built:false,icon:'🌍'},
  ],
  office:[
    {id:'chairs',name:'人体工学椅',desc:'效率+10%',cost:1000,bought:false,icon:'🪑'},

function hire(id){
  const h=G.hires.find(x=>x.id===id),cost=G.hcost(h);
  if(G.cash<cost)return;

}
function buySt(id){
  const st=G.stocks.find(s=>s.id===id);
  if(G.cash<st.price)return;
  G.cash-=st.price;G.shares[id]=(G.shares[id]||0)+1;
  const prev=G.avgBasis[id]||st.price;G.avgBasis[id]=(prev*(G.shares[id]-1)+st.price)/G.shares[id];
  addLog('tlog',`📈 买入${st.name}@${fmt(st.price)}`,'linfo');checkMiles();render();
}
function sellSt(id){
  const st=G.stocks.find(s=>s.id===id);
  if(!(G.shares[id]>0))return;
  const fin=G.depts.find(d=>d.id==='fin')?.built,earn=st.price*(fin?1.5:1);
  const pnl=earn-(G.avgBasis[id]||0);
  G.cash+=earn;G.shares[id]--;
  addLog('tlog',`📉 卖出${st.name}@${fmt(earn)} 盈亏:${pnl>=0?'+':''}${fmt(pnl)}`,'lok');render();
}

function drawChart(id,hist,col){
  const cv=$(id);if(!cv)return;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
  if(hist.length<2)return;
  const mn=Math.min(...hist),mx=Math.max(...hist),range=mx-mn||1;
  ctx.beginPath();
  hist.forEach((v,i)=>{const x=i/(hist.length-1)*cv.width,y=cv.height-(v-mn)/range*(cv.height-6)-3;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.strokeStyle=col||'#fbbf24';ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(cv.width,cv.height);ctx.lineTo(0,cv.height);ctx.closePath();ctx.fillStyle=(col||'#fbbf24')+'22';ctx.fill();
}

  const ap=G.activeProjects.map((p,i)=>`<div class="slot" style="flex-direction:column;align-items:stretch"><div class="fb mb6"><div class="sn">${p.icon}${p.name}</div><span class="bdg bdg-b pulse">进行中</span></div><div class="pb"><div class="pbf pbg" style="width:${Math.floor(p.progress*100)}%"></div></div><div class="faint mt8">${Math.floor(p.progress*100)}%</div></div>`).join('')||'<div class="faint" style="padding:8px">暂无项目</div>';
  $('aproj').innerHTML=$('aproj0').innerHTML=ap;

  $('rivals').innerHTML=G.rivals.map(r=>`<div class="row"><div><div class="rn">🏢${r.name}</div><div class="rd">Lv.${r.lv}·威胁:${r.threat}</div></div><div class="rr"><span class="bdg ${r.threat==='高'?'bdg-r':r.threat==='中'?'bdg-a':'bdg-g'}">${r.threat}威胁</span></div></div>`).join('');
  $('miles').innerHTML=G.milestones.map(m=>`<div class="row"><div><div class="rn">${m.icon}${m.name}</div><div class="rd">${m.desc}</div></div><div class="rr">${m.done?'<span class="bdg bdg-g">✓达成</span>':'<span class="faint">未达成</span>'}</div></div>`).join('');
  $('intel').innerHTML=`<div class="row"><div class="rn">市场占有率</div><div class="rr"><span class="faint">${Math.min(99,Math.floor(G.total/1e6*0.1+1))}%</span></div></div>
    <div class="row"><div class="rn">品牌价值</div><div class="rr"><span class="faint">${fmt(G.total*0.3)}</span></div></div>
    <div class="row"><div class="rn">员工满意度</div><div class="rr"><span class="faint">${G.employees.length?Math.floor(G.employees.reduce((a,e)=>a+e.mood,0)/G.employees.length):80}%</span></div></div>`;
  $('newslist').innerHTML=G.news.map(n=>`<div class="row"><div><div class="rn">${n.i}${n.t}</div><div class="rd">${n.time||''}</div></div></div>`).join('')||'<div class="faint" style="padding:8px">暂无新闻</div>';
  $('newsimpact').innerHTML=`<div class="row"><div class="rn">当前市场偏向</div><div class="rr"><span class="bdg bdg-g">温和看涨</span></div></div><div class="row"><div class="rn">新闻数量</div><div class="rr"><span class="faint">${G.news.length}条</span></div></div>`;
  $('crisis').innerHTML=`<div class="row"><div class="rn">🛡️危机预案</div><div class="rr">${G.depts.find(d=>d.id==='pr')?.built?'<span class="bdg bdg-g">已建立公关部</span>':'<span class="bdg bdg-r">无公关部门</span>'}</div></div>
    <div class="row"><div class="rn">⚖️法律风险</div><div class="rr">${G.depts.find(d=>d.id==='legal')?.built?'<span class="bdg bdg-g">低风险</span>':'<span class="bdg bdg-a">中等风险</span>'}</div></div>`;
}

let tick=0;
setInterval(()=>{
  tick++;
  if(G.cps>0){G.cash+=G.cps/10;G.total+=G.cps/10}
  if(tick%3===0){
    G.stocks.forEach(st=>{
      const chg=(Math.random()-.47)*st.vol;
      st.price=Math.max(1,+(st.price*(1+chg)).toFixed(2));
      G.stockHist[st.id].push(st.price);
      if(G.stockHist[st.id].length>80)G.stockHist[st.id].shift();
    });
  }
  G.activeProjects.forEach((p,i)=>{
    p.progress+=1/(p.time*10);
    if(p.progress>=1){
      const r=Math.floor(p.reward*G.projMult);G.cash+=r;G.total+=r;G.projDone++;
      addLog('plog',`✅${p.icon}${p.name}+${fmt(r)}`,'lok');addLog('clog',`🎉项目完成:${p.icon}${p.name}+${fmt(r)}`,'lok');
      G.activeProjects.splice(i,1);checkMiles();
    }
  });
  if(tick%50===0)G.rivals.forEach(r=>{r.cash*=1.02;r.lv=Math.max(r.lv,Math.floor(Math.log(r.cash/1000)+1))});
  if(tick%30===0)G.employees.forEach(e=>{const hb=G.depts.find(d=>d.id==='hr')?.built?5:0;e.mood=Math.max(10,Math.min(100,e.mood+(Math.random()>.45?1:-1)*4+hb))});
  if(tick%600===0)genNews();
  if(tick%5===0)render();
  if(tick%300===0)save();
},100);

if(G.news.length===0)genNews();
if(G.projects.length===0)refreshProj();
render();
addLog('clog','🏢 公司运营系统启动','linfo');

function st(t){localStorage.setItem('moyu-theme',t);document.documentElement.setAttribute('data-theme',t)}
</script>
</body>
</html>
